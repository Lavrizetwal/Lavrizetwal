<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL ORGANISATION | Inovasyon ak Ekselans</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffd700; --gold-deep: #b8860b; --gold-light: #fff8dc;
            --gold-glow: rgba(255, 215, 0, 0.2); --bg: #010101; --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --glass-bg: rgba(255, 255, 255, 0.08);
        }
        .light-mode { --bg: #fdfdfd; --text: #1a1a1a; --glass-bg: rgba(0, 0, 0, 0.05); }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background 0.5s ease; }
        #webgl-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }
        
        /* --- NAVIGATION --- */
        .nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); 
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, transparent, var(--gold), transparent) 1;
        }
        .nav-content { position: relative; display: flex; flex-direction: column; align-items: center; padding: 15px 10px; }
        
        /* Bouton Login & Info */
        .auth-ui { position: absolute; right: 20px; top: 15px; text-align: right; }
        .login-btn {
            padding: 8px 18px; border: 1px solid var(--gold); border-radius: 20px;
            color: var(--gold); text-decoration: none; font-size: 0.7rem;
            font-weight: 600; text-transform: uppercase; transition: 0.3s;
            background: transparent; cursor: pointer;
        }
        .login-btn:hover { background: var(--gold); color: #000; }
        
        #user-info-nav { display: none; color: var(--gold); font-size: 0.7rem; font-weight: 700; }
        .logout-text { font-size: 0.5rem; color: #ff4444; cursor: pointer; text-decoration: underline; display: block; }

        .logo-container { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .nav-logo-img { width: 25px; height: 25px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
        .logo-text span { color: var(--gold); }
        
        .nav-links { 
            display: flex; list-style: none; gap: 10px; margin: 0; padding: 5px; 
            overflow-x: auto; width: 100%; white-space: nowrap;
        }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.6rem; text-transform: uppercase; padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.2); }
        .nav-links a.active { background: var(--gold); color: #000; }

        .theme-toggle { position: fixed; top: 120px; right: 20px; z-index: 2000; background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* --- HERO --- */
        .hero { padding: 240px 5% 60px; text-align: center; }
        .gold-shimmer { 
            background: linear-gradient(90deg, var(--text) 0%, var(--gold) 50%, var(--text) 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: softTextGlow 6s linear infinite; font-size: clamp(2.5rem, 10vw, 5rem); font-family: 'Playfair Display', serif; margin: 0;
        }
        @keyframes softTextGlow { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        /* --- CARDS --- */
        .carousel-container { width: 100%; padding: 40px 0 120px; }
        .hub-carousel { display: flex; gap: 30px; overflow-x: auto; padding: 20px 10%; }
        .carousel-item { flex: 0 0 85%; max-width: 500px; }
        @media (min-width: 768px) { .carousel-item { flex: 0 0 450px; } }

        .liquid-border { 
            position: relative; border-radius: 35px; background: var(--glass-bg); 
            backdrop-filter: blur(40px); padding: 45px 35px; text-align: center; height: 400px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid transparent; 
        }
        .liquid-border::before { 
            content: ""; position: absolute; inset: -2px; z-index: -1; border-radius: inherit; padding: 2px; 
            background: linear-gradient(135deg, var(--gold-deep), #fff, var(--gold-deep)); 
            background-size: 300% 300%; animation: liquidGold 4s linear infinite; 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
        }
        @keyframes liquidGold { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .btn-main-gold { 
            margin-top: 20px; display: inline-block; padding: 14px 35px; background: var(--gold); color: #000; 
            text-decoration: none; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <nav class="nav">
        <div class="nav-content">
            <div class="auth-ui">
                <button id="google-login" class="login-btn">Login</button>
                <div id="user-info-nav">
                    <span id="nav-user-name"></span><br>
                    <span id="nav-user-points">...</span> Pwen
                    <span class="logout-text" onclick="logout()">Dekonekte</span>
                </div>
            </div>

            <div class="logo-container">
                <img src="logo.png" alt="Zetwal" class="nav-logo-img">
                <div class="logo-text">ZETWAL <span>ORGANISATION</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Akèy</a></li>
                <li><a href="lavri.html">Lavri</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="mall.html">Mall</a></li>
                <li><a href="technopark.html">Technopark</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <h1 class="gold-shimmer">Inivè Zetwal</h1>
        <p>LIDÈ NAN INOVASYON TEKNOLOJIK AK PWOGRÈ SOSYAL</p>
    </header>

    <main>
        <div class="carousel-container">
            <div class="hub-carousel">
                <div class="carousel-item">
                    <div class="liquid-border">
                        <div style="font-size:3rem;">🧺</div>
                        <h3 style="color:var(--gold);">Lavri Zetwal</h3>
                        <p>Sèvis pwofesyonèl pou rad ou ak livrezon rapid.</p>
                        <a href="lavri.html" class="btn-main-gold">Antre</a>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="liquid-border">
                        <div style="font-size:3rem;">🤖</div>
                        <h3 style="color:var(--gold);">Technopark</h3>
                        <p>Laboratwa inovasyon kote lavni ap bati.</p>
                        <a href="technopark.html" class="btn-main-gold">Eksplore</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Mwen itilize config ou te voye a
        const firebaseConfig = {
            apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
            authDomain: "lavrizetwal.firebaseapp.com",
            projectId: "lavrizetwal",
            storageBucket: "lavrizetwal.firebasestorage.app",
            messagingSenderId: "291921316186",
            appId: "1:291921316186:web:f55e8b34526960df394b63",
            measurementId: "G-65R9V5MRBV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginBtn = document.getElementById('google-login');
        const userInfoNav = document.getElementById('user-info-nav');
        const navUserName = document.getElementById('nav-user-name');
        const navUserPoints = document.getElementById('nav-user-points');

        // Login fonksyon
        loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        // Koute chanjman koneksyon
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userInfoNav.style.display = 'block';
                navUserName.innerText = user.displayName.split(' ')[0];

                const userRef = doc(db, "users", user.uid);
                
                // Kreye kont nan Firestore si se premye fwa
                const docSnap = await getDoc(userRef);
                if (!docSnap.exists()) {
                    await setDoc(userRef, { points: 1000, name: user.displayName }, { merge: true });
                }

                // Mete pwen yo ajou an dirèk
                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        navUserPoints.innerText = doc.data().points || 0;
                    }
                });
            } else {
                loginBtn.style.display = 'block';
                userInfoNav.style.display = 'none';
            }
        });
    </script>

    <script>
        // WEBGL BACKGROUND
        let scene, camera, renderer, stars;
        function initWebGL() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const starGeometry = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<2000; i++) {
                starCoords.push((Math.random()-0.5)*30, (Math.random()-0.5)*30, (Math.random()-0.5)*30);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffd700, size: 0.05 }));
            scene.add(stars);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        initWebGL();
    </script>
</body>
</html>
