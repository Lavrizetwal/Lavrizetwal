<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETWAL MALL | ULTRA-DETAY</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        #overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: all 1s ease-in-out;
        }

        h1 { color: #ffd700; letter-spacing: 15px; font-size: 3.5rem; margin-bottom: 30px; text-align: center; }

        .start-btn {
            padding: 18px 60px; border: 2px solid #ffd700; background: none;
            color: #ffd700; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; transition: 0.3s; font-size: 1.1rem;
        }

        .start-btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 40px #ffd700; }

        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #555;
            font-size: 0.75rem; pointer-events: none; border-left: 2px solid #ffd700; padding-left: 10px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="title">ZETWAL MALL</h1>
        <button class="start-btn" onclick="startApp()">Antre nan Sant lan</button>
    </div>

    <div id="instructions">
        <b>KONTWÒL:</b> ZQSD pou mache | Sourit pou vire | ESC pou soti
    </div>

    <script>
        let scene, camera, renderer, clock;
        let pnj = [], dlo = [];
        let move = { f: false, b: false, l: false, r: false };
        let velocity = new THREE.Vector3();
        let isStarted = false;

        function init() {
            // 1. SCENE
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.015);

            // 2. CAMERA
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 90); 

            // 3. RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();

            // 4. LIMYÈ (Correction de l'écran noir)
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x080820, 0.5);
            scene.add(hemiLight);

            const spot = new THREE.SpotLight(0xffffff, 1.5);
            spot.position.set(0, 50, 0);
            spot.angle = Math.PI / 4;
            spot.penumbra = 0.3;
            spot.castShadow = true;
            scene.add(spot);

            // 5. SOL (Luxury Marble)
            const floorGeo = new THREE.PlaneGeometry(250, 250);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x050505, 
                roughness: 0.05, 
                metalness: 0.9 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 6. DEKORASYON (Boutik & Estrikti)
            createShop(-35, -50, 0xffd700, "LAVRI ZETWAL");
            createShop(35, -50, 0x00f2ff, "TECH STORE");
            createShop(0, -70, 0xff0055, "FASHION HUB");
            
            // FONTAINE DIGITAL
            const fountainBase = new THREE.Mesh(new THREE.CylinderGeometry(8, 10, 2, 32), new THREE.MeshStandardMaterial({color: 0x111}));
            fountainBase.position.y = 1;
            scene.add(fountainBase);
            createFountainParticles();

            // 7. PNJ (Moun k ap mache)
            for(let i=0; i<25; i++) createNPC();

            animate();
            setupControls();
        }

        function createShop(x, z, color, label) {
            const shopGroup = new THREE.Group();
            
            // Mi dèyè
            const wall = new THREE.Mesh(new THREE.BoxGeometry(25, 18, 2), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
            
            // Kad Vit la (Neyon)
            const frameGeo = new THREE.BoxGeometry(26, 0.5, 0.5);
            const frameMat = new THREE.MeshBasicMaterial({color: color});
            const topFrame = new THREE.Mesh(frameGeo, frameMat);
            topFrame.position.y = 9;
            topFrame.position.z = 1.5;

            // Limyè ki soti nan boutik la
            const pointLight = new THREE.PointLight(color, 4, 30);
            pointLight.position.set(0, 5, 5);

            shopGroup.add(wall, topFrame, pointLight);
            shopGroup.position.set(x, 9, z);
            scene.add(shopGroup);
        }

        function createFountainParticles() {
            const geo = new THREE.SphereGeometry(0.1, 8, 8);
            const mat = new THREE.MeshBasicMaterial({color: 0x00ffff});
            for(let i=0; i<150; i++) {
                const p = new THREE.Mesh(geo, mat);
                resetParticle(p);
                dlo.push(p);
                scene.add(p);
            }
        }

        function resetParticle(p) {
            p.position.set(0, 2, 0);
            p.userData = {
                v: new THREE.Vector3((Math.random()-0.5)*0.15, Math.random()*0.3, (Math.random()-0.5)*0.15),
                life: Math.random()
            };
        }

        function createNPC() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.2, 4, 8), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
            body.position.y = 1.3;
            body.castShadow = true;
            g.add(body);
            g.position.set((Math.random()-0.5)*120, 0, (Math.random()-0.5)*120);
            g.userData = { dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(), speed: 0.05 + Math.random()*0.05 };
            pnj.push(g);
            scene.add(g);
        }

        function startApp() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 1000);
            
            // ZOOM CINEMATIQUE (Correction: LookAt focalisé)
            gsap.to(camera.position, { 
                x: 0, y: 1.7, z: 50, 
                duration: 3.5, 
                ease: "expo.inOut",
                onUpdate: () => camera.lookAt(0, 1.7, -20)
            });
            
            document.body.requestPointerLock();
            isStarted = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // DLO FONTAINE
            dlo.forEach(p => {
                p.position.add(p.userData.v);
                p.userData.v.y -= 0.01;
                if(p.position.y < 1) resetParticle(p);
            });

            // MOUVMAN PNJ
            pnj.forEach(p => {
                p.position.addScaledVector(p.userData.dir, p.userData.speed);
                if(p.position.length() > 100) p.position.set(0,0,0);
                p.rotation.y = Math.atan2(p.userData.dir.x, p.userData.dir.z);
            });

            // MOUVMAN JWÈ
            if (document.pointerLockElement && isStarted) {
                velocity.z -= velocity.z * 10 * delta;
                velocity.x -= velocity.x * 10 * delta;
                
                if(move.f) velocity.z -= 200 * delta;
                if(move.b) velocity.z += 200 * delta;
                if(move.l) velocity.x -= 200 * delta;
                if(move.r) velocity.x += 200 * delta;

                camera.translateZ(velocity.z * delta);
                camera.translateX(velocity.x * delta);
                camera.position.y = 1.7; 
            }

            renderer.render(scene, camera);
        }

        function setupControls() {
            window.addEventListener('keydown', (e) => {
                let k = e.key.toLowerCase();
                if(k==='z' || k==='w') move.f = true;
                if(k==='s') move.b = true;
                if(k==='q' || k==='a') move.l = true;
                if(k==='d') move.r = true;
            });
            window.addEventListener('keyup', (e) => {
                let k = e.key.toLowerCase();
                if(k==='z' || k==='w') move.f = false;
                if(k==='s') move.b = false;
                if(k==='q' || k==='a') move.l = false;
                if(k==='d') move.r = false;
            });
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    // Limit up/down
                    camera.rotation.x = Math.max(-Math.PI/4, Math.min(Math.PI/4, camera.rotation.x - e.movementY * 0.002));
                }
            });
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
