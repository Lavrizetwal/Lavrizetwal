<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL MALL | Eksperyans 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #scene { width: 100%; height: 100%; display: block; }
        
        /* UI OVERLAY */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border: 1px solid #ffd700; border-radius: 50%; }
        
        .instructions {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border-left: 4px solid #ffd700; font-size: 0.75rem; pointer-events: auto;
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            padding: 10px 20px; background: #ffd700; color: #000;
            text-decoration: none; border-radius: 20px; font-weight: 800;
            font-size: 0.7rem; pointer-events: auto;
        }

        #interaction-msg {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.9); color: black; padding: 5px 15px;
            border-radius: 5px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="scene"></canvas>
        <div id="ui">
            <a href="index.html" class="back-btn">RETOUNEN</a>
            <div id="crosshair"></div>
            <div id="interaction-msg">KLIKE POU ANTRE</div>
            <div class="instructions">
                <strong>KONTWÒL:</strong><br>
                Z,Q,S,D oswa Flèch: Mache<br>
                Sourit: Gade tout kote<br>
                E: Entèrakte ak boutik
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let people = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let controlsEnabled = false;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.7; // Wotè je moun

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            clock = new THREE.Clock();

            // LIMYÈ
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const sunLight = new THREE.PointLight(0xffd700, 1, 100);
            sunLight.position.set(0, 20, 0);
            scene.add(sunLight);

            // PLANCHE (Mall Floor)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // KREYE BOUTIK YO
            createShop(0, 0, -20, "LAVRI ZETWAL", 0xffd700);
            createShop(15, 0, -15, "BOUTIK MOD", 0xffffff);
            createShop(-15, 0, -15, "TECH HUB", 0x00aaff);

            // KREYE MOUN YO (PNJ)
            for(let i = 0; i < 15; i++) {
                createPerson(
                    (Math.random() - 0.5) * 40,
                    0,
                    (Math.random() - 0.5) * 40,
                    Math.random() * 0xffffff,
                    "client"
                );
            }

            setupControls();
            animate();
        }

        function createShop(x, y, z, name, color) {
            const shopGroup = new THREE.Group();
            
            // Estrikti
            const geo = new THREE.BoxGeometry(10, 8, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.y = 4;
            shopGroup.add(wall);

            // Vitrin (Glass)
            const glassGeo = new THREE.PlaneGeometry(8, 4);
            const glassMat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.3, emissive: color, emissiveIntensity: 0.5 });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.set(0, 3, 0.6);
            shopGroup.add(glass);

            shopGroup.position.set(x, y, z);
            scene.add(shopGroup);
        }

        // --- SISTÈM PNJ HUMANOÏDES ---
        function createPerson(x, y, z, color, type) {
            const personGroup = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFDBAC });
            const clothesMat = new THREE.MeshStandardMaterial({ color: color });

            // Jambes
            const legGeo = new THREE.BoxGeometry(0.15, 0.7, 0.15);
            const leftLeg = new THREE.Mesh(legGeo, clothesMat);
            leftLeg.position.set(-0.12, 0.35, 0);
            const rightLeg = new THREE.Mesh(legGeo, clothesMat);
            rightLeg.position.set(0.12, 0.35, 0);
            personGroup.add(leftLeg, rightLeg); // Index 0, 1

            // Tronc
            const bodyGeo = new THREE.BoxGeometry(0.4, 0.6, 0.2);
            const body = new THREE.Mesh(bodyGeo, clothesMat);
            body.position.y = 1.0;
            personGroup.add(body); // Index 2

            // Tête
            const headGeo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
            const head = new THREE.Mesh(headGeo, skinMat);
            head.position.y = 1.45;
            personGroup.add(head); // Index 3

            // Bras
            const armGeo = new THREE.BoxGeometry(0.12, 0.5, 0.12);
            const leftArm = new THREE.Mesh(armGeo, skinMat);
            leftArm.position.set(-0.28, 1.1, 0);
            const rightArm = new THREE.Mesh(armGeo, skinMat);
            rightArm.position.set(0.28, 1.1, 0);
            personGroup.add(leftArm, rightArm); // Index 4, 5

            personGroup.position.set(x, y, z);
            personGroup.userData = {
                speed: 0.015 + Math.random() * 0.02,
                direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
                bobbing: Math.random() * Math.PI
            };

            scene.add(personGroup);
            people.push(personGroup);
        }

        function updateNPCs() {
            people.forEach(person => {
                const data = person.userData;
                person.position.addScaledVector(data.direction, data.speed);
                
                // Rotasyon pou gade kote l prale
                person.rotation.y = Math.atan2(data.direction.x, data.direction.z);

                // Animasyon mache
                data.bobbing += 0.1;
                person.children[0].rotation.x = Math.sin(data.bobbing) * 0.5;
                person.children[1].rotation.x = -Math.sin(data.bobbing) * 0.5;
                person.children[4].rotation.x = -Math.sin(data.bobbing) * 0.5;
                person.children[5].rotation.x = Math.sin(data.bobbing) * 0.5;

                // Limit miray
                if (Math.abs(person.position.x) > 45 || Math.abs(person.position.z) > 45) {
                    data.direction.multiplyScalar(-1);
                }
            });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = true; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
                    case 'KeyD': case 'ArrowRight': moveRight = true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = false; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
                    case 'KeyD': case 'ArrowRight': moveRight = false; break;
                }
            });

            // Pointer Lock pou kontwòl sourit
            document.body.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                    let newX = camera.rotation.x - e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, newX));
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Mouvman Jwè
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(-velocity.z * delta);
            camera.position.y = 1.7; // Kenbe wotè

            updateNPCs();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
