<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETWAL MALL | ULTRA-REALISTIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle, #222, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1s;
        }
        .btn {
            padding: 15px 40px; border: 2px solid #ffd700; background: none;
            color: #ffd700; cursor: pointer; font-size: 1.2rem; border-radius: 50px;
            transition: 0.3s; box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        .btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 30px #ffd700; }
        #instructions { position: absolute; bottom: 20px; left: 20px; color: #aaa; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:white; letter-spacing:10px; margin-bottom:20px;">ZETWAL MALL</h1>
        <button class="btn" onclick="startApp()">ANTRE</button>
    </div>

    <div id="instructions">ZQSD: Mache | Sourit: Vire tèt | ESC: Lage sourit</div>

    <script>
        let scene, camera, renderer, clock, velocity = new THREE.Vector3();
        let move = { f: false, b: false, l: false, r: false };
        let people = [], particles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 1, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 60); // Position haute pour l'intro

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // LUMIÈRES GÉNÉRALES
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            const centerLight = new THREE.SpotLight(0xffffff, 1.5);
            centerLight.position.set(0, 40, 0);
            centerLight.castShadow = true;
            centerLight.shadow.mapSize.width = 1024;
            scene.add(centerLight);

            // SOL MIROIR (Très réaliste)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, roughness: 0.1, metalness: 0.8 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            // BOUTIK (LAVRI ZETWAL)
            createShop(-30, -20, 0xffd700, "LAVRI");
            createShop(30, -20, 0x00aaff, "TECH");

            // PNJ & FONTAINE
            for(let i=0; i<20; i++) createNPC();
            createFountain(0,0);

            animate();
        }

        function createShop(x, z, color, label) {
            const group = new THREE.Group();
            const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 15, 2), new THREE.MeshStandardMaterial({color: 0x111111}));
            const light = new THREE.PointLight(color, 5, 25);
            light.position.set(0, 5, 3);
            group.add(wall, light);
            group.position.set(x, 7.5, z);
            scene.add(group);
        }

        function createNPC() {
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1, 4, 8), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
            body.position.set((Math.random()-0.5)*80, 1.3, (Math.random()-0.5)*80);
            body.castShadow = true;
            body.userData = { dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize() };
            people.push(body);
            scene.add(body);
        }

        function createFountain(x,z) {
            const base = new THREE.Mesh(new THREE.CylinderGeometry(5, 6, 1), new THREE.MeshStandardMaterial({color: 0x222222}));
            base.position.set(x, 0.5, z);
            scene.add(base);
        }

        function startApp() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
            
            // ZOOM CINEMATIQUE VERS LE SOL
            gsap.to(camera.position, { x: 0, y: 1.7, z: 20, duration: 3, ease: "power2.inOut" });
            document.body.requestPointerLock();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Bouje moun yo
            people.forEach(p => {
                p.position.addScaledVector(p.userData.dir, 0.05);
                if(p.position.length() > 60) p.userData.dir.negate();
            });

            // Kontwòl jwè
            if(document.pointerLockElement) {
                velocity.x -= velocity.x * 10 * delta;
                velocity.z -= velocity.z * 10 * delta;
                if(move.f) velocity.z -= 150 * delta;
                if(move.b) velocity.z += 150 * delta;
                if(move.l) velocity.x -= 150 * delta;
                if(move.r) velocity.x += 150 * delta;
                camera.translateX(velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 1.7;
            }
            renderer.render(scene, camera);
        }

        // EVENEMENTS
        window.onkeydown = (e) => {
            if(e.key.toLowerCase() == 'z' || e.key.toLowerCase() == 'w') move.f = true;
            if(e.key.toLowerCase() == 's') move.b = true;
            if(e.key.toLowerCase() == 'q' || e.key.toLowerCase() == 'a') move.l = true;
            if(e.key.toLowerCase() == 'd') move.r = true;
        };
        window.onkeyup = (e) => {
            if(e.key.toLowerCase() == 'z' || e.key.toLowerCase() == 'w') move.f = false;
            if(e.key.toLowerCase() == 's') move.b = false;
            if(e.key.toLowerCase() == 'q' || e.key.toLowerCase() == 'a') move.l = false;
            if(e.key.toLowerCase() == 'd') move.r = false;
        };
        window.onmousemove = (e) => { if(document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002; };
        window.onload = init;
    </script>
</body>
</html>
