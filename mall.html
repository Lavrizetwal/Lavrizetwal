<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETWAL MALL | Eksperyans Eksklizif</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <style>
        /* CSS : Le design de l'interface */
        body { margin: 0; overflow: hidden; background-color: #020205; font-family: 'Arial', sans-serif; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1.5s ease;
        }

        h1 { color: #ffd700; letter-spacing: 8px; font-size: 3rem; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); margin-bottom: 40px; }

        .start-btn {
            padding: 15px 50px; border: 2px solid #ffd700; background: transparent;
            color: #ffd700; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; transition: 0.4s;
        }

        .start-btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 30px #ffd700; }

        #instructions {
            position: absolute; bottom: 30px; left: 30px; color: rgba(255,255,255,0.6);
            font-size: 0.8rem; pointer-events: none; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>ZETWAL MALL</h1>
        <button class="start-btn" onclick="startApp()">Antre nan Eksperyans lan</button>
    </div>

    <div id="instructions">
        <b>KONTWÒL:</b><br>
        Z,Q,S,D : Mache<br>
        Sourit : Gade alantou
    </div>

    <script>
        /* JAVASCRIPT : Le moteur 3D */
        let scene, camera, renderer, clock;
        let people = [], particles = [];
        let move = { f: false, b: false, l: false, r: false };
        let velocity = new THREE.Vector3();

        function init() {
            // 1. Kreyasyon Scène nan
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 15, 80);

            // 2. Kamera (Zoom deyò nan kòmansman)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 100); 

            // 3. Renderer (Motè a ki desine sou ekran an)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();

            // 4. Limyè Reyalis
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const mainLight = new THREE.PointLight(0xffd700, 2, 100);
            mainLight.position.set(0, 25, 0);
            mainLight.castShadow = true;
            scene.add(mainLight);

            // 5. Planche (Sol de Mall briyan)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x080808, 
                roughness: 0.1, 
                metalness: 0.8 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 6. Eleman nan sant lan (Fontaine)
            createFountain(0, 0);

            // 7. Boutik yo
            createShop(-25, -40, 0xffd700, "LAVRI ZETWAL");
            createShop(25, -40, 0x00ffff, "TECHNOLOGY");

            // 8. PNJ (Moun k ap mache)
            for(let i=0; i<15; i++) createSmartNPC();

            // Premye rann
            renderer.render(scene, camera);
            
            // Lanse animasyon
            animate();
            setupEvents();
        }

        function createShop(x, z, color, name) {
            const group = new THREE.Group();
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(18, 12, 2), 
                new THREE.MeshStandardMaterial({color: 0x111111})
            );
            const neon = new THREE.PointLight(color, 3, 20);
            neon.position.set(0, 5, 2);
            group.add(frame, neon);
            group.position.set(x, 6, z);
            scene.add(group);
        }

        function createFountain(x, z) {
            for(let i=0; i<100; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06), 
                    new THREE.MeshBasicMaterial({color: 0x44aaff})
                );
                p.position.set(x, 0.5, z);
                p.userData = { 
                    vy: Math.random() * 0.2, 
                    vx: (Math.random()-0.5) * 0.05, 
                    vz: (Math.random()-0.5) * 0.05 
                };
                particles.push(p);
                scene.add(p);
            }
        }

        function createSmartNPC() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.25, 1, 4, 8), 
                new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff})
            );
            body.position.y = 0.9;
            g.add(body);
            g.position.set((Math.random()-0.5)*70, 0, (Math.random()-0.5)*70);
            g.userData = { 
                dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(), 
                speed: 0.02 + Math.random()*0.04 
            };
            people.push(g);
            scene.add(g);
        }

        function startApp() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 1500);
            
            // ZOOM CINEMATIQUE (GSAP)
            gsap.to(camera.position, { 
                x: 0, y: 1.7, z: 40, 
                duration: 4, 
                ease: "power3.inOut" 
            });
            
            document.body.requestPointerLock();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Animasyon Dlo
            particles.forEach(p => {
                p.position.y += p.userData.vy;
                p.position.x += p.userData.vx;
                p.position.z += p.userData.vz;
                p.userData.vy -= 0.005; 
                if(p.position.y < 0.2) {
                    p.position.set(0, 0.5, 0);
                    p.userData.vy = Math.random()*0.18;
                }
            });

            // Animasyon PNJ
            people.forEach(p => {
                p.position.addScaledVector(p.userData.dir, p.userData.speed);
                if(p.position.length() > 80) p.position.set(0,0,0);
                p.rotation.y = Math.atan2(p.userData.dir.x, p.userData.dir.z);
            });

            // Mouvman Jwè (ZQSD)
            if (document.pointerLockElement) {
                velocity.z -= velocity.z * 10 * delta;
                velocity.x -= velocity.x * 10 * delta;
                if(move.f) velocity.z -= 180 * delta;
                if(move.b) velocity.z += 180 * delta;
                if(move.l) velocity.x -= 180 * delta;
                if(move.r) velocity.x += 180 * delta;
                camera.translateZ(velocity.z * delta);
                camera.translateX(velocity.x * delta);
                camera.position.y = 1.7; 
            }

            renderer.render(scene, camera);
        }

        function setupEvents() {
            window.onkeydown = (e) => { 
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') move.f = true;
                if(k === 's') move.b = true;
                if(k === 'q' || k === 'a') move.l = true;
                if(k === 'd') move.r = true;
            };
            window.onkeyup = (e) => { 
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') move.f = false;
                if(k === 's') move.b = false;
                if(k === 'q' || k === 'a') move.l = false;
                if(k === 'd') move.r = false;
            };
            window.onmousemove = (e) => {
                if(document.pointerLockElement) camera.rotation.y -= e.movementX * 0.002;
            };
            window.onresize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
        }

        // Lancement au chargement de la fenêtre
        window.onload = init;
    </script>
</body>
</html>
