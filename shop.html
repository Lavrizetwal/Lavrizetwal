    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c; --gold-bright: #f0d060; --gold-deep: #8a6a1a; --gold-pale: #f5e6b0;
            --gold-glow: rgba(201, 168, 76, 0.2); --bg: #0d0c08; --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(20, 18, 12, 0.7);
        }
        
        .light-mode {
            --bg: #fdfdfd; --text: #1a1a1a;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.8);
            --gold: #b8860b; --gold-deep: #8a6a1a;
        }
        
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease; }
        
        #bg-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        /* --- GALAXY BACKGROUND --- */
        .galaxy-overlay { position: fixed; inset: 0; z-index: -9; pointer-events: none; background: radial-gradient(circle at center, #1a1a2e 0%, #0d0c08 100%); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) linear infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        
        .nebula{position:fixed;inset:0;z-index:-8;pointer-events:none;overflow:hidden}
        .nb{position:absolute;border-radius:50%;filter:blur(100px);animation:nd 20s ease-in-out infinite alternate}
        .nb:nth-child(1){width:800px;height:800px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(201,168,76,0.15) 0%,transparent 70%)}
        .nb:nth-child(2){width:700px;height:700px;bottom:10%;right:-100px;background:radial-gradient(circle,rgba(100,100,255,0.1) 0%,transparent 70%);animation-delay:-10s}
        @keyframes nd{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,-30px) scale(1.1)}}

        /* --- NAVIGATION --- */
        .nav { 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            background: rgba(13, 12, 8, 0.85); backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }
        .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-pale),var(--gold),transparent);background-size:200% 100%;animation:nl 5s linear infinite}
        @keyframes nl{to{background-position:200% 0}}
        
        .nav-content { display: flex; flex-direction: column; align-items: center; padding: 12px 20px; position: relative; }
        
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; text-decoration: none; color: inherit; }
        .nav-logo-img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px var(--gold-glow)); }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .logo-text span { color: var(--gold); }

        .nav-links { 
            display: flex; list-style: none; gap: 8px; margin: 0; padding: 5px; 
            overflow-x: auto; width: 100%; justify-content: center; scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a { 
            color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px;
            padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.15); transition: var(--transition); white-space: nowrap;
        }
        .nav-links a:hover, .nav-links a.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 10px var(--gold-glow); }

        /* User Auth Area */
        .user-auth-area { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        #login-trigger-btn { padding: 8px 20px; font-size: 0.65rem; border-radius: 20px; cursor: pointer; background: var(--gold); border: none; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        #user-profile-btn { cursor: pointer; display: none; align-items: center; gap: 8px; font-weight: 800; color: var(--gold); font-size: 0.75rem; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; transition: var(--transition); }
        #user-profile-btn:hover { background: var(--gold); color: #000; }
        
        #user-info-card { 
            position: fixed; top: 130px; right: 20px; width: 280px; background: rgba(13, 12, 8, 0.98); 
            backdrop-filter: blur(30px); border: 1px solid var(--gold); border-radius: 20px; 
            padding: 25px; z-index: 2005; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .info-row { margin-bottom: 15px; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 10px; text-align: left; }
        .info-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 0.85rem; font-weight: 600; }
        .admin-link { display: none; margin-top: 15px; }
        .btn-logout { margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ff4444; color: #ff4444; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.7rem; transition: 0.3s; }
        .btn-logout:hover { background: #ff4444; color: #fff; }

        /* --- SHOP GRID --- */
        .shop-container { padding: 180px 5% 80px; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; justify-content: center; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab { padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(201,168,76,0.2); background: var(--glass-bg); color: var(--text); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .category-tab.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 10px 20px var(--gold-glow); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border: 1px solid rgba(201,168,76,0.1); border-radius: 25px; overflow: hidden; transition: var(--transition); position: relative; text-decoration: none; color: inherit; display: flex; flex-direction: column; cursor: pointer; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .product-img { width: 100%; height: 280px; overflow: hidden; background: #1a1814; position: relative; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .product-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-cat { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; }
        .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
        .product-price { font-size: 1.2rem; font-weight: 800; color: var(--gold); margin-bottom: 15px; }
        .product-status-badge { align-self: flex-start; padding: 4px 12px; border-radius: 20px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: auto; }
        .status-available { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .status-unavailable { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2); }

        /* --- PRODUCT MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); padding: 20px; }
        .modal-content { background: #0d0c08; border: 1px solid var(--gold); border-radius: 30px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: row; position: relative; animation: modalIn 0.5s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 50%; color: #000; font-size: 1.2rem; cursor: pointer; z-index: 10; font-weight: bold; }
        .modal-left { flex: 1; background: #1a1814; min-height: 400px; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { flex: 1.2; padding: 50px; display: flex; flex-direction: column; }
        .modal-cat { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; margin-bottom: 10px; }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 20px; }
        .modal-price { font-size: 1.8rem; font-weight: 800; color: var(--gold); margin-bottom: 25px; }
        .modal-desc { font-size: 0.9rem; line-height: 1.8; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .modal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .meta-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(201,168,76,0.1); }
        .meta-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .meta-value { font-size: 0.8rem; font-weight: 700; }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-right { padding: 30px; }
        }

        /* --- FOOTER --- */
        footer { 
            background: rgba(13, 12, 8, 0.95); padding: 60px 5% 40px; text-align: center; 
            border-top: 1px solid rgba(201, 168, 76, 0.2); position: relative;
        }
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .social-icon img { width: 40px; height: 40px; transition: 0.3s; }
        .copyright { font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid rgba(201,168,76,0.1); padding-top: 20px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>

<script type="module">
const SUPABASE_URL = 'https://mzwibzvdcwapqrtbhxox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16d2lienZkY3dhcHFydGJoeG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzcxNTIsImV4cCI6MjA5MTc1MzE1Mn0.utazGnMswFOiArB66kfok7n2ds1Zr2wyVBRYVOFRT6c';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allProducts = [];
let currentCategory = 'all';

// Galaxy stars generation
function createStars() {
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
        container.appendChild(star);
    }
}
createStars();

async function loadProducts() {
  try {
    const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allProducts = data || [];
    renderProducts();
  } catch (e) {
    document.getElementById('products-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center;">⚠️ Erreur de chargement</div>';
    toast('Erreur: ' + e.message, 'error');
  }
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  
  let filtered = allProducts.filter(p => {
    const catMatch = currentCategory === 'all' || p.category === currentCategory;
    const searchMatch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">📦 Aucun produit trouvé</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProductModal('${p.id}')">
      <div class="product-img">
        ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem">📦</div>'}
      </div>
      <div class="product-body">
        <span class="product-cat">${p.category || 'AUTRE'}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${formatPrice(p.price)} HTG</div>
        <span class="product-status-badge ${p.availability !== 'Non disponible' ? 'status-available' : 'status-unavailable'}">
          ${p.availability !== 'Non disponible' ? '✓ Disponible' : '✗ Vendu'}
        </span>
      </div>
    </div>
  `).join('');
}

window.openProductModal = (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-img').src = p.image_url || '';
    document.getElementById('modal-cat').textContent = p.category || 'AUTRE';
    document.getElementById('modal-title').textContent = p.name;
    document.getElementById('modal-price').textContent = formatPrice(p.price) + ' HTG';
    document.getElementById('modal-desc').textContent = p.description || 'Pas de description disponible.';
    
    // Availability display
    let availText = p.availability === 'Non disponible' ? 'Indisponible' : 'Disponible';
    if (p.availability === 'Disponible' && p.delivery_time) {
        availText += ` (Sous ${p.delivery_time}h)`;
    }
    document.getElementById('modal-avail').textContent = availText;
    document.getElementById('modal-delivery').textContent = p.delivery_available ? 'Possible' : 'Retrait uniquement';
    
    document.getElementById('product-modal').style.display = 'flex';
};

window.closeProductModal = () => {
    document.getElementById('product-modal').style.display = 'none';
};

window.filterByCategory = (cat) => {
  currentCategory = cat;
  document.querySelectorAll('.category-tab').forEach(tab => {
      const text = tab.textContent.trim();
      const target = cat === 'all' ? 'Tout' : (cat === 'Beauté & Soins' ? 'Beauté et soins' : (cat === 'Électronique' ? 'Électroniques' : (cat === 'Aliment' ? 'Aliments' : (cat === 'Vêtement' ? 'Vêtements' : (cat === 'Accessoire' ? 'Accessoires' : (cat === 'Autre' ? 'Autres' : cat))))));
      tab.classList.toggle('active', text === target);
  });
  renderProducts();
};

window.filterProducts = () => renderProducts();
function formatPrice(n) { return new Intl.NumberFormat('fr-HT').format(n || 0); }
function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + type; setTimeout(() => t.classList.remove('show'), 3000); }

loadProducts();

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
    authDomain: "lavrizetwal.firebaseapp.com",
    projectId: "lavrizetwal",
    storageBucket: "lavrizetwal.firebasestorage.app",
    messagingSenderId: "291921316186",
    appId: "1:291921316186:web:f55e8b34526960df394b63"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db_fs = firebase.firestore();

const ADMIN_EMAILS = ['mikenestorlive@gmail.com', 'schnaydernaderice1@gmail.com'];

auth.onAuthStateChanged(user => {
    const loginBtn = document.getElementById('login-trigger-btn');
    const profileBtn = document.getElementById('user-profile-btn');
    if (user) {
        loginBtn.style.display = 'none';
        profileBtn.style.display = 'flex';
        document.getElementById('display-name-nav').textContent = user.displayName || user.email;
        
        const isAdmin = ADMIN_EMAILS.includes(user.email);
        document.getElementById('card-name').textContent = user.displayName || user.email;
        document.getElementById('card-status').textContent = isAdmin ? 'Admin' : 'Utilisateur';
        if (isAdmin) document.getElementById('admin-access').style.display = 'block';
        
        db_fs.collection('users').doc(user.uid).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('card-points').textContent = (data.points || 0).toFixed(1);
            }
        });
    } else {
        loginBtn.style.display = 'block';
        profileBtn.style.display = 'none';
    }
});

window.toggleAuthModal = (s) => {
    if (s) {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => toast(e.message, 'error'));
    }
};
window.handleLogout = () => auth.signOut().then(() => location.reload());
window.toggleInfoCard = () => { const c = document.getElementById('user-info-card'); c.style.display = c.style.display === 'block' ? 'none' : 'block'; };
</script>
</body>
</html>
