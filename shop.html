<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL SHOP | Boutik an liy</title>
    
    <!-- Scripts Externes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c; --gold-bright: #f0d060; --gold-deep: #8a6a1a; --gold-pale: #f5e6b0;
            --gold-glow: rgba(201, 168, 76, 0.2); --bg: #0d0c08; --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(20, 18, 12, 0.7);
        }
        
        .light-mode {
            --bg: #fdfdfd; --text: #1a1a1a;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.8);
            --gold: #b8860b; --gold-deep: #8a6a1a;
        }
        
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease; }
        
        #bg-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        /* --- NEBULA --- */
        .nebula{position:fixed;inset:0;z-index:-9;pointer-events:none;overflow:hidden}
        .nb{position:absolute;border-radius:50%;filter:blur(100px);animation:nd 20s ease-in-out infinite alternate}
        .nb:nth-child(1){width:600px;height:600px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(201,168,76,0.1)0%,transparent 70%)}
        .nb:nth-child(2){width:500px;height:500px;bottom:10%;right:-100px;background:radial-gradient(circle,rgba(255,255,255,0.05)0%,transparent 70%);animation-delay:-10s}
        @keyframes nd{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.05)}}

        /* --- NAVIGATION --- */
        .nav { 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            background: rgba(13, 12, 8, 0.85); backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }
        .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-pale),var(--gold),transparent);background-size:200% 100%;animation:nl 5s linear infinite}
        @keyframes nl{to{background-position:200% 0}}
        
        .nav-content { display: flex; flex-direction: column; align-items: center; padding: 12px 20px; position: relative; }
        
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; text-decoration: none; color: inherit; }
        .nav-logo-img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px var(--gold-glow)); }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .logo-text span { color: var(--gold); }

        /* User Auth Area */
        .user-auth-area { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        #login-trigger-btn { padding: 8px 20px; font-size: 0.65rem; border-radius: 20px; cursor: pointer; background: var(--gold); border: none; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        #user-profile-btn { cursor: pointer; display: none; align-items: center; gap: 8px; font-weight: 800; color: var(--gold); font-size: 0.75rem; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; transition: var(--transition); }
        #user-profile-btn:hover { background: var(--gold); color: #000; }
        
        #user-info-card { 
            position: fixed; top: 120px; right: 20px; width: 280px; background: rgba(13, 12, 8, 0.98); 
            backdrop-filter: blur(30px); border: 1px solid var(--gold); border-radius: 20px; 
            padding: 25px; z-index: 2005; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .info-row { margin-bottom: 15px; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 10px; text-align: left; }
        .info-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 0.85rem; font-weight: 600; }
        .admin-link { display: none; margin-top: 15px; }
        .btn-logout { margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ff4444; color: #ff4444; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.7rem; transition: 0.3s; }
        .btn-logout:hover { background: #ff4444; color: #fff; }

        /* Auth Modal */
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .auth-modal { background: #0d0c08; border: 1px solid var(--gold); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 15px; outline: none; font-family: 'Montserrat', sans-serif; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-size: 0.75rem; }
        .btn-google { background: #fff; color: #000; }
        .btn-phone { background: var(--gold); color: #000; }

        .nav-links { 
            display: flex; list-style: none; gap: 10px; margin: 0; padding: 5px; 
            overflow-x: auto; width: 100%; justify-content: center; scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a { 
            color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1.5px;
            padding: 7px 15px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.25); transition: var(--transition); 
        }
        .nav-links a:hover, .nav-links a.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 15px var(--gold-glow); }

        .theme-toggle { position: fixed; top: 160px; right: 20px; z-index: 2000; background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px var(--gold-glow); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .theme-toggle:hover { transform: rotate(180deg) scale(1.1); }

        /* --- FOOTER --- */
        footer { 
            background: rgba(13, 12, 8, 0.95); padding: 80px 5% 40px; text-align: center; 
            border-top: 1px solid rgba(201, 168, 76, 0.2); position: relative;
        }
        footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
        
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--white); margin-bottom: 30px; }
        .footer-logo span { color: var(--gold); }
        
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .social-icon img { width: 40px; height: 40px; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(201,168,76,0.3)); }
        .social-icon:hover img { transform: scale(1.2); filter: drop-shadow(0 0 15px var(--gold)); }
        
        .copyright { font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid rgba(201,168,76,0.1); padding-top: 20px; }

    /* ============================================================
       SHOP SPECIFIC STYLES
    ============================================================ */

    /* SEARCH BAR */
    .search-section {
      margin-bottom: 30px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: var(--tr);
    }
    .search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
    }
    .search-input::placeholder { color: var(--text-muted); }

    /* CATEGORY TABS */
    .category-tabs {
      display: flex; gap: 8px; margin-bottom: 28px;
      overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab {
      flex-shrink: 0; padding: 9px 20px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: var(--tr);
    }
    .category-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .category-tab.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #000;
      border-color: var(--gold); box-shadow: 0 0 16px rgba(255,215,0,0.3);
    }

    /* PRODUCTS GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: var(--tr); cursor: pointer;
      text-decoration: none; color: inherit;
      display: block;
    }
    .product-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }
    .product-img {
      width: 100%; height: 200px; object-fit: cover;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; position: relative; overflow: hidden;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.02);
    }
    .product-body { padding: 16px; }
    .product-cat {
      display: inline-block;
      font-size: 0.55rem; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,215,0,0.7);
      border: 1px solid rgba(255,215,0,0.2);
      padding: 2px 8px; border-radius: 12px;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 0.95rem; font-weight: 700;
      margin-bottom: 6px; line-height: 1.3;
    }
    .product-price {
      font-size: 1.1rem; font-weight: 800; color: var(--gold);
      margin-bottom: 8px; font-family: 'Playfair Display', serif;
    }
    .product-desc {
      font-size: 0.7rem; color: var(--text-muted);
      line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-meta {
      display: flex; gap: 10px; flex-wrap: wrap;
      font-size: 0.62rem; color: var(--text-muted);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .product-status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.58rem; font-weight: 700; letter-spacing: 1px;
      margin-top: 8px;
    }
    .status-available {
      background: rgba(0,255,136,0.1); color: var(--green);
      border: 1px solid rgba(0,255,136,0.2);
    }
    .status-unavailable {
      background: rgba(255,68,68,0.1); color: var(--red);
      border: 1px solid rgba(255,68,68,0.2);
    }
    .delivery-info {
      font-size: 0.6rem; color: var(--text-muted);
      margin-top: 6px;
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-sub { font-size: 0.75rem; line-height: 1.6; }

    /* LOADING */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 0.85rem;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* COLOR DOTS */
    .color-dots { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      display: inline-block;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(10,10,10,0.95); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 24px; font-size: 0.75rem; font-weight: 600;
      color: var(--gold); z-index: 9000; transition: transform 0.4s cubic-bezier(0.165,0.84,0.44,1), opacity 0.4s;
      opacity: 0; pointer-events: none; backdrop-filter: blur(12px); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(0,255,136,0.3); color: var(--green); }
    .toast.error { border-color: rgba(255,68,68,0.3); color: var(--red); }

    /* NEBULA BG */
    .nebula { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .nb { position: absolute; border-radius: 50%; filter: blur(80px); animation: nd 22s ease-in-out infinite alternate; }
    .nb:nth-child(1) { width: 400px; height: 400px; top: -80px; left: -80px; background: radial-gradient(circle, rgba(100,60,200,0.1) 0%, transparent 70%); }
    .nb:nth-child(2) { width: 350px; height: 350px; bottom: 10%; right: -60px; background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%); animation-delay: -10s; }
    @keyframes nd { 0% { transform: translate(0,0) scale(1) } 100% { transform: translate(20px,-15px) scale(1.05) } }
  </style>
</head>
<body>

<div class="nebula"><div class="nb"></div><div class="nb"></div></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="nav-home">← Retour</a>
  <a href="/" class="nav-logo">ZETWAL <span>SHOP</span></a>
  <div style="width: 60px;"></div>
</nav>

<!-- MAIN CONTENT -->
<main class="main">
  <!-- SEARCH -->
  <div class="search-section">
    <input type="text" id="search-input" class="search-input" placeholder="Rechercher un produit par nom..." oninput="filterProducts()">
  </div>

  <!-- CATEGORY TABS -->
  <div class="category-tabs" id="category-tabs">
    <button class="category-tab active" onclick="filterByCategory('all')">Tous</button>
    <button class="category-tab" onclick="filterByCategory('vetement')">Vêtements</button>
    <button class="category-tab" onclick="filterByCategory('chaussures')">Chaussures</button>
    <button class="category-tab" onclick="filterByCategory('aliment')">Aliments</button>
    <button class="category-tab" onclick="filterByCategory('electronique')">Électronique</button>
    <button class="category-tab" onclick="filterByCategory('maison')">Maison</button>
    <button class="category-tab" onclick="filterByCategory('beaute')">Beauté</button>
    <button class="category-tab" onclick="filterByCategory('sport')">Sport</button>
    <button class="category-tab" onclick="filterByCategory('accessoire')">Accessoires</button>
    <button class="category-tab" onclick="filterByCategory('autre')">Autre</button>
  </div>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="products-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Chargement des produits...</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://mzwibzvdcwapqrtbhxox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16d2lienZkY3dhcHFydGJoeG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzcxNTIsImV4cCI6MjA5MTc1MzE1Mn0.utazGnMswFOiArB66kfok7n2ds1Zr2wyVBRYVOFRT6c';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allProducts = [];
let currentCategory = 'all';

// Labels de catégories
const catLabels = {
  vetement: 'Vêtement',
  chaussures: 'Chaussures',
  aliment: 'Aliment',
  electronique: 'Électronique',
  maison: 'Maison',
  beaute: 'Beauté & Soins',
  sport: 'Sport',
  accessoire: 'Accessoire',
  autre: 'Autre'
};

// ============================================================
// CHARGEMENT DES PRODUITS
// ============================================================
async function loadProducts() {
  try {
    const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allProducts = data || [];
    renderProducts();
  } catch (e) {
    console.error('Erreur chargement:', e);
    document.getElementById('products-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Erreur de chargement</div>
        <div class="empty-sub">Impossible de charger les produits. Vérifiez votre connexion.</div>
      </div>
    `;
    toast('Erreur: ' + e.message, 'error');
  }
}

// ============================================================
// AFFICHAGE DES PRODUITS
// ============================================================
function renderProducts() {
  const grid = document.getElementById('products-grid');
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  
  let filtered = allProducts.filter(p => {
    // Filtre par catégorie
    const catMatch = currentCategory === 'all' || p.category === currentCategory;
    // Filtre par recherche
    const searchMatch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <div class="empty-title">Aucun produit trouvé</div>
        <div class="empty-sub">${searchTerm ? 'Essayez avec un autre terme de recherche.' : 'Aucun produit dans cette catégorie pour le moment.'}</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const isAvailable = p.availability === 'available' || p.status === 'available';
    const catLabel = catLabels[p.category] || p.category || 'Autre';
    
    // Couleurs
    let colorsHtml = '';
    if (p.colors && p.colors.length > 0) {
      colorsHtml = `<div class="color-dots">${p.colors.map(c => {
        const colorCode = getColorCode(c);
        return `<span class="color-dot" style="background:${colorCode}" title="${escHtml(c)}"></span>`;
      }).join('')}</div>`;
    }

    // Info livraison / disponibilité
    let metaInfo = '';
    if (isAvailable) {
      if (p.delivery_possible) {
        metaInfo = `<div class="delivery-info">🚚 Livraison: ${p.delivery_hours || '?'}h</div>`;
      } else {
        metaInfo = `<div class="delivery-info">📦 Retrait en magasin uniquement</div>`;
      }
    } else if (p.available_date) {
      const date = new Date(p.available_date).toLocaleDateString('fr-FR');
      metaInfo = `<div class="delivery-info">📅 Disponible le: ${date}</div>`;
    }

    // Quantité
    const qtyInfo = p.quantity !== undefined && p.quantity !== null ? `<span>📦 ${p.quantity} en stock</span>` : '';

    return `
      <a href="/product.html?id=${p.id}" class="product-card">
        <div class="product-img">
          ${p.image_url ? `<img src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}" loading="lazy">` : '<div class="product-img-placeholder">📦</div>'}
        </div>
        <div class="product-body">
          <span class="product-cat">${escHtml(catLabel)}</span>
          <div class="product-name">${escHtml(p.name)}</div>
          <div class="product-price">${formatPrice(p.price)} HTG</div>
          ${p.description ? `<div class="product-desc">${escHtml(p.description)}</div>` : ''}
          ${colorsHtml}
          <div class="product-meta">
            ${qtyInfo}
          </div>
          <span class="product-status-badge ${isAvailable ? 'status-available' : 'status-unavailable'}">
            ${isAvailable ? '✓ Disponible' : '✗ Indisponible'}
          </span>
          ${metaInfo}
        </div>
      </a>
    `;
  }).join('');
}

// ============================================================
// FILTRES
// ============================================================
window.filterByCategory = (cat) => {
  currentCategory = cat;
  
  // Update active tab
  document.querySelectorAll('.category-tab').forEach(tab => {
    tab.classList.remove('active');
  });
  event.target.classList.add('active');
  
  renderProducts();
};

window.filterProducts = () => {
  renderProducts();
};

// ============================================================
// UTILITAIRES
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPrice(n) {
  return new Intl.NumberFormat('fr-HT').format(n ?? 0);
}

function getColorCode(colorName) {
  const colors = {
    noir: '#000000', blanc: '#ffffff', gris: '#808080',
    rouge: '#ff0000', bleu: '#0000ff', vert: '#00ff00',
    jaune: '#ffff00', orange: '#ffa500', violet: '#800080',
    rose: '#ffc0cb', marron: '#8b4513', beige: '#f5f5dc'
  };
  const lower = colorName.toLowerCase().trim();
  return colors[lower] || colorName;
}

function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// INIT
// ============================================================
loadProducts();
</script>
