<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL SHOP | Boutik an liy</title>
    
    <!-- Scripts Externes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c; --gold-bright: #f0d060; --gold-deep: #8a6a1a; --gold-pale: #f5e6b0;
            --gold-glow: rgba(201, 168, 76, 0.2); --bg: #0d0c08; --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(20, 18, 12, 0.7);
        }
        
        .light-mode {
            --bg: #fdfdfd; --text: #1a1a1a;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.8);
            --gold: #b8860b; --gold-deep: #8a6a1a;
        }
        
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease; }
        
        #bg-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        /* --- NEBULA --- */
        .nebula{position:fixed;inset:0;z-index:-9;pointer-events:none;overflow:hidden}
        .nb{position:absolute;border-radius:50%;filter:blur(100px);animation:nd 20s ease-in-out infinite alternate}
        .nb:nth-child(1){width:600px;height:600px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(201,168,76,0.1)0%,transparent 70%)}
        .nb:nth-child(2){width:500px;height:500px;bottom:10%;right:-100px;background:radial-gradient(circle,rgba(255,255,255,0.05)0%,transparent 70%);animation-delay:-10s}
        @keyframes nd{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.05)}}

        /* --- NAVIGATION --- */
        .nav { 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            background: rgba(13, 12, 8, 0.85); backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }
        .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-pale),var(--gold),transparent);background-size:200% 100%;animation:nl 5s linear infinite}
        @keyframes nl{to{background-position:200% 0}}
        
        .nav-content { display: flex; flex-direction: column; align-items: center; padding: 12px 20px; position: relative; }
        
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; text-decoration: none; color: inherit; }
        .nav-logo-img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px var(--gold-glow)); }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .logo-text span { color: var(--gold); }

        /* User Auth Area */
        .user-auth-area { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        #login-trigger-btn { padding: 8px 20px; font-size: 0.65rem; border-radius: 20px; cursor: pointer; background: var(--gold); border: none; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        #user-profile-btn { cursor: pointer; display: none; align-items: center; gap: 8px; font-weight: 800; color: var(--gold); font-size: 0.75rem; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; transition: var(--transition); }
        #user-profile-btn:hover { background: var(--gold); color: #000; }
        
        #user-info-card { 
            position: fixed; top: 120px; right: 20px; width: 280px; background: rgba(13, 12, 8, 0.98); 
            backdrop-filter: blur(30px); border: 1px solid var(--gold); border-radius: 20px; 
            padding: 25px; z-index: 2005; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .info-row { margin-bottom: 15px; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 10px; text-align: left; }
        .info-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 0.85rem; font-weight: 600; }
        .admin-link { display: none; margin-top: 15px; }
        .btn-logout { margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ff4444; color: #ff4444; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.7rem; transition: 0.3s; }
        .btn-logout:hover { background: #ff4444; color: #fff; }

        /* Auth Modal */
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .auth-modal { background: #0d0c08; border: 1px solid var(--gold); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 15px; outline: none; font-family: 'Montserrat', sans-serif; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-size: 0.75rem; }
        .btn-google { background: #fff; color: #000; }
        .btn-phone { background: var(--gold); color: #000; }

        .nav-links { 
            display: flex; list-style: none; gap: 10px; margin: 0; padding: 5px; 
            overflow-x: auto; width: 100%; justify-content: center; scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a { 
            color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1.5px;
            padding: 7px 15px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.25); transition: var(--transition); 
        }
        .nav-links a:hover, .nav-links a.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 15px var(--gold-glow); }

        .theme-toggle { position: fixed; top: 160px; right: 20px; z-index: 2000; background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px var(--gold-glow); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .theme-toggle:hover { transform: rotate(180deg) scale(1.1); }

        /* --- SHOP GRID --- */
        .shop-container { padding: 180px 5% 80px; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; justify-content: center; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab { padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(201,168,76,0.2); background: var(--glass-bg); color: var(--text); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .category-tab.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 10px 20px var(--gold-glow); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border: 1px solid rgba(201,168,76,0.1); border-radius: 25px; overflow: hidden; transition: var(--transition); position: relative; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .product-img { width: 100%; height: 280px; overflow: hidden; background: #1a1814; position: relative; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .product-card:hover .product-img img { transform: scale(1.1); }
        .product-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-cat { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; }
        .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
        .product-price { font-size: 1.2rem; font-weight: 800; color: var(--gold); margin-bottom: 15px; }
        .product-status-badge { align-self: flex-start; padding: 4px 12px; border-radius: 20px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: auto; }
        .status-available { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .status-unavailable { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2); }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 100px 20px; }
        .empty-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }
        .empty-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .empty-sub { color: rgba(255,255,255,0.5); }

        /* --- FOOTER --- */
        footer { 
            background: rgba(13, 12, 8, 0.95); padding: 80px 5% 40px; text-align: center; 
            border-top: 1px solid rgba(201, 168, 76, 0.2); position: relative;
        }
        footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .social-icon img { width: 40px; height: 40px; transition: 0.3s; }
        .copyright { font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid rgba(201,168,76,0.1); padding-top: 20px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="nebula"><div class="nb"></div><div class="nb"></div></div>

<nav class="nav">
    <div class="nav-content">
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Zetwal Logo" class="nav-logo-img">
            <div class="logo-text">ZETWAL <span>SHOP</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="lavri.html">Lavri</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="mall.html">Mall</a></li>
            <li><a href="cinema.html">Cinema</a></li>
        </ul>
        <div class="user-auth-area">
            <button id="login-trigger-btn" onclick="toggleAuthModal(true)">Konekte</button>
            <div id="user-profile-btn" onclick="toggleInfoCard()">
                <span id="display-name-nav">Profil</span>
            </div>
        </div>
    </div>
</nav>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div id="user-info-card">
    <div class="info-row"><div class="info-label">Non</div><div class="info-value" id="card-name">—</div></div>
    <div class="info-row"><div class="info-label">Estati</div><div class="info-value" id="card-status">Utilisateur</div></div>
    <div class="info-row"><div class="info-label">Pwen Zetwal</div><div class="info-value" id="card-points">0.0</div></div>
    <a href="admin.html" id="admin-access" class="admin-link"><button class="btn-auth btn-phone">Administrasyon</button></a>
    <button class="btn-logout" onclick="handleLogout()">Dekonekte</button>
</div>

<div class="shop-container">
    <div style="text-align:center; margin-bottom:60px;">
        <h1 style="font-family:'Cormorant Garamond',serif; font-size:3.5rem; margin-bottom:10px;">Boutik Eksklizif</h1>
        <p style="color:var(--gold); letter-spacing:4px; text-transform:uppercase; font-size:0.7rem; font-weight:800;">Chwazi pi bon pwodwi yo pou ou</p>
    </div>

    <div class="category-tabs">
        <button class="category-tab active" onclick="filterByCategory('all')">Tout</button>
        <button class="category-tab" onclick="filterByCategory('Vêtement')">Vêtement</button>
        <button class="category-tab" onclick="filterByCategory('Chaussures')">Chaussures</button>
        <button class="category-tab" onclick="filterByCategory('Aliment')">Aliment</button>
        <button class="category-tab" onclick="filterByCategory('Électronique')">Électronique</button>
        <button class="category-tab" onclick="filterByCategory('Accessoire')">Accessoire</button>
    </div>

    <div style="margin-bottom:40px; max-width:600px; margin-left:auto; margin-right:auto; position:relative;">
        <input type="text" id="search-input" style="width:100%; padding:15px 25px; border-radius:30px; border:1px solid rgba(201,168,76,0.3); background:var(--glass-bg); color:#fff; outline:none;" placeholder="Chèche yon pwodwi..." oninput="filterProducts()">
    </div>

    <div class="products-grid" id="products-grid">
        <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Chargement...</div></div>
    </div>
</div>

<div class="auth-overlay" id="auth-modal">
    <div class="auth-modal">
        <h2 style="color:var(--gold); margin-bottom:25px;">Koneksyon</h2>
        <button class="btn-auth btn-google" onclick="loginWithGoogle()">Konekte ak Google</button>
        <div style="margin:20px 0; color:rgba(255,255,255,0.3); font-size:0.7rem;">OU</div>
        <input type="tel" id="phone-input" class="auth-input" placeholder="+509 XXXX XXXX">
        <button class="btn-auth btn-phone" onclick="loginWithPhone()">Konekte ak Telefòn</button>
        <button class="btn-auth" style="background:transparent; color:rgba(255,255,255,0.5);" onclick="toggleAuthModal(false)">Anile</button>
    </div>
</div>

<footer>
    <div class="social-icons">
        <a href="https://wa.me/79961103506" class="social-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"></a>
        <a href="https://t.me/MikeNestor14" class="social-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram"></a>
    </div>
    <div class="copyright">© 2026 ZETWAL ORGANISATION — TOUT DWA REZÈVE.</div>
</footer>

<div class="toast" id="toast"></div>

<script type="module">
const SUPABASE_URL = 'https://mzwibzvdcwapqrtbhxox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16d2lienZkY3dhcHFydGJoeG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzcxNTIsImV4cCI6MjA5MTc1MzE1Mn0.utazGnMswFOiArB66kfok7n2ds1Zr2wyVBRYVOFRT6c';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allProducts = [];
let currentCategory = 'all';

async function loadProducts() {
  try {
    const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allProducts = data || [];
    renderProducts();
  } catch (e) {
    document.getElementById('products-grid').innerHTML = '<div class="empty-state">⚠️ Erreur de chargement</div>';
    toast('Erreur: ' + e.message, 'error');
  }
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  
  let filtered = allProducts.filter(p => {
    const catMatch = currentCategory === 'all' || p.category === currentCategory;
    const searchMatch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">📦 Aucun produit trouvé</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem">📦</div>'}
      </div>
      <div class="product-body">
        <span class="product-cat">${p.category || 'AUTRE'}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${formatPrice(p.price)} HTG</div>
        <span class="product-status-badge ${p.availability !== 'Non disponible' ? 'status-available' : 'status-unavailable'}">
          ${p.availability !== 'Non disponible' ? '✓ Disponible' : '✗ Vendu'}
        </span>
      </div>
    </div>
  `).join('');
}

window.filterByCategory = (cat) => {
  currentCategory = cat;
  document.querySelectorAll('.category-tab').forEach(tab => tab.classList.toggle('active', tab.textContent === (cat === 'all' ? 'Tout' : cat)));
  renderProducts();
};

window.filterProducts = () => renderProducts();
function formatPrice(n) { return new Intl.NumberFormat('fr-HT').format(n || 0); }
function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + type; setTimeout(() => t.classList.remove('show'), 3000); }

loadProducts();

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
    authDomain: "lavrizetwal.firebaseapp.com",
    projectId: "lavrizetwal",
    storageBucket: "lavrizetwal.firebasestorage.app",
    messagingSenderId: "291921316186",
    appId: "1:291921316186:web:f55e8b34526960df394b63"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db_fs = firebase.firestore();

auth.onAuthStateChanged(user => {
    const loginBtn = document.getElementById('login-trigger-btn');
    const profileBtn = document.getElementById('user-profile-btn');
    if (user) {
        loginBtn.style.display = 'none';
        profileBtn.style.display = 'flex';
        document.getElementById('display-name-nav').textContent = user.displayName || user.email;
        db_fs.collection('users').doc(user.uid).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('card-name').textContent = data.name || user.displayName;
                document.getElementById('card-status').textContent = data.isAdmin ? 'Administratè' : 'Utilisateur';
                document.getElementById('card-points').textContent = (data.points || 0).toFixed(1);
                if (data.isAdmin) document.getElementById('admin-access').style.display = 'block';
            }
        });
    } else {
        loginBtn.style.display = 'block';
        profileBtn.style.display = 'none';
    }
});

window.toggleAuthModal = (s) => document.getElementById('auth-modal').style.display = s ? 'flex' : 'none';
window.loginWithGoogle = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => toggleAuthModal(false));
window.handleLogout = () => auth.signOut().then(() => location.reload());
window.toggleInfoCard = () => { const c = document.getElementById('user-info-card'); c.style.display = c.style.display === 'block' ? 'none' : 'block'; };
window.toggleTheme = () => { document.body.classList.toggle('light-mode'); };
</script>
</body>
</html>
