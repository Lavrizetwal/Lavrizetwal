            pic: "La coupe à 5 dans le décompte",
            analyse: "L'arrêt à 5 dans le décompte est sadique dans le bon sens du terme. Le public avait 10 secondes pour se préparer. Il n'en a reçu que 5. Et maintenant il faut attendre l'épisode 3.",
            partage: "Les gens vont poster leur réaction à cette coupure. Les vidéos de réaction à cet instant vont générer des millions de vues supplémentaires.",
            picScore: 10.0
        }];

        const palette = {
            "EXPLOSION VIRALE": "#EF4444",
            "ESSENTIEL": "#10B981",
            "VIRAL": "#6366F1",
            "FORT": "#F59E0B",
            "SIGNATURE": "#C9A84B",
        };

        const scoreGlobal = (scenes.reduce((s, sc) => s + sc.score, 0) / scenes.length).toFixed(1);

        const topMoments = [...scenes].sort((a, b) => b.picScore - a.picScore).slice(0, 5);

        // ═══════════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════════

        let activeScene = null; // index
        let currentTab = 'scenes';

        // ═══════════════════════════════════════════════════════════════
        //  DOM REFS
        // ═══════════════════════════════════════════════════════════════

        const statsEl = document.getElementById('stats');
        const sceneListEl = document.getElementById('scene-list');
        const topListEl = document.getElementById('top-list');
        const verdictEl = document.getElementById('verdict-content');
        const panels = {
            scenes: document.getElementById('panel-scenes'),
            top: document.getElementById('panel-top'),
            verdict: document.getElementById('panel-verdict'),
        };
        const tabBtns = document.querySelectorAll('.tab-btn');

        // ═══════════════════════════════════════════════════════════════
        //  RENDER HELPERS
        // ═══════════════════════════════════════════════════════════════

        function getScoreColor(score) {
            if (score >= 9.8) return '#EF4444';
            if (score >= 9.3) return '#10B981';
            if (score >= 9.0) return '#6366F1';
            return '#F59E0B';
        }

        function renderStats() {
            const items = [
                { v: `${scoreGlobal}/10`, l: 'Score global', c: '#EF4444' },
                { v: '3', l: 'Explosions virales', c: '#EF4444' },
                { v: '5', l: 'Moments VIRAL', c: '#6366F1' },
                { v: '~8min 20', l: 'Durée totale', c: '#C9A84B' },
            ];
            statsEl.innerHTML = items.map(k =>
                `<div class="stats-item">
              <div class="num" style="color:${k.c}">${k.v}</div>
              <div class="label">${k.l}</div>
            </div>`
            ).join('');
        }

        function renderScenes() {
            let html = '';
            scenes.forEach((s, i) => {
                const active = activeScene === i;
                const tagColor = palette[s.tag] || '#888';
                const scoreCol = getScoreColor(s.score);
                const borderCol = active ? s.couleur : '#1A1A28';
                html += `
              <div class="scene-item ${active ? 'active' : ''}" data-index="${i}" style="--scene-border:${borderCol}; border-left-color:${borderCol};">
                <div class="scene-row">
                  <span class="scene-id">${s.id}</span>
                  <span class="scene-title">${s.titre}</span>
                  <span class="scene-duree">${s.duree}</span>
                  <span class="scene-tag" style="background:${tagColor}22;color:${tagColor}">${s.tag}</span>
                  <span class="scene-score" style="color:${scoreCol}">${s.score}</span>
                </div>
                <div class="scene-bar">
                  <div class="scene-bar-inner" style="width:${s.score * 10}%;background:${s.couleur}"></div>
                </div>
                ${active ? `
                <div class="scene-detail">
                  <div class="scene-pic" style="--pic-bg:${s.couleur}11;--pic-border:${s.couleur}33;--pic-color:${s.couleur}">
                    ✦ ${s.pic}
                  </div>
                  <div class="detail-label" style="color:${s.couleur}">ANALYSE</div>
                  <p class="detail-text">${s.analyse}</p>
                  <div class="detail-share-label">POTENTIEL DE PARTAGE</div>
                  <p class="detail-share">${s.partage}</p>
                </div>
                ` : ''}
              </div>
            `;
            });
            sceneListEl.innerHTML = html;

            // click handlers
            document.querySelectorAll('#scene-list .scene-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index, 10);
                    activeScene = (activeScene === idx) ? null : idx;
                    renderScenes();
                });
            });
        }

        function renderTop() {
            let html = '';
            topMoments.forEach((m, i) => {
                const col = m.couleur;
                html += `
              <div class="top-card" style="border-left-color:${col};border-color:${col}33;">
                <div class="top-header">
                  <div class="top-rank" style="color:${col}">#${i + 1}</div>
                  <div class="top-info">
                    <div class="top-title">${m.titre}</div>
                    <div class="top-pic" style="color:${col}">${m.pic}</div>
                  </div>
                  <div class="top-right">
                    <div class="top-score" style="color:${col}">${m.picScore}</div>
                    <div class="top-score-label">score viral</div>
                  </div>
                </div>
                <p class="top-analyse">${m.analyse}</p>
                <div class="top-share" style="border-color:${col}22;">
                  <span class="top-share-label" style="color:${col}">PARTAGE → </span>
                  <span class="top-share-text">${m.partage}</span>
                </div>
              </div>
            `;
            });
            topListEl.innerHTML = html;
        }

        function renderVerdict() {
            const comps = [
                { cat: 'Moment le plus viral', ep1: 'Punchline — "I am a fucking predator"', ep2: 'Nema retire le pénis + "sal chien"' },
                { cat: 'Image la plus forte', ep1: 'Mike traverse le corps de Kron', ep2: 'Valdrak avec 3 têtes' },
                { cat: 'Moment émotionnel', ep1: 'Yeux qui s\'ouvrent ensemble', ep2: '"Je peux mourir pour toi Mike"' },
                { cat: 'Cliffhanger', ep1: 'Annonce duel à mort', ep2: 'Décompte coupé à 5' },
                { cat: 'Surprise narrative', ep1: 'Dessalines dans l\'arène', ep2: 'Schnayderna devient stratège' },
            ];

            const whatItems = [
                "L'EP2 montre MORTEX à travers un autre combat — le public comprend l'échelle sans qu'on le lui explique.",
                "L'EP2 introduit Schnayderna comme personnage actif — pas juste émotionnel. Elle pense, analyse, stratégise.",
                "L'EP2 humanise Mike en dehors de l'arène — ses peurs, son couple, sa foi dans 'Dieu et les esprits'.",
                "L'EP2 crée une attente pure avec le décompte coupé à 5 — l'EP1 livrait sa résolution. L'EP2 la refuse.",
                "Le surnom 'L'Innocente' pour Nema installe une règle implicite de MORTEX — les apparences ne signifient rien.",
            ];

            let html = `
            <!-- global -->
            <div class="verdict-global">
              <div class="verdict-global-label">SCORE GLOBAL VIRALITÉ — ÉPISODE 2</div>
              <div class="verdict-global-num">${scoreGlobal}<span>/10</span></div>
              <div class="verdict-global-sub">Plus viral que l'épisode 1. Le plus fort de la série jusqu'ici.</div>
            </div>

            <!-- comparaison -->
            <div class="compare-label">COMPARAISON EP1 VS EP2</div>
          `;

            comps.forEach(r => {
                html += `
              <div class="compare-item">
                <div class="compare-cat">${r.cat}</div>
                <div class="compare-row">
                  <div class="compare-ep ep1">
                    <div class="ep-label">EP1</div>
                    <div class="ep-text">${r.ep1}</div>
                  </div>
                  <div class="compare-ep ep2">
                    <div class="ep-label">EP2</div>
                    <div class="ep-text">${r.ep2}</div>
                  </div>
                </div>
              </div>
            `;
            });

            html += `
            <!-- what -->
            <div class="what-box">
              <div class="what-label">CE QUE L'EP2 FAIT QUE L'EP1 NE FAIT PAS</div>
          `;
            whatItems.forEach(p => {
                html += `
              <div class="what-item"><span class="arrow">→</span><span>${p}</span></div>
            `;
            });
            html += `</div>`;

            // verdict final
            html += `
            <div class="verdict-final">
              <div class="vf-label">VERDICT SANS FILTRE</div>
              <p>L'épisode 2 est supérieur à l'épisode 1 sur deux dimensions précises — la profondeur émotionnelle du couple Mike/Schnayderna et la brutalité révélatrice de la scène Nema. Ces deux éléments n'ont pas d'équivalent dans l'EP1.</p>
              <p class="gray">Ce que l'EP1 avait que l'EP2 n'a pas encore — la punchline et la victoire. Ces moments arrivent dans l'EP3. L'EP2 est le film du milieu — il construit, compresse, retient. Et cette retenue est sa plus grande force.</p>
              <p class="pink">Le décompte coupé à 5 va générer des réactions en vidéo sur TikTok et YouTube. Ces vidéos de réaction vont amener de nouveaux spectateurs sur l'EP1. C'est le meilleur type de marketing — involontaire et organique.</p>
            </div>
          `;

            verdictEl.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════
        //  TAB SWITCHING
        // ═══════════════════════════════════════════════════════════════

        function switchTab(tabId) {
            currentTab = tabId;

            // buttons
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabId);
            });

            // panels
            Object.keys(panels).forEach(key => {
                panels[key].classList.toggle('hidden', key !== tabId);
            });

            // re-render verdict if needed (static anyway)
            if (tabId === 'verdict') renderVerdict();
        }

        // ═══════════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════════

        renderStats();
        renderScenes();
        renderTop();
        renderVerdict();

        // tab clicks
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });

        // ensure initial panel is visible
        switchTab('scenes');
    </script>

</body>
</html>
