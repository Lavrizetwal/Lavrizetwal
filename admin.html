<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zetwal Admin — Dashboard Synchronisé</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <!-- QR Scanner -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --gold: #ffd700; --gold-deep: #b8860b; --gold-pale: #fff8dc;
      --bg: #010101; --surface: #0d0d0d; --surface2: #141414;
      --text: #ffffff; --text-muted: rgba(255,255,255,0.5);
      --border: rgba(255,215,0,0.18); --border-hover: rgba(255,215,0,0.4);
      --green: #00ff88; --red: #ff4444; --blue: #00b4ff;
      --radius: 14px; --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --tr: all 0.3s cubic-bezier(0.165,0.84,0.44,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--gold-deep); border-radius: 2px; }
    ::selection { background: rgba(255,215,0,0.25); }

    /* AUTH WALL */
    #auth-wall {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; padding: 20px; text-align: center;
    }
    #auth-wall.hidden { display: none; }
    .auth-logo {
      font-family: 'Playfair Display', serif; font-size: 2rem;
      background: linear-gradient(135deg, var(--gold-deep), var(--gold), var(--gold-pale));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 3px;
    }
    .auth-sub { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; max-width: 360px; width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .auth-input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: 'Montserrat', sans-serif; font-size: 0.85rem; outline: none;
      transition: var(--tr);
    }
    .auth-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.08); }
    .auth-input::placeholder { color: var(--text-muted); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border-radius: var(--radius-sm); font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: var(--tr); border: none; width: 100%;
    }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #000; }
    .btn-gold:hover { box-shadow: 0 0 20px rgba(255,215,0,0.4); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-outline:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-green { background: linear-gradient(135deg, #00c866, var(--green)); color: #000; }
    .btn-green:hover { box-shadow: 0 0 20px rgba(0,255,136,0.35); }
    .btn-red { background: linear-gradient(135deg, #cc0000, var(--red)); color: #fff; }
    .btn-red:hover { box-shadow: 0 0 20px rgba(255,68,68,0.35); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-err { font-size: 0.72rem; color: var(--red); margin-top: 8px; display: none; }
    .auth-err.show { display: block; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 500;
      background: rgba(1,1,1,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1rem; letter-spacing: 2px; }
    .nav-logo span { color: var(--gold); }
    .nav-user { display: flex; align-items: center; gap: 10px; font-size: 0.68rem; }
    .nav-badge { padding: 3px 10px; background: rgba(255,215,0,0.12); border: 1px solid var(--border); border-radius: 20px; color: var(--gold); font-size: 0.6rem; font-weight: 700; }
    .nav-signout { padding: 5px 12px; background: transparent; border: 1px solid rgba(255,100,100,0.3); border-radius: 20px; color: #ff8888; font-size: 0.6rem; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: var(--tr); }
    .nav-signout:hover { background: rgba(255,100,100,0.1); }

    /* MAIN APP */
    #app { display: none; }
    #app.show { display: block; }
    .main { padding: 80px 20px 40px; max-width: 1200px; margin: 0 auto; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
    }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--gold); font-family: 'Playfair Display', serif; }

    /* TABS */
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; padding: 9px 20px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: var(--tr);
    }
    .tab-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #000;
      border-color: var(--gold); box-shadow: 0 0 16px rgba(255,215,0,0.3);
    }
    .tab-panel { display: none; animation: fadeup 0.3s ease; }
    .tab-panel.active { display: block; }
    @keyframes fadeup { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* CARDS */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
    }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    /* FORMS */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .field input, .field textarea, .field select {
      padding: 11px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem; outline: none; transition: var(--tr); width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.07);
    }
    .field textarea { resize: vertical; min-height: 80px; }

    /* PRODUCTS */
    .product-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: var(--tr);
    }
    .product-card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.1); }
    .product-img { position: relative; width: 100%; height: 180px; background: var(--surface2); overflow: hidden; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-body { padding: 16px; }
    .product-name { font-weight: 700; margin-bottom: 6px; }
    .product-price { font-size: 1.1rem; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
    .product-status { font-size: 0.65rem; padding: 4px 8px; border-radius: 12px; display: inline-block; }
    .status-available { background: rgba(0,255,136,0.15); color: var(--green); }
    .status-sold { background: rgba(255,68,68,0.15); color: var(--red); }
    .product-actions { display: flex; gap: 8px; margin-top: 12px; }
    .product-actions .btn { padding: 6px 12px; font-size: 0.6rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 10000;
      padding: 12px 20px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 0.75rem;
      opacity: 0; transform: translateY(20px);
      transition: var(--tr); pointer-events: none;
    }
    .toast.show {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .toast.success { border-color: var(--green); background: rgba(0,255,136,0.1); }
    .toast.error { border-color: var(--red); background: rgba(255,68,68,0.1); }
    .toast.info { border-color: var(--blue); background: rgba(0,180,255,0.1); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); max-width: 500px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }
    .modal-close:hover { color: var(--text); }

    /* IMAGE UPLOAD */
    .img-upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 30px 20px; text-align: center; cursor: pointer; transition: var(--tr);
      background: rgba(255,255,255,0.02);
    }
    .img-upload-area:hover, .img-upload-area.dragover { border-color: var(--gold); background: rgba(255,215,0,0.04); }
    .img-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm); display: none; margin-top: 12px; }
  </style>
</head>
<body>

<!-- AUTH WALL -->
<div id="auth-wall">
  <div class="auth-logo">ZETWAL</div>
  <div class="auth-sub">Admin — Synchronisé</div>
  <div class="auth-card">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" class="auth-input" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="login-pass" class="auth-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" id="login-btn">🚀 Se Connecter</button>
    <div class="auth-err" id="login-err"></div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-logo">ZETWAL <span>ADMIN</span></div>
  <div class="nav-user">
    <span class="nav-badge">👑 ADMIN</span>
    <span id="nav-email" style="font-size:0.62rem;color:var(--text-muted)"></span>
    <button class="nav-signout" onclick="handleSignOut()">Déconnexion</button>
  </div>
</nav>

<!-- MAIN APP -->
<div id="app">
  <main class="main">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-label">Produits Total</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-pill">
        <div class="stat-label">Disponibles</div>
        <div class="stat-value" id="stat-avail" style="color:var(--green)">—</div>
      </div>
      <div class="stat-pill">
        <div class="stat-label">Vendus</div>
        <div class="stat-value" id="stat-sold" style="color:var(--red)">—</div>
      </div>
      <div class="stat-pill">
        <div class="stat-label">Fiches Lavage</div>
        <div class="stat-value" id="stat-wash">—</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('products')">📦 Produits</button>
      <button class="tab-btn" onclick="switchTab('add')">➕ Ajouter</button>
      <button class="tab-btn" onclick="switchTab('wash')">🧾 Lavage</button>
      <button class="tab-btn" onclick="switchTab('history')">📋 Historique</button>
    </div>

    <!-- TAB: PRODUITS -->
    <div class="tab-panel active" id="tab-products">
      <div class="card">
        <div class="card-title">📦 Tous les Produits</div>
        <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
          <input type="text" id="search-products" class="auth-input" placeholder="Rechercher..." style="flex:1;min-width:180px;margin-bottom:0">
          <select id="filter-status" class="auth-input" style="width:auto;margin-bottom:0" onchange="filterProducts()">
            <option value="">Tous les statuts</option>
            <option value="available">Disponible</option>
            <option value="sold">Vendu</option>
          </select>
        </div>
        <div class="card-grid" id="products-grid">
          <div style="color:var(--text-muted);font-size:0.75rem;padding:20px;grid-column:1/-1">Chargement...</div>
        </div>
      </div>
    </div>

    <!-- TAB: AJOUTER PRODUIT -->
    <div class="tab-panel" id="tab-add">
      <div class="card" style="max-width:560px">
        <div class="card-title">➕ Nouveau Produit</div>

        <div class="field">
          <label>Photo du produit</label>
          <div class="img-upload-area" id="upload-area">
            <input type="file" id="product-img-file" accept="image/*" onchange="handleImageSelect(event)">
            <div style="font-size:2rem;margin-bottom:8px">📸</div>
            <div style="font-size:0.72rem;color:var(--text-muted)">Cliquer ou glisser une image</div>
          </div>
          <img id="img-preview" class="img-preview" alt="Aperçu">
        </div>

        <div class="field">
          <label>Nom du produit *</label>
          <input type="text" id="product-name" placeholder="Ex: Chemise blanche">
        </div>

        <div class="field">
          <label>Prix (HTG) *</label>
          <input type="number" id="product-price" placeholder="Ex: 1500" min="0" step="0.01">
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="product-desc" placeholder="Détails du produit..."></textarea>
        </div>

        <div class="field">
          <label>Catégorie</label>
          <select id="product-category">
            <option value="">Sélectionner...</option>
            <option value="Vêtement">Vêtement</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Électronique">Électronique</option>
            <option value="Maison">Maison</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="field">
          <label>Stock initial</label>
          <input type="number" id="product-stock" placeholder="1" min="1" value="1">
        </div>

        <button class="btn btn-gold" id="save-product-btn" onclick="saveProduct()">💾 Enregistrer</button>
      </div>
    </div>

    <!-- TAB: LAVAGE -->
    <div class="tab-panel" id="tab-wash">
      <div class="card" style="max-width:560px">
        <div class="card-title">🧾 Nouvelle Fiche de Lavage</div>

        <div class="field">
          <label>Nom du client *</label>
          <input type="text" id="wash-client" placeholder="Ex: Jean-Pierre">
        </div>

        <div class="field">
          <label>Téléphone</label>
          <input type="tel" id="wash-phone" placeholder="Ex: 509-3XXX-XXXX">
        </div>

        <div class="field">
          <label>Poids (kg) *</label>
          <input type="number" id="wash-weight" placeholder="Ex: 5.5" min="0" step="0.1">
        </div>

        <div class="field">
          <label>Type de service</label>
          <select id="wash-type">
            <option value="standard">Lavage Standard</option>
            <option value="express">Lavage Express</option>
            <option value="dry">Lavage + Séchage</option>
            <option value="folding">Complet</option>
          </select>
        </div>

        <div class="field">
          <label>Montant (HTG)</label>
          <input type="number" id="wash-amount" placeholder="Ex: 850" min="0">
        </div>

        <div class="field">
          <label>Date de retrait</label>
          <input type="datetime-local" id="wash-pickup">
        </div>

        <div class="field">
          <label>Notes</label>
          <textarea id="wash-notes" placeholder="Observations..."></textarea>
        </div>

        <button class="btn btn-gold" id="save-wash-btn" onclick="saveWashRecord()">💾 Enregistrer</button>
      </div>
    </div>

    <!-- TAB: HISTORIQUE -->
    <div class="tab-panel" id="tab-history">
      <div class="card">
        <div class="card-title">📋 Historique Lavage</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:0.75rem">
            <thead>
              <tr style="border-bottom:1px solid var(--border)">
                <th style="text-align:left;padding:8px;color:var(--gold)">Client</th>
                <th style="text-align:left;padding:8px;color:var(--gold)">Poids</th>
                <th style="text-align:left;padding:8px;color:var(--gold)">Service</th>
                <th style="text-align:left;padding:8px;color:var(--gold)">Montant</th>
                <th style="text-align:left;padding:8px;color:var(--gold)">Statut</th>
              </tr>
            </thead>
            <tbody id="wash-table-body">
              <tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite">⏳</span> Vérification...';
  err.classList.remove('show');

  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    const msgs = {
      'auth/wrong-password':    'Mot de passe incorrect.',
      'auth/invalid-credential':'Email ou mot de passe incorrect.',
      'auth/user-not-found':    'Aucun compte avec cet email.',
      'auth/invalid-email':     'Email invalide.',
      'auth/too-many-requests': 'Trop de tentatives. Attendez quelques minutes.'
    };
    showErr(err, msgs[e.code] || e.message);
    btn.disabled = false;
    btn.innerHTML = '🚀 Se Connecter';
  }
}

function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }

window.handleSignOut = async () => {
  await auth.signOut();
  currentUser = null;
  showAuthWall();
  document.getElementById('app').classList.remove('show');
  toast('Déconnecté', 'info');
};

// Attacher les écouteurs d'événements
function initLoginListeners() {
  const loginBtn = document.getElementById('login-btn');
  const loginPass = document.getElementById('login-pass');
  const loginEmail = document.getElementById('login-email');

  if (loginBtn) loginBtn.addEventListener('click', handleLogin);
  if (loginPass) loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  if (loginEmail) loginEmail.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLoginListeners);
} else {
  initLoginListeners();
}

// ============================================================
// PRODUITS — SUPABASE
// ============================================================
async function loadProducts() {
  const { data, error } = await db
    .from('products')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { toast('Erreur chargement produits: ' + error.message, 'error'); return; }
  allProducts = data || [];
  renderProducts(allProducts);
}

function renderProducts(list) {
  const grid = document.getElementById('products-grid');
  if (!list.length) {
    grid.innerHTML = '<div style="color:var(--text-muted);font-size:0.75rem;padding:20px;grid-column:1/-1">Aucun produit trouvé.</div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.image_url ? `<img src="${p.image_url}" alt="${escHtml(p.name)}" loading="lazy">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem">📦</div>'}
      </div>
      <div class="product-body">
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-price">${formatPrice(p.price)} HTG</div>
        <span class="product-status ${p.status === 'sold' ? 'status-sold' : 'status-available'}">
          ${p.status === 'sold' ? '● Vendu' : '● Disponible'}
        </span>
        <div class="product-actions">
          ${p.status !== 'sold' ? `<button class="btn btn-green" onclick="sellProduct('${p.id}')">✅ Vendre</button>` : ''}
          <button class="btn btn-red" onclick="deleteProduct('${p.id}')">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.filterProducts = () => {
  const q  = document.getElementById('search-products').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const filtered = allProducts.filter(p => {
    const matchQ  = !q  || p.name?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q);
    const matchSt = !st || p.status === st;
    return matchQ && matchSt;
  });
  renderProducts(filtered);
};

// ============================================================
// AJOUTER PRODUIT
// ============================================================
window.handleImageSelect = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Image trop grande (max 5MB)', 'error'); return; }
  currentImageFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const preview = document.getElementById('img-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
};

window.saveProduct = async () => {
  const name  = document.getElementById('product-name').value.trim();
  const price = parseFloat(document.getElementById('product-price').value);
  const desc  = document.getElementById('product-desc').value.trim();
  const category = document.getElementById('product-category').value;
  const stock = parseInt(document.getElementById('product-stock').value) || 1;
  const btn   = document.getElementById('save-product-btn');

  if (!name)        { toast('Nom requis', 'error'); return; }
  if (isNaN(price)) { toast('Prix requis', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite">⏳</span> Enregistrement...';

  try {
    let imageUrl = null;

    if (currentImageFile) {
      const ext  = currentImageFile.name.split('.').pop();
      const path = `products/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const { error: upErr } = await db.storage
        .from('product-images')
        .upload(path, currentImageFile, { cacheControl: '3600', upsert: false });
      if (upErr) throw upErr;
      const { data: urlData } = db.storage.from('product-images').getPublicUrl(path);
      imageUrl = urlData.publicUrl;
    }

    const { error } = await db.from('products').insert({
      name,
      price,
      description: desc,
      image_url: imageUrl,
      category: category || null,
      stock_quantity: stock,
      availability: 'Disponible',
      status: 'available'
    });

    if (error) throw error;

    toast('Produit créé avec succès!', 'success');
    ['product-name','product-price','product-desc','product-category','product-stock'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('img-preview').style.display = 'none';
    currentImageFile = null;
    document.getElementById('product-img-file').value = '';

    await loadProducts();
    loadStats();

  } catch (e) {
    toast('Erreur: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Enregistrer';
  }
};

window.sellProduct = async (id) => {
  if (!confirm('Marquer ce produit comme VENDU ?')) return;
  const { error } = await db.from('products').update({
    status: 'sold',
    availability: 'Non disponible',
    stock_quantity: 0,
    sold_at: new Date().toISOString()
  }).eq('id', id);
  if (error) { toast('Erreur: ' + error.message, 'error'); return; }
  toast('Produit marqué comme vendu!', 'success');
  await loadProducts();
  loadStats();
};

window.deleteProduct = async (id) => {
  if (!confirm('Supprimer définitivement ce produit ?')) return;
  const { error } = await db.from('products').delete().eq('id', id);
  if (error) { toast('Erreur: ' + error.message, 'error'); return; }
  toast('Produit supprimé', 'info');
  await loadProducts();
  loadStats();
};

// ============================================================
// LAVAGE
// ============================================================
window.saveWashRecord = async () => {
  const client  = document.getElementById('wash-client').value.trim();
  const phone   = document.getElementById('wash-phone').value.trim();
  const weight  = parseFloat(document.getElementById('wash-weight').value);
  const type    = document.getElementById('wash-type').value;
  const amount  = parseFloat(document.getElementById('wash-amount').value) || 0;
  const pickup  = document.getElementById('wash-pickup').value;
  const notes   = document.getElementById('wash-notes').value.trim();
  const btn     = document.getElementById('save-wash-btn');

  if (!client) { toast('Nom du client requis', 'error'); return; }
  if (isNaN(weight) || weight <= 0) { toast('Poids requis', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite">⏳</span> Enregistrement...';

  const { error } = await db.from('wash_records').insert({
    customer_name: client,
    phone: phone,
    weight: weight,
    service_type: type,
    amount: amount,
    pickup_date: pickup || null,
    status: 'pending',
    notes: notes
  });

  btn.disabled = false;
  btn.innerHTML = '💾 Enregistrer';

  if (error) { toast('Erreur: ' + error.message, 'error'); return; }

  toast('Fiche de lavage enregistrée!', 'success');
  ['wash-client','wash-phone','wash-weight','wash-amount','wash-pickup','wash-notes']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('wash-type').value = 'standard';

  await loadWashRecords();
  loadStats();
};

async function loadWashRecords() {
  const { data, error } = await db
    .from('wash_records')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100);

  if (error) { toast('Erreur lavage: ' + error.message, 'error'); return; }
  allWashRecords = data || [];
  renderWashTable(allWashRecords);
}

function renderWashTable(list) {
  const tbody = document.getElementById('wash-table-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">Aucune fiche.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(r => `
    <tr style="border-bottom:1px solid rgba(255,215,0,0.1)">
      <td style="padding:8px">${escHtml(r.customer_name)}</td>
      <td style="padding:8px">${r.weight} kg</td>
      <td style="padding:8px">${r.service_type}</td>
      <td style="padding:8px">${formatPrice(r.amount)} HTG</td>
      <td style="padding:8px"><span style="padding:2px 6px;border-radius:4px;background:rgba(0,255,136,0.15);color:var(--green);font-size:0.65rem">${r.status}</span></td>
    </tr>
  `).join('');
}

// ============================================================
// STATS
// ============================================================
function loadStats() {
  document.getElementById('stat-total').textContent = allProducts.length;
  document.getElementById('stat-avail').textContent = allProducts.filter(p => p.status === 'available').length;
  document.getElementById('stat-sold').textContent  = allProducts.filter(p => p.status === 'sold').length;
  document.getElementById('stat-wash').textContent  = allWashRecords.length;
}

// ============================================================
// TABS
// ============================================================
window.switchTab = (name) => {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['products','add','wash','history'];
    b.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');

  if (name === 'products') loadProducts();
  if (name === 'history')  loadWashRecords();
};

// ============================================================
// TOAST
// ============================================================
let toastTimer;
window.toast = (msg, type = 'info') => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
};

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPrice(n) {
  return new Intl.NumberFormat('fr-HT').format(n ?? 0);
}

// Drag & drop
const uploadArea = document.getElementById('upload-area');
if (uploadArea) {
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      document.getElementById('product-img-file').files = e.dataTransfer.files;
      handleImageSelect({ target: { files: [file] }});
    }
  });
}

// ============================================================
// SYNCHRONISATION TEMPS RÉEL
// ============================================================
// Écouter les changements dans la table products (pour la boutique)
const productsSubscription = db
  .channel('products-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (payload) => {
    console.log('Produit mis à jour:', payload);
    loadProducts();
    loadStats();
  })
  .subscribe();

// Écouter les changements dans la table wash_records
const washSubscription = db
  .channel('wash-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'wash_records' }, (payload) => {
    console.log('Fiche de lavage mise à jour:', payload);
    loadWashRecords();
    loadStats();
  })
  .subscribe();

</script>
