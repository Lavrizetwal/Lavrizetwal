<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zetwal Admin — Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR Code generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
  <!-- QR Scanner -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --gold: #ffd700; --gold-deep: #b8860b; --gold-pale: #fff8dc;
      --bg: #010101; --surface: #0d0d0d; --surface2: #141414;
      --text: #ffffff; --text-muted: rgba(255,255,255,0.5);
      --border: rgba(255,215,0,0.18); --border-hover: rgba(255,215,0,0.4);
      --green: #00ff88; --red: #ff4444; --blue: #00b4ff;
      --radius: 14px; --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --tr: all 0.3s cubic-bezier(0.165,0.84,0.44,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--gold-deep); border-radius: 2px; }

    #auth-wall { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; padding: 20px; text-align: center; }
    #auth-wall.hidden { display: none; }
    .auth-logo { font-family: 'Playfair Display', serif; font-size: 2rem; background: linear-gradient(135deg, var(--gold-deep), var(--gold), var(--gold-pale)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 3px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; max-width: 360px; width: 100%; }
    .auth-input { width: 100%; padding: 12px 16px; margin-bottom: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; outline: none; transition: var(--tr); }
    .auth-input:focus { border-color: var(--gold); }
    
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: var(--radius-sm); font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: var(--tr); border: none; width: 100%; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-green { background: linear-gradient(135deg, #00c866, var(--green)); color: #000; }
    .btn-red { background: linear-gradient(135deg, #cc0000, var(--red)); color: #fff; }

    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 500; background: rgba(1,1,1,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .main { padding: 80px 20px 40px; max-width: 1100px; margin: 0 auto; }
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { flex-shrink: 0; padding: 9px 20px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: var(--tr); }
    .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: #000; border-color: var(--gold); }
    .tab-panel { display: none; animation: fadeup 0.3s ease; }
    .tab-panel.active { display: block; }
    @keyframes fadeup { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .field input, .field textarea, .field select { padding: 11px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.82rem; outline: none; width: 100%; }

    .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.75rem; }
    th { background: rgba(255,255,255,0.02); padding: 14px 16px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="auth-wall">
  <div class="auth-logo">ZETWAL <span>ADMIN</span></div>
  <div class="auth-card">
    <input type="email" id="login-email" class="auth-input" placeholder="Email admin">
    <input type="password" id="login-pass" class="auth-input" placeholder="Mot de passe">
    <button class="btn btn-gold" id="login-btn" onclick="handleLogin()">Connexion</button>
    <div id="login-err" class="auth-err" style="color:red; font-size:0.7rem; margin-top:10px;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <nav class="navbar">
    <div class="nav-logo">ZETWAL <span>ADMIN</span></div>
    <div class="nav-user">
      <span id="nav-email"></span>
      <button class="nav-signout" onclick="handleSignOut()">Déconnexion</button>
    </div>
  </nav>

  <main class="main">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('products')">Produits</button>
      <button class="tab-btn" onclick="switchTab('add')">Ajouter</button>
      <button class="tab-btn" onclick="switchTab('wash')">Lavage</button>
      <button class="tab-btn" onclick="switchTab('history')">Historique</button>
    </div>

    <!-- TAB: LISTE PRODUITS -->
    <div class="tab-panel active" id="tab-products">
      <div class="card">
        <div class="card-title">📦 Inventaire Produits</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Prix</th>
                <th>Stock</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="product-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB: AJOUTER PRODUIT -->
    <div class="tab-panel" id="tab-add">
      <div class="card" style="max-width:600px; margin: 0 auto;">
        <div class="card-title">✨ Nouveau Produit</div>
        <div class="field">
          <label>Nom du produit *</label>
          <input type="text" id="p-name" placeholder="Ex: T-Shirt Premium">
        </div>
        <div class="field">
          <label>Catégorie *</label>
          <select id="p-category">
            <option value="Vêtement">Vêtement</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Aliment">Aliment</option>
            <option value="Électronique">Électronique</option>
            <option value="Maison">Maison</option>
            <option value="Beauté & Soins">Beauté & Soins</option>
            <option value="Sport">Sport</option>
            <option value="Accessoire">Accessoire</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
        <div class="field">
          <label>Prix (HTG) *</label>
          <input type="number" id="p-price" placeholder="Ex: 1500">
        </div>
        <div class="field">
          <label>Quantité en stock</label>
          <input type="number" id="p-stock" value="1">
        </div>
        <div class="field">
          <label>Couleurs (séparées par des virgules)</label>
          <input type="text" id="p-colors" placeholder="Rouge, Bleu, Noir">
        </div>
        <div class="field">
          <label>Image URL</label>
          <input type="text" id="p-image" placeholder="https://...">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="p-desc"></textarea>
        </div>
        <button class="btn btn-gold" onclick="saveProduct()">Enregistrer le produit</button>
      </div>
    </div>

    <!-- TAB: LAVAGE -->
    <div class="tab-panel" id="tab-wash">
      <div class="card" style="max-width:500px; margin: 0 auto;">
        <div class="card-title">🧾 Nouvelle Fiche de Lavage</div>
        <div class="field">
          <label>Nom du client *</label>
          <input type="text" id="w-client">
        </div>
        <div class="field">
          <label>Téléphone</label>
          <input type="tel" id="w-phone">
        </div>
        <div class="field">
          <label>Poids (kg) *</label>
          <input type="number" id="w-weight" step="0.1">
        </div>
        <div class="field">
          <label>Montant (HTG)</label>
          <input type="number" id="w-amount">
        </div>
        <button class="btn btn-gold" onclick="saveWash()">Enregistrer</button>
      </div>
    </div>

    <!-- TAB: HISTORIQUE -->
    <div class="tab-panel" id="tab-history">
      <div class="card">
        <div class="card-title">📋 Historique Lavage</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>Poids</th>
                <th>Montant</th>
                <th>Date</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="wash-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
    authDomain: "lavrizetwal.firebaseapp.com",
    projectId: "lavrizetwal",
    storageBucket: "lavrizetwal.firebasestorage.app",
    messagingSenderId: "291921316186",
    appId: "1:291921316186:web:f55e8b34526960df394b63"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const SUPABASE_URL = 'https://mzwibzvdcwapqrtbhxox.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16d2lienZkY3dhcHFydGJoeG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzcxNTIsImV4cCI6MjA5MTc1MzE1Mn0.utazGnMswFOiArB66kfok7n2ds1Zr2wyVBRYVOFRT6c';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMINS = ['mikenestorlive@gmail.com', 'schnaydernaderice1@gmail.com'];

  auth.onAuthStateChanged(user => {
    if (user && ADMINS.includes(user.email)) {
      document.getElementById('auth-wall').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('nav-email').textContent = user.email;
      loadProducts();
      loadWashRecords();
    } else {
      document.getElementById('auth-wall').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });

  async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
      document.getElementById('login-err').textContent = e.message;
    }
  }

  function handleSignOut() { auth.signOut(); }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  async function loadProducts() {
    const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
    if (data) {
      const tbody = document.getElementById('product-table-body');
      tbody.innerHTML = data.map(p => `
        <tr>
          <td>${p.name}</td>
          <td>${p.category || '—'}</td>
          <td>${p.price} HTG</td>
          <td>${p.stock_quantity || 0}</td>
          <td>${p.availability}</td>
          <td><button onclick="deleteProduct('${p.id}')" style="color:red; background:none; border:none; cursor:pointer;">Supprimer</button></td>
        </tr>
      `).join('');
    }
  }

  async function saveProduct() {
    const product = {
      name: document.getElementById('p-name').value,
      category: document.getElementById('p-category').value,
      price: parseFloat(document.getElementById('p-price').value),
      stock_quantity: parseInt(document.getElementById('p-stock').value),
      colors: document.getElementById('p-colors').value,
      image_url: document.getElementById('p-image').value,
      description: document.getElementById('p-desc').value,
      availability: 'Disponible'
    };
    const { error } = await db.from('products').insert([product]);
    if (!error) {
      toast('Produit ajouté !', 'success');
      loadProducts();
      switchTab('products');
    } else {
      toast('Erreur: ' + error.message, 'error');
    }
  }

  async function deleteProduct(id) {
    if (confirm('Supprimer ce produit ?')) {
      await db.from('products').delete().eq('id', id);
      loadProducts();
    }
  }

  async function loadWashRecords() {
    const { data } = await db.from('wash_records').select('*').order('created_at', { ascending: false });
    if (data) {
      document.getElementById('wash-table-body').innerHTML = data.map(w => `
        <tr>
          <td>${w.customer_name}</td>
          <td>${w.phone || '—'}</td>
          <td>${w.amount || 0} HTG</td>
          <td>${new Date(w.created_at).toLocaleDateString()}</td>
          <td>${w.status || 'pending'}</td>
        </tr>
      `).join('');
    }
  }

  async function saveWash() {
    const wash = {
      customer_name: document.getElementById('w-client').value,
      phone: document.getElementById('w-phone').value,
      weight: parseFloat(document.getElementById('w-weight').value),
      amount: parseFloat(document.getElementById('w-amount').value),
      status: 'pending'
    };
    const { error } = await db.from('wash_records').insert([wash]);
    if (!error) {
      toast('Fiche enregistrée !', 'success');
      loadWashRecords();
      switchTab('history');
    }
  }

  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
