    <style>
      :root {
        color-scheme: dark;
        --border-soft: rgba(255,255,255,.1);
        --shadow-depth: 0 24px 80px rgba(4, 6, 20, .45);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        color: white;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(139, 92, 246, 0.18), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.12), transparent 22%),
          linear-gradient(180deg, #050714 0%, #070913 100%);
      }
      #root { min-height: 100vh; position: relative; z-index: 2; }
      #galaxy { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
      .glass-card {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border-soft);
        border-radius: 2rem;
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
        backdrop-filter: blur(24px);
        box-shadow: var(--shadow-depth);
      }
      .glass-card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(120deg, rgba(255,255,255,.1), transparent 26%, transparent 72%, rgba(255,255,255,.08)),
          radial-gradient(circle at top right, rgba(255,255,255,.14), transparent 30%);
        opacity: .85;
      }
      .depth-card {
        transform: translateZ(0);
        transition: transform .26s ease, border-color .26s ease, box-shadow .26s ease, background .26s ease;
      }
      .depth-card:hover {
        transform: translateY(-4px) scale(1.002);
        border-color: rgba(255,255,255,.18);
        box-shadow: 0 28px 100px rgba(4,6,20,.52);
      }
      .section-appear { animation: sectionEnter .45s ease both; }
      @keyframes sectionEnter { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .glow-button, .ghost-button, .danger-button, .calc-button, .tab-pill {
        display: inline-flex;
        align-items: center;
        gap: .65rem;
        border-radius: 1.2rem;
        border: 1px solid transparent;
        padding: .85rem 1.1rem;
        font-size: .95rem;
        font-weight: 600;
        transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, opacity .18s ease;
      }
      .glow-button:active, .ghost-button:active, .danger-button:active, .calc-button:active, .tab-pill:active { transform: translateY(1px) scale(.99); }
      .glow-button {
        border-color: rgba(103,232,249,.2);
        background: linear-gradient(135deg, rgba(34,211,238,.22), rgba(168,85,247,.2), rgba(244,114,182,.22));
        color: white;
        box-shadow: 0 14px 40px rgba(34,211,238,.12);
      }
      .glow-button:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.22); box-shadow: 0 18px 44px rgba(168,85,247,.18); }
      .ghost-button { border-color: rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: rgba(255,255,255,.86); }
      .ghost-button:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.08); }
      .danger-button { border-color: rgba(251,113,133,.22); background: rgba(244,63,94,.12); color: #ffe4ea; }
      .danger-button:hover { transform: translateY(-2px); border-color: rgba(251,113,133,.35); background: rgba(244,63,94,.18); }
      .tab-pill { width: 100%; justify-content: flex-start; border-color: rgba(255,255,255,.08); background: rgba(255,255,255,.035); color: rgba(255,255,255,.72); }
      .tab-pill:hover { transform: translateX(4px); border-color: rgba(255,255,255,.14); background: rgba(255,255,255,.06); }
      .tab-pill-active { border-color: rgba(103,232,249,.24); background: linear-gradient(135deg, rgba(34,211,238,.16), rgba(168,85,247,.18)); color: white; box-shadow: 0 14px 36px rgba(34,211,238,.1); }
      .input-shell {
        width: 100%;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 1.2rem;
        background: rgba(255,255,255,.05);
        color: white;
        padding: .92rem 1rem;
        outline: none;
        transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;

      .input-shell::placeholder { color: rgba(255,255,255,.36); }
      .input-shell:focus { border-color: rgba(103,232,249,.32); background: rgba(255,255,255,.07); box-shadow: 0 0 0 4px rgba(34,211,238,.08); }
      select.input-shell option { background: #091024; color: white; }
      .calc-button { justify-content: center; min-height: 3.6rem; border-color: rgba(255,255,255,.08); background: rgba(255,255,255,.06); color: white; }
      .calc-button:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.16); background: rgba(255,255,255,.1); }
      .glow-orb { box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 0 0 1px rgba(255,255,255,.04), 0 20px 36px rgba(139,92,246,.22); }
      .shimmer { position: relative; overflow: hidden; }
      .shimmer::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent); animation: shimmer 1.5s linear infinite; }
      @keyframes shimmer { to { transform: translateX(100%); } }
      .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .tone-emerald { background: #34d399; box-shadow: 0 0 18px rgba(52,211,153,.55); }
      .tone-amber { background: #fbbf24; box-shadow: 0 0 18px rgba(251,191,36,.55); }
      .tone-rose { background: #fb7185; box-shadow: 0 0 18px rgba(251,113,133,.55); }
      .tone-sky { background: #38bdf8; box-shadow: 0 0 18px rgba(56,189,248,.55); }
      .status-badge { display:inline-flex; border-radius:999px; padding:.35rem .7rem; font-size:.72rem; font-weight:600; text-transform:capitalize; }
      .status-good { background: rgba(16,185,129,.15); color:#bbf7d0; box-shadow: inset 0 0 0 1px rgba(52,211,153,.25); }
      .status-warn { background: rgba(245,158,11,.15); color:#fde68a; box-shadow: inset 0 0 0 1px rgba(251,191,36,.25); }
      .status-bad { background: rgba(244,63,94,.15); color:#fecdd3; box-shadow: inset 0 0 0 1px rgba(251,113,133,.25); }
      .status-info { background: rgba(14,165,233,.15); color:#bae6fd; box-shadow: inset 0 0 0 1px rgba(56,189,248,.25); }
      .chart-grid { display: grid; gap: 1rem; }
      .bar-track { height: .5rem; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #f472b6, #a855f7, #22d3ee); }
      .spark-wrap { display:flex; align-items:flex-end; gap:.55rem; height:14rem; padding:1rem; border-radius:1.5rem; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.03); }
      .spark-col { flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:.6rem; min-width:0; }
      .spark-bar { width:100%; border-radius:1rem 1rem 0 0; background: linear-gradient(180deg, #f472b6 0%, #8b5cf6 50%, #22d3ee 100%); box-shadow: 0 0 20px rgba(168,85,247,.25); }
      .donut-ring { width: 10rem; height: 10rem; border-radius: 999px; position: relative; }
      .donut-ring::after { content: ""; position: absolute; inset: 18px; border-radius: 999px; background: rgba(5,7,20,.9); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
      .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1; }
      .overlay { position: fixed; inset: 0; background: rgba(2,6,23,.72); backdrop-filter: blur(10px); z-index: 40; display:flex; align-items:center; justify-content:center; padding:1rem; }
      .toast-wrap { position: fixed; bottom: 1rem; right: 1rem; z-index: 60; width: min(24rem, calc(100vw - 2rem)); display:flex; flex-direction:column; gap:.75rem; }
      .toast { border-radius: 1.5rem; padding: .95rem 1rem; border:1px solid rgba(255,255,255,.1); backdrop-filter: blur(14px); box-shadow: 0 18px 48px rgba(2,6,23,.32); }
      .toast-success { background: rgba(16,185,129,.12); color:#d1fae5; border-color: rgba(52,211,153,.2); }
      .toast-error { background: rgba(244,63,94,.12); color:#ffe4e6; border-color: rgba(251,113,133,.2); }
      .toast-info { background: rgba(6,182,212,.12); color:#cffafe; border-color: rgba(34,211,238,.2); }
      .empty-state { padding: 2rem; text-align:center; border-radius: 1.5rem; border: 1px dashed rgba(255,255,255,.14); color: rgba(255,255,255,.45); background: rgba(255,255,255,.03); }
      textarea.input-shell { min-height: 7rem; resize: vertical; }
      input[type="file"].input-shell { padding:.65rem .8rem; }
      ::-webkit-scrollbar { width:10px; height:10px; }
      ::-webkit-scrollbar-thumb { border:2px solid transparent; border-radius:999px; background:linear-gradient(180deg, rgba(34,211,238,.5), rgba(168,85,247,.5)); background-clip:padding-box; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,.03); }
      @media (max-width: 1024px) {
        .depth-card:hover, .tab-pill:hover, .glow-button:hover, .ghost-button:hover, .danger-button:hover, .calc-button:hover { transform:none; }
      }
    </style>

      const TABS = [

      const firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
      const firebaseAuth = firebase.auth();

      const state = {
        authState: 'checking',
        currentEmail: '',
        loginBusy: false,
        authError: '',
        pageLoading: false,
        analyticsLoading: true,
        activeTab: 'overview',
        loginForm: { email: ADMIN_EMAILS[0], password: '' },

        settings: {
          storeMode: 'auto',

          quotes: DEFAULT_QUOTES.slice(),
          washPricing: JSON.parse(JSON.stringify(DEFAULT_WASH_PRICING)),
          marginRate: 0.32,
        },
        productForm: { ...EMPTY_PRODUCT_FORM },
        productImageFile: null,
        editingProductId: null,
        selectedProductId: null,
        saleDraft: { quantity: 1, client_name: '', client_email: '' },
        scannerOpen: false,
        scannerMessage: 'Scanner prêt.',
        manualQrValue: '',
        orderNotes: {},
        washForm: { ...EMPTY_WASH_FORM },
        calculatorExpression: '',
        calculatorResult: '0',
        calcInputValue: '0',
        toasts: [],
        savingProduct: false,
        processingSale: false,
        savingWash: false,
        clock: new Date(),
      };

      let analyticsTimer = null;
      let pollingTimer = null;
      let clockTimer = null;
      let scannerInstance = null;
      let authLoadedOnce = false;

      function safeParseSetting(value) {
        if (typeof value !== 'string') return value;
        try { return JSON.parse(value); } catch { return value; }
      }
      function serializeSetting(value) { return JSON.stringify(value); }
      function toNumber(value, fallback = 0) { const num = Number(value); return Number.isFinite(num) ? num : fallback; }
      function isAdminEmail(email) { return email ? ADMIN_EMAILS.includes(String(email).toLowerCase()) : false; }
      function slugify(value) {
        return String(value || '')
          .normalize('NFD')
          .replace(/[^\w\s-]/g, '')
          .trim()
          .toLowerCase()
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
      }
      function esc(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      function formatMoney(value) {
        return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0, minimumFractionDigits: 0 }).format(toNumber(value));
      }
      function formatDateTime(value) {
        if (!value) return '—';
        return new Intl.DateTimeFormat('fr-FR', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
      }
      function formatShortDate(value) {
        if (!value) return '—';
        return new Intl.DateTimeFormat('fr-FR', { day: '2-digit', month: '2-digit' }).format(new Date(value));
      }
      function normalizeColors(colors) {
        if (Array.isArray(colors)) return colors;
        if (typeof colors === 'string') return colors.split(',').map(v => v.trim()).filter(Boolean);
        return [];
      }
      function parseBooleanValue(value) {
        if (typeof value === 'boolean') return value;
        if (typeof value === 'string') return value.toLowerCase() === 'true' || value === '1';
        return Boolean(value);
      }
      function computeWashAmount(weightKg, serviceType, pricing) {
        const multiplier = pricing.serviceMultipliers[serviceType] ?? 1;
        return Math.max(pricing.minimumCharge, Math.round(toNumber(weightKg, 1) * pricing.pricePerKg * multiplier));
      }
      function evaluateStoreStatus(mode, now) {
        if (mode === 'open') return { open: true, label: 'Ouvert forcé' };
        if (mode === 'closed') return { open: false, label: 'Fermé forcé' };
        const hour = now.getHours();
        const open = hour >= 8 && hour < 20;
        return { open, label: open ? 'Automatique · ouvert' : 'Automatique · fermé' };
      }
      function buildQrImageUrl(value) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(value)}`;
      }
      function createDailyQuote(quotes, enabled) {
        if (!enabled || !quotes.length) return DEFAULT_QUOTES[0];
        const now = new Date();
        const index = (now.getDate() + now.getMonth() + now.getFullYear()) % quotes.length;
        return quotes[index];
      }
      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('Impossible de lire le fichier'));
          reader.readAsDataURL(file);
        });
      }
      function getNotificationTone(type) {
        if ((type || '').includes('sale')) return 'emerald';
        if ((type || '').includes('order')) return 'amber';
        if ((type || '').includes('stock')) return 'rose';
        return 'sky';
      }
      function getStatusClass(status) {
        const s = String(status || 'info');
        if (['available','validated','accepted','ready','open'].includes(s)) return 'status-good';
        if (['coming','pending'].includes(s)) return 'status-warn';
        if (['sold','refused','delivered','closed'].includes(s)) return 'status-bad';
        return 'status-info';
      }
      function statusBadge(status) {
        return `<span class="status-badge ${getStatusClass(status)}">${esc(String(status || '').replace(/_/g, ' '))}</span>`;
      }
      function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }
      function setByPath(target, path, value) {
        const parts = String(path).split('.');
        let ref = target;
        for (let i = 0; i < parts.length - 1; i++) {
          const key = /^\d+$/.test(parts[i]) ? Number(parts[i]) : parts[i];
          const nextKey = parts[i + 1];
          if (ref[key] == null) ref[key] = /^\d+$/.test(nextKey) ? [] : {};
          ref = ref[key];
        }
        const last = /^\d+$/.test(parts[parts.length - 1]) ? Number(parts[parts.length - 1]) : parts[parts.length - 1];
        ref[last] = value;
      }
      function showToast(message, kind = 'info') {
        const id = Date.now() + Math.floor(Math.random() * 1000);
        state.toasts.push({ id, kind, message });
        render();
        setTimeout(() => {
          state.toasts = state.toasts.filter(t => t.id !== id);
          render();
        }, 4200);
      }
      function scheduleAnalyticsReady() {
        state.analyticsLoading = true;
        if (analyticsTimer) clearTimeout(analyticsTimer);
        render();
        analyticsTimer = setTimeout(() => {
          state.analyticsLoading = false;
          render();
        }, 650);
      }
      function selectedProduct() {
        return state.products.find(product => String(product.id) === String(state.selectedProductId)) || null;
      }
      function productMap() {
        return new Map(state.products.map(product => [String(product.id), product]));
      }
      function analytics() {
        const productsById = productMap();
        const totalSales = state.sales.length;
        const unitsSold = state.sales.reduce((sum, sale) => sum + toNumber(sale.quantity_sold), 0);
        const totalRevenue = state.sales.reduce((sum, sale) => sum + toNumber(sale.total_price), 0);
        const acceptedOrdersRevenue = state.orders.filter(o => o.status === 'accepted').reduce((sum, order) => sum + toNumber(order.total_estimated), 0);
        const inventoryValue = state.products.reduce((sum, product) => sum + toNumber(product.price) * toNumber(product.stock_quantity), 0);
        const averageTicket = totalSales ? Math.round(totalRevenue / totalSales) : 0;
        const salesStatusBreakdown = [
          { label: 'Disponibles', value: state.products.filter(p => p.status === 'available').length, color: '#34d399' },
          { label: 'Arrivage', value: state.products.filter(p => p.status === 'coming').length, color: '#fbbf24' },
          { label: 'Écoulés', value: state.products.filter(p => p.status === 'sold').length, color: '#fb7185' },
        ];
        const categoryMap = new Map();
        state.sales.forEach(sale => {
          const linkedCategory = (productsById.get(String(sale.product_id)) || {}).category || 'Sans catégorie';
          categoryMap.set(linkedCategory, (categoryMap.get(linkedCategory) || 0) + toNumber(sale.total_price));
        });
        const salesByCategory = Array.from(categoryMap.entries()).map(([label, value]) => ({ label, value })).sort((a,b) => b.value - a.value).slice(0, 6);
        const lastThirtyDays = Array.from({ length: 30 }).map((_, index) => {
          const d = new Date();
          d.setDate(d.getDate() - (29 - index));
          d.setHours(0,0,0,0);
          return d;
        });
        const salesTimeline = lastThirtyDays.map(date => {
          const next = new Date(date);
          next.setDate(next.getDate() + 1);
          const value = state.sales.filter(sale => {
            const saleDate = new Date(sale.created_at);
            return saleDate >= date && saleDate < next;
          }).reduce((sum, sale) => sum + toNumber(sale.total_price), 0);
          return { label: formatShortDate(date.toISOString()), value };
        });
        const hours = Array.from({ length: 24 }).map((_, hour) => ({ label: `${hour}h`, value: 0 }));
        state.sales.forEach(sale => { hours[new Date(sale.created_at).getHours()].value += toNumber(sale.total_price); });
        const washTypeMap = new Map();
        state.washRecords.forEach(record => washTypeMap.set(record.service_type, (washTypeMap.get(record.service_type) || 0) + 1));
        const washTypes = Array.from(washTypeMap.entries()).map(([label, value]) => ({ label, value }));
        const topMap = new Map();
        state.sales.forEach(sale => {
          const current = topMap.get(sale.product_name) || { label: sale.product_name, value: 0, quantity: 0, unitPrice: toNumber(sale.product_price) };
          current.value += toNumber(sale.total_price);
          current.quantity += toNumber(sale.quantity_sold);
          current.unitPrice = Math.max(current.unitPrice, toNumber(sale.product_price));
          topMap.set(sale.product_name, current);
        });
        const topProducts = Array.from(topMap.values()).sort((a,b) => b.unitPrice - a.unitPrice || b.value - a.value).slice(0, 5);
        return { totalSales, unitsSold, totalRevenue, acceptedOrdersRevenue, inventoryValue, averageTicket, salesStatusBreakdown, salesByCategory, salesTimeline, hours, washTypes, topProducts };

          const nextStatus = newStock === 0 ? 'coming' : 'available';
          const totalPrice = quantity * toNumber(product.price);
          const { error: updateProductError } = await supabase.from('products').update({ stock_quantity: newStock, status: nextStatus }).eq('id', product.id);
          if (updateProductError) throw updateProductError;

      function evaluateExpression(expression) {
        const sanitized = String(expression || '').replace(/\s+/g, '');
        if (!/^[0-9+\-*/().%]+$/.test(sanitized)) throw new Error('Expression non autorisée');
        const result = Function(`"use strict"; return (${sanitized})`)();
        return Number.isFinite(Number(result)) ? String(Number(result)) : '0';
      }
      function calculatorInput(token) {
        if (token === 'C') {
          state.calculatorExpression = '';
          state.calculatorResult = '0';
          return render();
        }
        if (token === '⌫') {
          state.calculatorExpression = state.calculatorExpression.slice(0, -1);
          state.calculatorResult = state.calculatorExpression ? state.calculatorResult : '0';
          return render();
        }
        if (token === '=') {
          try {
            const result = evaluateExpression(state.calculatorExpression || '0');
            state.calculatorResult = result;
            state.calculatorExpression = result;
          } catch {
            state.calculatorResult = 'Erreur';
          }
          return render();
        }
        const next = `${state.calculatorExpression}${token}`;
        state.calculatorExpression = next;
        try { state.calculatorResult = evaluateExpression(next); } catch { state.calculatorResult = '…'; }
        render();
      }

      function renderMetric(label, value, helper, accent) {
        return `<div class="glass-card depth-card p-5"><div class="flex items-start justify-between gap-4"><div><p class="text-xs uppercase tracking-[0.35em] text-white/45">${esc(label)}</p><p class="mt-3 text-3xl font-semibold text-white">${esc(value)}</p><p class="mt-2 text-sm text-white/55">${esc(helper)}</p></div><div class="h-14 w-14 rounded-2xl glow-orb ${accent}"></div></div></div>`;
      }
      function renderMiniBars(items, suffix = '') {
        if (!items.length) return `<div class="empty-state">Aucune donnée.</div>`;
        const max = Math.max(...items.map(item => item.value), 1);
        return `<div class="chart-grid">${items.map(item => `
          <div class="space-y-2">
            <div class="flex items-center justify-between text-xs text-white/55"><span>${esc(item.label)}</span><span>${formatMoney(item.value)}${esc(suffix)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(item.value / max) * 100}%"></div></div>
          </div>`).join('')}</div>`;
      }
      function renderSparkBars(items) {
        if (!items.length) return `<div class="empty-state">Aucune donnée.</div>`;
        const max = Math.max(...items.map(item => item.value), 1);
        return `<div class="spark-wrap">${items.map(item => `
          <div class="spark-col">
            <div class="spark-bar" title="${esc(item.label)}: ${item.value}" style="height:${clamp((item.value / max) * 100, item.value === 0 ? 4 : 10, 100)}%"></div>
            <span class="text-[10px] uppercase tracking-[0.25em] text-white/40">${esc(item.label)}</span>
          </div>`).join('')}</div>`;
      }
      function renderTimeline(items) {
        if (!items.length) return `<div class="empty-state">Aucune donnée.</div>`;
        const width = 820, height = 260, padding = 28;
        const max = Math.max(...items.map(item => item.value), 1);
        const stepX = items.length > 1 ? (width - padding * 2) / (items.length - 1) : width - padding * 2;
        const points = items.map((item, index) => {
          const x = padding + index * stepX;
          const y = height - padding - (item.value / max) * (height - padding * 2);
          return `${x},${y}`;
        }).join(' ');
        const areaPoints = `${padding},${height - padding} ${points} ${width - padding},${height - padding}`;

          </defs>

          }).join('')}

      function renderLogin() {
        return `<div class="relative min-h-screen overflow-hidden text-white"><div class="relative z-10 grid min-h-screen gap-8 px-6 py-10 lg:grid-cols-[1.2fr_0.8fr] lg:px-12"><div class="flex flex-col justify-center"><div class="space-y-6"><span class="inline-flex rounded-full border border-white/15 bg-white/5 px-4 py-2 text-xs uppercase tracking-[0.4em] text-white/60">Dashboard administrateur immersif</span><h1 class="max-w-3xl text-5xl font-semibold leading-tight text-white md:text-6xl">Zetwal Admin : contrôle total des ventes, du stock et de l’expérience boutique.</h1><p class="max-w-2xl text-lg text-white/65">Authentification Firebase SDK avec secours REST, analytics reliés à la table sales, scanner QR, notifications, commandes, laverie, paramètres et ambiance galaxie dynamique.</p><div class="grid gap-4 sm:grid-cols-3">${renderMetric('Synchro', 'Sales → KPIs', 'Mises à jour en temps réel après vente', 'bg-emerald-500/30')}${renderMetric('Sécurité', 'Firebase', 'Emails admin strictement filtrés', 'bg-cyan-500/30')}${renderMetric('Immersion', 'Galaxie', 'Glassmorphisme et profondeur animée', 'bg-fuchsia-500/30')}</div></div></div><div class="flex items-center justify-center"><div class="glass-card depth-card w-full max-w-xl p-8"><div class="mb-6 space-y-2 text-center"><p class="text-xs uppercase tracking-[0.45em] text-white/40">Accès admin</p><h2 class="text-3xl font-semibold text-white">Connexion sécurisée</h2><p class="text-sm text-white/55">Emails autorisés : ${esc(ADMIN_EMAILS.join(' · '))}</p></div><form id="login-form" class="space-y-5"><input class="input-shell" type="email" data-model="loginForm.email" value="${esc(state.loginForm.email)}" placeholder="admin@zetwal.org" required><input class="input-shell" type="password" data-model="loginForm.password" value="${esc(state.loginForm.password)}" placeholder="••••••••" required>${state.authError ? `<p class="rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">${esc(state.authError)}</p>` : ''}<button type="submit" class="glow-button w-full justify-center">${state.loginBusy ? 'Connexion...' : 'Entrer dans le dashboard'}</button></form></div></div></div>${renderToasts()}</div>`;
      }
      function renderDenied() {
        return `<div class="relative min-h-screen overflow-hidden text-white"><div class="relative z-10 flex min-h-screen items-center justify-center p-6"><div class="glass-card depth-card max-w-2xl p-10 text-center"><p class="text-xs uppercase tracking-[0.45em] text-rose-300/80">Accès refusé</p><h1 class="mt-3 text-4xl font-semibold">Mur de sécurité administrateur</h1><p class="mt-4 text-white/60">L’email <span class="font-medium text-white">${esc(state.currentEmail || 'inconnu')}</span> n’est pas autorisé à accéder à cette interface.</p><button class="glow-button mx-auto mt-8 justify-center" data-action="logout">Revenir à la connexion</button></div></div>${renderToasts()}</div>`;
      }
      function renderLoading() {
        return `<div class="relative min-h-screen overflow-hidden text-white"><div class="relative z-10 flex min-h-screen items-center justify-center p-6"><div class="glass-card depth-card max-w-lg p-8 text-center"><div class="mx-auto mb-6 h-16 w-16 animate-pulse rounded-3xl bg-gradient-to-br from-cyan-400 via-violet-500 to-fuchsia-500"></div><h1 class="text-3xl font-semibold">Initialisation du noyau admin</h1><p class="mt-3 text-white/60">Connexion sécurisée, chargement des tables Supabase et préparation des analytics immersifs.</p></div></div></div>`;
      }
      function render() {
        if (state.authState === 'checking' || (state.authState === 'signed-in' && state.pageLoading)) {
          root.innerHTML = renderLoading();
        } else if (state.authState === 'signed-out') {
          root.innerHTML = renderLogin();
        } else if (state.authState === 'denied') {
          root.innerHTML = renderDenied();
        } else {
          root.innerHTML = renderApp();
          if (state.scannerOpen && state.activeTab === 'products') setTimeout(startScanner, 60);
        }
      }

      root.addEventListener('submit', async (event) => {
        if (event.target.id === 'login-form') return handleLogin(event);
        if (event.target.id === 'product-form') return handleSaveProduct(event);
        if (event.target.id === 'wash-form') return handleSaveWash(event);
      });
      root.addEventListener('input', (event) => {
        const target = event.target;
        if (target.id === 'manual-qr') state.manualQrValue = target.value;
        if (target.dataset.orderNote) state.orderNotes[target.dataset.orderNote] = target.value;
        if (target.dataset.model) {
          let value = target.value;
          if (target.type === 'checkbox') value = target.checked;
          if (target.type === 'file') value = target.files?.[0] || null;
          setByPath(state, target.dataset.model, value);
          if (target.dataset.model === 'productForm.qr_code_value') state.productForm.qr_code_value = String(state.productForm.qr_code_value || '').toUpperCase();
          if (target.dataset.live === 'true') render();
        }
      });
      root.addEventListener('change', (event) => {
        const target = event.target;
        if (target.dataset.model) {
          let value = target.value;
          if (target.type === 'checkbox') value = target.checked;
          if (target.type === 'file') value = target.files?.[0] || null;
          setByPath(state, target.dataset.model, value);
          if (target.dataset.live === 'true' || target.type === 'checkbox' || target.tagName === 'SELECT' || target.type === 'range' || target.type === 'file') render();
        }
      });
      root.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        const action = button.dataset.action;
        if (action === 'switch-tab') {
          state.activeTab = button.dataset.tab;
          if (state.activeTab !== 'products') { state.scannerOpen = false; await stopScanner(); }
          scheduleAnalyticsReady();
          return render();
        }
        if (action === 'logout') return handleLogout();
        if (action === 'toggle-scanner') {
          state.scannerOpen = !state.scannerOpen;
          if (!state.scannerOpen) await stopScanner();
          return render();
        }
        if (action === 'new-product') { resetProductForm(); return render(); }
        if (action === 'edit-product') { beginEditProduct(button.dataset.id); return render(); }
        if (action === 'delete-product') return handleDeleteProduct(button.dataset.id);
        if (action === 'open-sale') { openSaleForProduct(button.dataset.id); return render(); }
        if (action === 'close-sale') { state.selectedProductId = null; return render(); }
        if (action === 'process-sale') return handleProcessSale();
        if (action === 'manual-qr') return handleManualQrLookup();
        if (action === 'refresh-analytics') return refreshAnalytics();
        if (action === 'mark-read') return markNotificationAsRead(button.dataset.id);
        if (action === 'order-decision') return handleOrderDecision(button.dataset.id, button.dataset.status);
        if (action === 'advance-wash') return advanceWashStatus(button.dataset.id);
        if (action === 'load-notifications') {
          try { await loadNotifications(); render(); } catch (error) { showToast(error.message, 'error'); }
          return;
        }
        if (action === 'save-settings') return saveSettings();
        if (action === 'calc') return calculatorInput(button.dataset.token);
        if (action === 'inject-metric') {
          state.calcInputValue = String(button.dataset.value);
          state.calculatorExpression = String(button.dataset.value);
          state.calculatorResult = String(button.dataset.value);
          return render();
        }
        if (action === 'set-store-mode') { state.settings.storeMode = button.dataset.mode; return render(); }
      });

      function initGalaxy() {
        const canvas = document.getElementById('galaxy');
        const context = canvas.getContext('2d');
        let width = innerWidth, height = innerHeight, frame = 0;
        const mouse = { x: 0, y: 0 };
        const stars = Array.from({ length: 180 }).map(() => ({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.8 + 0.4,
          alpha: Math.random() * 0.7 + 0.2,
          speed: Math.random() * 0.3 + 0.05,
          depth: Math.random() * 1.4 + 0.2,
        }));
        const nebulas = [
          { x: .2, y: .2, radius: 180, color: 'rgba(168,85,247,.18)' },
          { x: .72, y: .3, radius: 220, color: 'rgba(34,211,238,.16)' },
          { x: .58, y: .75, radius: 260, color: 'rgba(244,114,182,.14)' },
        ];
        function resize() {
          width = innerWidth; height = innerHeight;
          const ratio = devicePixelRatio || 1;
          canvas.width = width * ratio; canvas.height = height * ratio;
          canvas.style.width = `${width}px`; canvas.style.height = `${height}px`;
          context.setTransform(ratio, 0, 0, ratio, 0, 0);
        }
        function draw(timestamp) {
          context.clearRect(0, 0, width, height);
          const background = context.createLinearGradient(0, 0, width, height);
          background.addColorStop(0, '#04050d'); background.addColorStop(.45, '#0b1025'); background.addColorStop(1, '#070913');
          context.fillStyle = background; context.fillRect(0, 0, width, height);
          nebulas.forEach((nebula, index) => {
            const driftX = Math.sin(timestamp / 8000 + index) * 40 + (mouse.x - width / 2) * 0.01;
            const driftY = Math.cos(timestamp / 9000 + index) * 24 + (mouse.y - height / 2) * 0.01;
            const gradient = context.createRadialGradient(nebula.x * width + driftX, nebula.y * height + driftY, 0, nebula.x * width + driftX, nebula.y * height + driftY, nebula.radius);
            gradient.addColorStop(0, nebula.color); gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient; context.fillRect(0, 0, width, height);
          });
          stars.forEach((star, index) => {
            const parallaxX = (mouse.x - width / 2) * 0.0008 * star.depth;
            const parallaxY = (mouse.y - height / 2) * 0.0008 * star.depth;
            const twinkle = Math.sin(timestamp * .0015 + index) * .2 + star.alpha;
            const x = (star.x + timestamp * star.speed * .01 * star.depth) % width;
            const y = (star.y + Math.sin(timestamp * .00035 + index) * 8 * star.depth) % height;
            context.beginPath();
            context.arc(x + parallaxX * width, y + parallaxY * height, star.radius * (twinkle + .4), 0, Math.PI * 2);
            context.fillStyle = `rgba(255,255,255,${clamp(twinkle, .12, .95)})`;
            context.fill();
          });
          frame = requestAnimationFrame(draw);
        }
        resize();
        draw(0);
        addEventListener('resize', resize);
        addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
      }

      initGalaxy();
      render();
    </script>
  </body>
</html>
