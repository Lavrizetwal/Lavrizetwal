<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zetwal Admin | Fusion</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script defer src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
:root{
  --gold:#ffd884;--gold-dark:#c9a227;--gold-light:#fff3c4;
  --black:#0a0a0f;--black2:#111118;--black3:#1a1a25;--black4:#22222f;--black5:#2d2d3d;
  --text:#f0e6c8;--text-dim:#9b8c6e;--text-muted:#5a5068;
  --border:rgba(255,216,132,0.15);--border-strong:rgba(255,216,132,0.4);
  --success:#4caf82;--danger:#e05555;--warning:#f0a500;--info:#5bb8f5;
  --sidebar-w:260px;--radius:14px;--radius-sm:8px;
  --shadow:0 8px 32px rgba(0,0,0,0.7);--shadow-gold:0 4px 24px rgba(255,216,132,0.18);
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--black);color:var(--text);overflow-x:hidden}
#galaxy-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(10,10,15,0.88) 0%,rgba(10,10,15,0.97) 100%)}
.login-box{background:linear-gradient(145deg,rgba(26,26,37,0.99),rgba(17,17,24,0.99));border:1px solid var(--border-strong);border-radius:24px;padding:52px 44px;width:420px;max-width:94vw;text-align:center;box-shadow:var(--shadow),var(--shadow-gold)}
.login-logo{width:84px;height:84px;margin:0 auto 22px;background:radial-gradient(circle,var(--gold) 0%,var(--gold-dark) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 0 40px rgba(255,216,132,0.55);animation:pulseLogo 3s ease-in-out infinite}
@keyframes pulseLogo{0%,100%{box-shadow:0 0 40px rgba(255,216,132,0.55)}50%{box-shadow:0 0 70px rgba(255,216,132,0.85),0 0 120px rgba(255,216,132,0.3)}}
.login-title{font-size:26px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),#fff3c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:13px;color:var(--text-dim);margin-bottom:26px;line-height:1.6}
.login-info{background:rgba(255,216,132,0.06);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:26px;font-size:12.5px;color:var(--text-dim);display:flex;align-items:flex-start;gap:10px;text-align:left}
.login-info i{color:var(--gold);font-size:15px;flex-shrink:0;margin-top:1px}
.btn-google{width:100%;padding:14px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:var(--radius);font-size:15px;font-weight:700;color:var(--black);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:var(--transition);box-shadow:0 4px 20px rgba(255,216,132,0.4)}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,216,132,0.6)}
.btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-error{margin-top:14px;padding:11px 14px;background:rgba(224,85,85,0.12);border:1px solid rgba(224,85,85,0.35);border-radius:var(--radius-sm);font-size:13px;color:#ff9090;display:none;align-items:center;gap:8px;text-align:left}
.login-spinner{display:none;margin-top:14px;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);font-size:13px}
.spin-sm{width:20px;height:20px;border:2px solid rgba(255,216,132,0.25);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}

/* DASHBOARD */
#dashboard{display:none;position:relative;z-index:1;width:100%;min-height:100vh}
.app-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:linear-gradient(180deg,rgba(17,17,24,0.97) 0%,rgba(10,10,15,0.99) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;backdrop-filter:blur(20px)}
.sidebar-header{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:44px;height:44px;background:radial-gradient(circle,var(--gold),var(--gold-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px rgba(255,216,132,0.4)}
.brand-name{font-size:13.5px;font-weight:800;color:var(--gold);letter-spacing:0.2px;line-height:1.2}
.brand-role{font-size:11px;color:var(--text-muted);margin-top:2px}
#sidebar-timer{margin:10px 14px 0;padding:8px 11px;background:rgba(255,216,132,0.07);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--gold);display:none;align-items:center;gap:6px}
#sidebar-timer.show{display:flex}
#timer-text{font-weight:600;flex:1}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);padding:0 8px;margin:14px 0 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:13.5px;color:var(--text-dim);position:relative;margin-bottom:2px;border:1px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,216,132,0.08);color:var(--text);border-color:var(--border)}
.nav-item.active{background:linear-gradient(135deg,rgba(255,216,132,0.16),rgba(255,216,132,0.07));color:var(--gold);border-color:var(--border);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gold);border-radius:0 2px 2px 0}
.nav-item i{width:18px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,216,132,0.04);border:1px solid var(--border);border-radius:var(--radius-sm)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--black);font-weight:700;flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-online{font-size:10px;color:var(--success);display:flex;align-items:center;gap:4px;margin-top:1px}
.user-online::before{content:'';width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:var(--transition)}
.btn-logout:hover{color:var(--danger);border-color:var(--danger)}

/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:62px;background:rgba(17,17,24,0.92);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 26px;gap:14px;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.topbar-title{font-size:18px;font-weight:700;color:var(--gold);flex:1}
.topbar-actions{display:flex;align-items:center;gap:10px}
.topbar-btn{background:rgba(255,216,132,0.07);border:1px solid var(--border);color:var(--text-dim);width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:var(--transition);position:relative}
.topbar-btn:hover{color:var(--gold);border-color:var(--border-strong)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--black2);display:none}
.page-content{flex:1;padding:26px;overflow-y:auto}

/* TABS */
.tab-panel{display:none}.tab-panel.active{display:block}

/* CARD */
.card{background:linear-gradient(145deg,rgba(26,26,37,0.96),rgba(17,17,24,0.96));border:1px solid var(--border);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title i{color:var(--gold)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:linear-gradient(145deg,rgba(26,26,37,0.97),rgba(17,17,24,0.97));border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:var(--transition)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark))}
.kpi-card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow-gold)}
.kpi-icon{width:42px;height:42px;background:rgba(255,216,132,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gold);margin-bottom:12px}
.kpi-value{font-size:24px;font-weight:800;color:var(--gold);line-height:1;margin-bottom:4px}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.section-title{font-size:19px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.section-title i{color:var(--gold)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:var(--transition);display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);box-shadow:0 2px 12px rgba(255,216,132,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,216,132,0.5)}
.btn-outline{background:transparent;border:1px solid var(--border-strong);color:var(--gold)}
.btn-outline:hover{background:rgba(255,216,132,0.08)}
.btn-danger{background:rgba(224,85,85,0.13);border:1px solid rgba(224,85,85,0.35);color:var(--danger)}
.btn-danger:hover{background:rgba(224,85,85,0.22)}
.btn-success{background:rgba(76,175,130,0.13);border:1px solid rgba(76,175,130,0.35);color:var(--success)}
.btn-success:hover{background:rgba(76,175,130,0.22)}
.btn-sm{padding:7px 13px;font-size:12px}.btn-xs{padding:4px 9px;font-size:11px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-active,.badge-available,.badge-validated,.badge-completed{background:rgba(76,175,130,0.14);color:var(--success);border:1px solid rgba(76,175,130,0.28)}
.badge-pending,.badge-processing{background:rgba(240,165,0,0.14);color:var(--warning);border:1px solid rgba(240,165,0,0.28)}
.badge-inactive,.badge-unavailable,.badge-cancelled,.badge-refunded{background:rgba(224,85,85,0.14);color:var(--danger);border:1px solid rgba(224,85,85,0.28)}
.badge-washing,.badge-info{background:rgba(91,184,245,0.14);color:var(--info);border:1px solid rgba(91,184,245,0.28)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:rgba(255,216,132,0.06);padding:11px 15px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,216,132,0.04);transition:background 0.15s}
tbody tr:hover{background:rgba(255,216,132,0.04)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:11px 15px;color:var(--text);vertical-align:middle}

/* FORMS */
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:11.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-control{width:100%;padding:10px 13px;background:rgba(255,216,132,0.05);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13.5px;transition:var(--transition);outline:none;font-family:inherit}
.form-control:focus{border-color:var(--gold);background:rgba(255,216,132,0.08);box-shadow:0 0 0 3px rgba(255,216,132,0.1)}
.form-control::placeholder{color:var(--text-muted)}
select.form-control option{background:var(--black3);color:var(--text)}
textarea.form-control{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}

/* IMAGE UPLOAD */
.img-upload-area{border:2px dashed var(--border-strong);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:var(--transition);background:rgba(255,216,132,0.03);position:relative;min-height:100px}
.img-upload-area:hover{border-color:var(--gold);background:rgba(255,216,132,0.07)}
.img-upload-label{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);cursor:pointer}
.img-upload-label i{font-size:32px;color:var(--gold);opacity:0.5}
.img-upload-label span{font-size:13px}
.img-upload-label small{font-size:11px;color:var(--text-muted)}
.img-remove-btn{position:absolute;top:8px;right:8px;background:rgba(224,85,85,0.85);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;transition:var(--transition);z-index:2}
.img-remove-btn:hover{background:var(--danger)}
.img-url-toggle{font-size:11px;color:var(--text-muted);margin-top:8px;cursor:pointer;text-decoration:underline;text-align:center;display:block}
.img-url-toggle:hover{color:var(--gold)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(145deg,var(--black3),var(--black2));border:1px solid var(--border-strong);border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow),var(--shadow-gold);animation:modalIn 0.28s ease}
@keyframes modalIn{from{opacity:0;transform:scale(0.93) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 22px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--transition)}
.modal-close:hover{color:var(--danger);border-color:var(--danger)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px}
.search-wrap .form-control{padding-left:34px}

/* EMPTY */
.empty-state{text-align:center;padding:52px 20px;color:var(--text-muted)}
.empty-state i{font-size:44px;color:var(--gold);opacity:0.25;margin-bottom:14px;display:block}
.empty-state p{font-size:14px}

/* TOAST */
#toast-container{position:fixed;bottom:22px;right:22px;z-index:99999;display:flex;flex-direction:column;gap:9px;max-width:340px}
.toast{background:var(--black3);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow);animation:toastIn 0.28s ease;border-left:3px solid var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-left-color:var(--success)}.toast.error{border-left-color:var(--danger)}.toast.warning{border-left-color:var(--warning)}
.t-icon{font-size:15px;flex-shrink:0;margin-top:1px;color:var(--gold)}
.toast.success .t-icon{color:var(--success)}.toast.error .t-icon{color:var(--danger)}.toast.warning .t-icon{color:var(--warning)}
.t-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}
.t-msg{font-size:12px;color:var(--text-dim)}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(10,10,15,0.82);z-index:8000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(3px)}
#loading-overlay.on{display:flex}
.spinner{width:46px;height:46px;border:3px solid rgba(255,216,132,0.18);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-top:22px}
.chart-card{background:linear-gradient(145deg,rgba(26,26,37,0.97),rgba(17,17,24,0.97));border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.chart-card canvas{max-height:270px}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.product-card{background:linear-gradient(145deg,rgba(26,26,37,0.97),rgba(17,17,24,0.97));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition)}
.product-card:hover{border-color:var(--border-strong);transform:translateY(-3px);box-shadow:var(--shadow-gold)}
.product-img{width:100%;height:155px;background:rgba(255,216,132,0.04);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.product-img img{width:100%;height:100%;object-fit:cover}
.no-img{font-size:44px;color:rgba(255,216,132,0.18)}
.p-status-badge{position:absolute;top:8px;right:8px}
.product-body{padding:13px}
.product-name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-price{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:2px}
.product-price-sub{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.product-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:8px}
.product-qr{font-size:10px;color:var(--text-muted);padding:4px 7px;background:rgba(0,0,0,0.25);border-radius:5px;font-family:'Courier New',monospace;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-actions{display:flex;gap:5px;flex-wrap:wrap}

/* WASH */
.wash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.wash-stat{background:rgba(255,216,132,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;text-align:center}
.ws-value{font-size:22px;font-weight:800;color:var(--gold);display:block}
.ws-label{font-size:11px;color:var(--text-muted);margin-top:2px}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.settings-section{background:linear-gradient(145deg,rgba(26,26,37,0.97),rgba(17,17,24,0.97));border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.settings-title{font-size:13.5px;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,216,132,0.04)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:13px;color:var(--text-dim);flex:1}
.settings-row-label small{display:block;font-size:11px;color:var(--text-muted);margin-top:1px}
.toggle{position:relative;width:42px;height:23px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--black5);border:1px solid var(--border);border-radius:23px;cursor:pointer;transition:var(--transition)}
.toggle-slider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:var(--text-muted);border-radius:50%;transition:var(--transition)}
.toggle input:checked+.toggle-slider{background:rgba(255,216,132,0.18);border-color:var(--gold)}
.toggle input:checked+.toggle-slider::before{transform:translateX(19px);background:var(--gold)}

/* CURRENCY */
.currency-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.currency-box{background:rgba(255,216,132,0.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.currency-box-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:6px}
.currency-box-value{font-size:18px;font-weight:800;color:var(--gold)}
.currency-box-sub{font-size:10px;color:var(--text-muted);margin-top:2px}

/* CALC */
.calc-display{background:rgba(0,0,0,0.55);border:1px solid var(--border);border-radius:var(--radius-sm);padding:15px;text-align:right;margin-bottom:14px}
.calc-expr{font-size:12px;color:var(--text-muted);min-height:17px;margin-bottom:3px}
.calc-val{font-size:34px;font-weight:800;color:var(--gold);font-family:'Courier New',monospace}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.c-btn{padding:15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,216,132,0.05);color:var(--text);font-size:16px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit}
.c-btn:hover{background:rgba(255,216,132,0.11);border-color:var(--border-strong)}
.c-btn.op{color:var(--gold);background:rgba(255,216,132,0.07)}
.c-btn.eq{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);border-color:transparent}
.c-btn.cl{color:var(--danger)}.c-btn.s2{grid-column:span 2}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:18px;margin-top:18px}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:62px;right:0;width:350px;height:calc(100vh - 62px);background:linear-gradient(180deg,var(--black2),var(--black));border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.notif-panel.open{transform:translateX(0)}
.notif-panel-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-panel-title{font-size:14px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.notif-list{flex:1;overflow-y:auto;padding:10px}
.notif-item{padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:7px;background:rgba(255,216,132,0.02);cursor:pointer;transition:var(--transition)}
.notif-item:hover{background:rgba(255,216,132,0.06)}
.notif-item.unread{border-left:3px solid var(--gold)}
.notif-item-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.notif-item-msg{font-size:12px;color:var(--text-dim);margin-bottom:3px}
.notif-item-time{font-size:10px;color:var(--text-muted)}

/* QR display */
.qr-code-display{font-family:'Courier New',monospace;font-size:11px;color:var(--gold);background:rgba(0,0,0,0.3);padding:6px 10px;border-radius:6px;word-break:break-all;margin-top:6px;border:1px solid rgba(255,216,132,0.15)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--black2)}
::-webkit-scrollbar-thumb{background:rgba(255,216,132,0.22);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,216,132,0.4)}

@media(max-width:860px){
  .sidebar{transform:translateX(-100%);transition:transform 0.3s}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .charts-grid,.analytics-grid{grid-template-columns:1fr}
  .currency-grid{grid-template-columns:1fr}
}

                                        <button class="btn btn-outline" data-finance="margin">Marge</button>

                                    <input id="rate-express" type="number" style="background:var(--black4); border:1px solid var(--border); padding:10px; border-radius:8px; color:white;">

                </div>
            </main>
        </div>
    </template>

    <script type="module">
        
        
        // Tab switching logic
        document.addEventListener('click', (e) => {
            const navItem = e.target.closest('.nav-item');
            if (navItem) {
                const tabId = navItem.dataset.tab;
                if (tabId) {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    navItem.classList.add('active');
                    document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
                    const targetTab = document.getElementById('tab-' + tabId);
                    if (targetTab) targetTab.classList.add('active');
                    const activeTitle = document.getElementById('active-title');
                    if (activeTitle) activeTitle.textContent = navItem.textContent.trim();
                    if (tabId === 'analytics' && typeof window.refreshAnalytics === 'function') window.refreshAnalytics();
                }
            }
        });
    </script>
