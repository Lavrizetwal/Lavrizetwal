<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produit Zetwal</title>
  <meta name="description" content="Produit Zetwal Organisation">
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold:#ffd700; --gold-deep:#b8860b; --gold-pale:#fff8dc;
      --bg:#010101; --surface:#0d0d0d; --text:#ffffff; --text-muted:rgba(255,255,255,0.5);
      --border:rgba(255,215,0,0.18); --green:#00ff88; --red:#ff4444;
      --radius:16px; --tr:all 0.35s cubic-bezier(0.165,0.84,0.44,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { background:var(--bg); color:var(--text); font-family:'Montserrat',sans-serif; min-height:100vh; }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--gold-deep);border-radius:2px}

    /* NAV */
    .nav {
      position:fixed; top:0; left:0; right:0; height:54px; z-index:100;
      background:rgba(1,1,1,0.9); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    }
    .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-pale),var(--gold),transparent);background-size:200% 100%;animation:gl 5s linear infinite}
    @keyframes gl{to{background-position:200% 0}}
    .nav-brand{font-family:'Playfair Display',serif;font-size:0.95rem;letter-spacing:2px;text-decoration:none;color:var(--text)}
    .nav-brand span{color:var(--gold)}
    .nav-back{font-size:0.65rem;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:var(--tr)}
    .nav-back:hover{color:var(--gold)}

    /* PRODUCT PAGE */
    .page{padding:70px 20px 60px;max-width:800px;margin:0 auto}

    /* Skeleton loader */
    .skeleton{
      background:linear-gradient(90deg,var(--surface) 25%,rgba(255,255,255,0.05) 50%,var(--surface) 75%);
      background-size:200% 100%;animation:skel 1.4s ease infinite;border-radius:8px;
    }
    @keyframes skel{to{background-position:-200% 0}}

    /* Product layout */
    .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
    @media(max-width:600px){.product-layout{grid-template-columns:1fr;gap:20px}}

    .product-img-wrap{
      border-radius:var(--radius);overflow:hidden;
      border:1px solid var(--border);background:var(--surface);
      aspect-ratio:1;position:relative;
    }
    .product-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .product-img-placeholder{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-size:5rem;background:var(--surface);
    }

    .product-info{}
    .product-cat{
      display:inline-block;font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;
      color:rgba(255,215,0,0.65);border:1px solid rgba(255,215,0,0.2);
      padding:3px 10px;border-radius:20px;margin-bottom:12px;
    }
    .product-name{
      font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);
      font-weight:700;line-height:1.2;margin-bottom:12px;
    }
    .product-price{
      font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);
      font-weight:700;color:var(--gold);margin-bottom:16px;
      filter:drop-shadow(0 0 12px rgba(255,215,0,0.3));
    }
    .product-price-sub{font-size:0.72rem;color:var(--text-muted);margin-top:-10px;margin-bottom:16px}

    .status-badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 14px;border-radius:20px;font-size:0.65rem;font-weight:700;
      letter-spacing:1px;margin-bottom:20px;
    }
    .status-available{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
    .status-sold{background:rgba(255,68,68,0.12);color:var(--red);border:1px solid rgba(255,68,68,0.25)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:dp 2s infinite}
    @keyframes dp{0%,100%{opacity:1}50%{opacity:0.4}}

    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0}

    .product-desc-title{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
    .product-desc{font-size:0.82rem;line-height:1.75;color:rgba(255,255,255,0.8)}

    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .meta-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px}
    .meta-label{font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .meta-value{font-size:0.78rem;font-weight:600}

    /* CTA */
    .cta-section{margin-top:24px}
    .btn-cta{
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:15px;border-radius:12px;font-family:'Montserrat',sans-serif;
      font-size:0.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      cursor:pointer;border:none;transition:var(--tr);text-decoration:none;
    }
    .btn-wa{background:linear-gradient(135deg,#128C7E,#25D366);color:#fff}
    .btn-wa:hover{box-shadow:0 0 20px rgba(37,211,102,0.4);transform:translateY(-2px)}
    .btn-wa:active{transform:translateY(0)}

    /* Sold overlay */
    .sold-overlay{
      position:absolute;inset:0;background:rgba(0,0,0,0.7);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;font-weight:800;letter-spacing:3px;color:var(--red);
      text-transform:uppercase;backdrop-filter:blur(2px);
    }

    /* Error state */
    .error-state{
      min-height:60vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;gap:14px;
    }
    .error-icon{font-size:4rem}
    .error-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--red)}
    .error-sub{font-size:0.78rem;color:var(--text-muted);max-width:300px;line-height:1.6}

    /* Nebula bg */
    .nebula{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
    .nb{position:absolute;border-radius:50%;filter:blur(80px);animation:nd 22s ease-in-out infinite alternate}
    .nb:nth-child(1){width:400px;height:400px;top:-80px;left:-80px;background:radial-gradient(circle,rgba(100,60,200,0.1)0%,transparent 70%)}
    .nb:nth-child(2){width:350px;height:350px;bottom:10%;right:-60px;background:radial-gradient(circle,rgba(255,215,0,0.06)0%,transparent 70%);animation-delay:-10s}
    @keyframes nd{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,-15px) scale(1.05)}}

    /* Share row */
    .share-row{display:flex;gap:8px;margin-top:12px}
    .share-btn{
      flex:1;padding:10px;border-radius:10px;font-family:'Montserrat',sans-serif;
      font-size:0.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      cursor:pointer;transition:var(--tr);border:1px solid var(--border);
      background:rgba(255,255,255,0.03);color:var(--text-muted);
    }
    .share-btn:hover{border-color:var(--border-hover);color:var(--text)}
  </style>
</head>
<body>

<div class="nebula"><div class="nb"></div><div class="nb"></div></div>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-back">← Retour</a>
  <a href="/" class="nav-brand">ZETWAL <span>SHOP</span></a>
  <div style="width:60px"></div>
</nav>

<!-- MAIN -->
<main class="page" id="main-content">
  <!-- Skeleton loading -->
  <div id="skeleton-loader">
    <div class="product-layout">
      <div class="skeleton" style="aspect-ratio:1;border-radius:16px"></div>
      <div>
        <div class="skeleton" style="height:14px;width:80px;margin-bottom:14px"></div>
        <div class="skeleton" style="height:32px;width:90%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:32px;width:70%;margin-bottom:14px"></div>
        <div class="skeleton" style="height:36px;width:110px;margin-bottom:18px"></div>
        <div class="skeleton" style="height:12px;width:100%;margin-bottom:6px"></div>
        <div class="skeleton" style="height:12px;width:85%;margin-bottom:6px"></div>
        <div class="skeleton" style="height:12px;width:70%;margin-bottom:20px"></div>
        <div class="skeleton" style="height:50px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- Product content (hidden until loaded) -->
  <div id="product-content" style="display:none"></div>

  <!-- Error state (hidden until error) -->
  <div id="error-state" class="error-state" style="display:none">
    <div class="error-icon">📦</div>
    <div class="error-title">Produit introuvable</div>
    <div class="error-sub">Ce produit n'existe pas ou a été supprimé.</div>
    <a href="/" style="color:var(--gold);font-size:0.75rem;font-weight:700;letter-spacing:1px">← Retour à l'accueil</a>
  </div>
</main>

<script type="module">
// ============================================================
// CONFIG — REMPLACER PAR VOS VRAIES VALEURS
// ============================================================
const SUPABASE_URL = 'https://mzwibzvdcwapqrtbhxox.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16d2lienZkY3dhcHFydGJoeG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzcxNTIsImV4cCI6MjA5MTc1MzE1Mn0.utazGnMswFOiArB66kfok7n2ds1Zr2wyVBRYVOFRT6c';
const WA_NUMBER    = '79961103506';  // Numéro WhatsApp

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// EXTRAIRE ID DEPUIS URL
// ============================================================
function getProductId() {
  const pathMatch = window.location.pathname.match(/\/product\/([^/?#]+)/);
  if (pathMatch) return pathMatch[1];
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || null;
}

// ============================================================
// CHARGE ET AFFICHE LE PRODUIT
// ============================================================
async function loadProduct() {
  const id = getProductId();
  if (!id) { showError(); return; }
  try {
    const { data, error } = await db.from('products').select('*').eq('id', id).single();
    if (error || !data) { showError(); return; }
    renderProduct(data);
  } catch (e) { showError(); }
}

function renderProduct(p) {
  const isSold = p.status === 'sold';
  const waMsg  = encodeURIComponent(`Bonjou! Mwen enterese nan pwodwi sa a: ${p.name} — ${formatPrice(p.price)} HTG\nhttps://zetwal.org/product/${p.id}`);
  const waUrl  = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;
  const shareUrl = `https://zetwal.org/product/${p.id}`;

  document.title = `${p.name} — Zetwal Shop`;
  setMeta('description', p.description || `${p.name} disponible sur Zetwal Shop`);
  setMeta('og:title', p.name);
  setMeta('og:description', p.description || '');
  if (p.image_url) setMeta('og:image', p.image_url);

  const catLabels = {
    vetement:'Vêtement', electronique:'Électronique',
    maison:'Maison', sport:'Sport', accessoire:'Accessoire', autre:'Autre'
  };

  const html = `
    <div class="product-layout">
      <div class="product-img-wrap">
        ${p.image_url ? `<img src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}" loading="eager">` : '<div class="product-img-placeholder">📦</div>'}
        ${isSold ? '<div class="sold-overlay">VENDU</div>' : ''}
      </div>
      <div class="product-info">
        ${p.category ? `<div class="product-cat">${catLabels[p.category] || p.category}</div>` : ''}
        <h1 class="product-name">${escHtml(p.name)}</h1>
        <div class="product-price">${formatPrice(p.price)} <span style="font-size:1rem;font-family:'Montserrat',sans-serif;font-weight:400;color:rgba(255,215,0,0.7)">HTG</span></div>
        <div class="product-price-sub">Toutes taxes incluses</div>
        <div class="status-badge ${isSold ? 'status-sold' : 'status-available'}">
          <span class="status-dot"></span>
          ${isSold ? 'Ce produit est vendu' : 'Disponible maintenant'}
        </div>
        ${p.description ? `<div class="divider"></div><div class="product-desc-title">Description</div><div class="product-desc">${escHtml(p.description).replace(/\n/g,'<br>')}</div>` : ''}
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">Référence</div><div class="meta-value" style="font-size:0.65rem;color:var(--text-muted);word-break:break-all">${p.id.slice(0,12)}...</div></div>
          <div class="meta-item"><div class="meta-label">Publié le</div><div class="meta-value">${new Date(p.created_at).toLocaleDateString('fr-FR')}</div></div>
        </div>
        <div class="cta-section">
          ${!isSold ? `<a href="${waUrl}" target="_blank" rel="noopener" class="btn-cta btn-wa">Contacter sur WhatsApp</a>` : `<div style="text-align:center;padding:14px;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);border-radius:12px;font-size:0.78rem;color:var(--red)">Ce produit a déjà été vendu.</div>`}
          <div class="share-row">
            <button class="share-btn" onclick="copyLink()">🔗 Copier lien</button>
            <button class="share-btn" onclick="nativeShare('${escHtml(p.name)}','${shareUrl}')">↗ Partager</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('skeleton-loader').style.display = 'none';
  const content = document.getElementById('product-content');
  content.innerHTML = html;
  content.style.display = 'block';
}

function showError() {
  document.getElementById('skeleton-loader').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatPrice(n) {
  return new Intl.NumberFormat('fr-HT').format(n ?? 0);
}
function setMeta(name, content) {
  let el = document.querySelector(`meta[name="${name}"]`) || document.querySelector(`meta[property="${name}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute(name.includes(':') ? 'property' : 'name', name); document.head.appendChild(el); }
  el.setAttribute('content', content);
}

window.copyLink = async () => {
  try { await navigator.clipboard.writeText(window.location.href); showSnack('Lien copié!'); } catch (e) { showSnack('Impossible de copier'); }
};

window.nativeShare = async (title, url) => {
  if (navigator.share) { try { await navigator.share({ title, url }); } catch (e) {} } else { copyLink(); }
};

function showSnack(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid rgba(255,215,0,0.3);border-radius:10px;padding:10px 20px;font-size:0.72rem;color:#ffd700;z-index:999;font-family:Montserrat,sans-serif;font-weight:600';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

loadProduct();
</script>
</body>
</html>
