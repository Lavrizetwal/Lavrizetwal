<!DOCTYPE html>

<html lang="ht">

<head>

<link rel="icon" type="image/png" href="logo.png">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ZETWAL GAMES | Flappy Edition</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">



<style>

:root {

--gold: #ffd700;

--gold-deep: #b8860b;

--gold-glow: rgba(255, 215, 0, 0.4);

--bg: #010101;

--card-bg: rgba(255, 255, 255, 0.03);

--text: #ffffff;

--transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);

}



body.light-mode { --bg: #f0f0f0; --card-bg: rgba(0, 0, 0, 0.05); --text: #1a1a1a; }



body {

background: var(--bg); color: var(--text); margin: 0;

font-family: 'Montserrat', sans-serif; overflow-x: hidden;

transition: background 0.5s ease;

}



#webgl-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }



.nav {

position: fixed; top: 0; width: 100%; z-index: 1000;

background: rgba(0, 0, 0, 0.1); backdrop-filter: blur(20px);

border-bottom: 1px solid var(--gold-glow);

}

.nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 12px 20px; }

.logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; cursor: pointer; }

.logo-text span { color: var(--gold); }


.nav-right { display: flex; align-items: center; gap: 15px; }

.theme-toggle { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }



.game-selection { padding: 100px 5% 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

.tab-btn {

background: var(--card-bg); border: 1px solid var(--gold-glow);

color: var(--text); padding: 10px 20px; border-radius: 50px; cursor: pointer;

font-weight: 600; transition: var(--transition);

}

.tab-btn.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold-glow); }



.game-view { display: none; padding: 10px 5%; max-width: 850px; margin: 0 auto; }

.game-view.active { display: block; animation: fadeIn 0.4s ease; }



.zoom-card {

background: var(--card-bg); backdrop-filter: blur(15px);

border-radius: 30px; padding: 20px; text-align: center; border: 1px solid var(--gold-glow);

box-shadow: 0 10px 30px rgba(0,0,0,0.5);

}



#flappy-canvas, #maze-canvas {

background: rgba(0,0,0,0.6); border-radius: 15px; border: 2px solid var(--gold);

margin: 10px auto; display: block; touch-action: none; max-width: 100%;

}



.leaderboard {

margin-top: 20px; background: rgba(255, 215, 0, 0.05);

border-radius: 15px; padding: 15px; text-align: left;

}

.leaderboard h3 { color: var(--gold); margin-top: 0; font-size: 0.9rem; text-transform: uppercase; }

.leader-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,215,0,0.1); font-size: 0.85rem; }



.maze-mobile-ctrl {

display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;

width: 150px; margin: 15px auto;

}

.m-btn {

background: rgba(255, 215, 0, 0.2); border: 1px solid var(--gold);

color: var(--gold); padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;

}



.btn-gold { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }

.btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold-glow); }

.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</style>

</head>

<body id="main-body">



<canvas id="webgl-canvas"></canvas>



<nav class="nav">

<div class="nav-content">

<a href="index.html" class="logo-text">LAVRI <span>ZETWAL</span></a>

<div class="nav-right">

<button class="theme-toggle" onclick="toggleTheme()">🌓 MODE</button>

<div id="nav-points" style="color:var(--gold); font-weight:800;">... PWEN</div>

</div>

</div>

</nav>



<div class="game-selection">

<button id="tab-flappy" class="tab-btn active" onclick="showGame('flappy')">🚀 Flappy Zetwal</button>

<button id="tab-maze" class="tab-btn" onclick="showGame('maze')">🌀 Labirent</button>

</div>



<section id="view-flappy" class="game-view active">

<div class="zoom-card">

<h1 style="color:var(--gold); margin:5px;">Flappy Zetwal</h1>

<p style="margin:5px; font-size: 0.8rem;">Koute: <b>10 pwen</b> pou chak pati</p>

<canvas id="flappy-canvas"></canvas>

<div id="flappy-ui">

<button id="start-flappy-btn" class="btn-gold" onclick="startFlappy()">KÒMANSE (10 PWEN)</button>

</div>

<div class="leaderboard" id="lb-flappy">

<h3>🏆 KLASMAN ZETWAL</h3>

<div id="list-flappy">Chajman...</div>

</div>

</div>

</section>



<section id="view-maze" class="game-view">

<div class="zoom-card">

<h1 style="color:var(--gold); margin:5px;">Labirent</h1>

<canvas id="maze-canvas"></canvas>

<div class="maze-mobile-ctrl">

<div></div><button class="m-btn" onclick="moveMaze('up')">↑</button><div></div>

<button class="m-btn" onclick="moveMaze('left')">←</button>

<button class="m-btn" onclick="moveMaze('down')">↓</button>

<button class="m-btn" onclick="moveMaze('right')">→</button>

</div>

<button id="start-maze-btn" class="btn-gold" onclick="deductPointsMaze()">REKÒMANSE (10 PWEN)</button>

</div>

</section>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",

authDomain: "lavrizetwal.firebaseapp.com",

projectId: "lavrizetwal",

storageBucket: "lavrizetwal.firebasestorage.app",

messagingSenderId: "291921316186",

appId: "1:291921316186:web:f55e8b34526960df394b63"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let userUID = null, userPoints = 0;



onAuthStateChanged(auth, (user) => {

if (user) {

userUID = user.uid;

onSnapshot(doc(db, "users", user.uid), (d) => {

userPoints = d.data()?.points || 0;

document.getElementById('nav-points').innerText = `${userPoints.toFixed(1)} PWEN`;

});

loadLeaderboard();

} else { window.location.href = 'index.html'; }

});



async function loadLeaderboard() {

const q = query(collection(db, "users"), orderBy("points", "desc"), limit(5));

const snap = await getDocs(q);

let html = "";

snap.forEach((doc, i) => {

const data = doc.data();

html += `<div class="leader-item"><span>${i+1}. ${data.username || 'Jwè'}</span> <b>${data.points.toFixed(0)}</b></div>`;

});

document.getElementById('list-flappy').innerHTML = html;

}



// --- UI & NAV ---

window.toggleTheme = () => document.getElementById('main-body').classList.toggle('light-mode');


window.showGame = (game) => {

document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));

document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

if(game === 'flappy') {

document.getElementById('view-flappy').classList.add('active');

document.getElementById('tab-flappy').classList.add('active');

initFlappy();

} else {

document.getElementById('view-maze').classList.add('active');

document.getElementById('tab-maze').classList.add('active');

initMaze();

}

};



// --- FLAPPY ZETWAL LOGIC ---

const fCanvas = document.getElementById('flappy-canvas');

const fCtx = fCanvas.getContext('2d');

let bird, pipes, fScore, fGameOver, fAnimId, fSpeed;



function initFlappy() {

fCanvas.width = 320; fCanvas.height = 400;

// Redwi vitès kòmansman an (Gravity ak jump pi dous)

bird = { x: 50, y: 150, v: 0, gravity: 0.18, jump: -3.8, size: 20 };

pipes = []; fScore = 0; fGameOver = true; fSpeed = 1.8;

drawFlappyStatic();

}



window.startFlappy = async () => {

if(userPoints < 10) { alert("Ou bezwen omwen 10 pwen!"); return; }

await updateDoc(doc(db, "users", userUID), { points: increment(-10) });

fGameOver = false;

document.getElementById('start-flappy-btn').classList.add('hidden');

gameLoopFlappy();

};



function gameLoopFlappy() {

if (fGameOver) return;

updateFlappy();

drawFlappy();

fAnimId = requestAnimationFrame(gameLoopFlappy);

}



function updateFlappy() {

bird.v += bird.gravity;

bird.y += bird.v;



let spawnDist = pipes.length === 0 ? 350 : 200; // Ogmante espas kòmansman an

if (pipes.length === 0 || pipes[pipes.length - 1].x < fCanvas.width - spawnDist) {

let gap = Math.max(110 - (fScore * 0.4), 80);

let pipeY = Math.random() * (fCanvas.height - gap - 100) + 50;

pipes.push({ x: fCanvas.width, y: pipeY, gap: gap, passed: false });

}



pipes.forEach((p) => {

p.x -= fSpeed + (fScore * 0.03); // Akselerasyon pi dous



if (bird.x + bird.size > p.x && bird.x < p.x + 40) {

if (bird.y < p.y || bird.y + bird.size > p.y + p.gap) { endFlappy(); }

}

if (!p.passed && p.x + 40 < bird.x) { p.passed = true; fScore++; if(fScore%5===0) burst(); }

});



if (pipes[0] && pipes[0].x < -40) pipes.shift();

if (bird.y > fCanvas.height || bird.y < 0) endFlappy();

}



async function endFlappy() {

fGameOver = true;

cancelAnimationFrame(fAnimId);

if (fScore > 0) await updateDoc(doc(db, "users", userUID), { points: increment(fScore * 2) });

alert(`Pati Fini! Ou fè ${fScore} pwen.`);

document.getElementById('start-flappy-btn').classList.remove('hidden');

loadLeaderboard();

initFlappy();

}



function drawFlappy() {

fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);

fCtx.shadowBlur = 15; fCtx.shadowColor = "gold";

fCtx.font = "24px Arial";

fCtx.fillText("⭐", bird.x, bird.y + bird.size);

fCtx.shadowBlur = 0;

fCtx.fillStyle = "rgba(255, 215, 0, 0.8)";

pipes.forEach(p => {

fCtx.fillRect(p.x, 0, 40, p.y);

fCtx.fillRect(p.x, p.y + p.gap, 40, fCanvas.height);

});

fCtx.fillStyle = "white";

fCtx.font = "bold 20px Montserrat";

fCtx.fillText(`Score: ${fScore}`, 15, 30);

}



function drawFlappyStatic() {

fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);

fCtx.fillStyle = "gold";

fCtx.textAlign = "center";

fCtx.font = "bold 18px Montserrat";

fCtx.fillText("PRE PARE?", fCanvas.width/2, fCanvas.height/2);

fCtx.textAlign = "start";

}



const jumpAction = () => { if(!fGameOver) { bird.v = bird.jump; burst(); } };

window.addEventListener('keydown', (e) => { if(e.code === 'Space') jumpAction(); });

fCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); jumpAction(); });

fCanvas.addEventListener('mousedown', jumpAction);



// --- MAZE LOGIC ---

let mazeLvl = 1, mSize, mCell, mWalls, mPlayer, mGoal;

const mCanvas = document.getElementById('maze-canvas'), mCtx = mCanvas.getContext('2d');



window.deductPointsMaze = async () => {

if(userPoints < 10) { alert("Ou bezwen 10 pwen!"); return; }

await updateDoc(doc(db, "users", userUID), { points: increment(-10) });

mazeLvl = 1; initMaze();

};



function initMaze() {

mSize = 7 + (mazeLvl * 2); if(mSize > 25) mSize = 25;

mCell = Math.floor(280 / mSize);

mCanvas.width = mSize * mCell; mCanvas.height = mSize * mCell;

mPlayer = {x:0, y:0}; mGoal = {x:mSize-1, y:mSize-1};

generateMaze(); drawMaze();

}



function generateMaze() {

mWalls = Array(mSize).fill().map(() => Array(mSize).fill().map(() => ({t:1, r:1, b:1, l:1, v:0})));

let stack = [], curr = {x:0, y:0}; mWalls[0][0].v = 1;

let vCount = 1, total = mSize * mSize;

while(vCount < total) {

let n = [], {x,y} = curr;

if(y>0 && !mWalls[x][y-1].v) n.push({x, y:y-1, d:'t'});

if(x<mSize-1 && !mWalls[x+1][y].v) n.push({x:x+1, y, d:'r'});

if(y<mSize-1 && !mWalls[x][y+1].v) n.push({x:x, y:y+1, d:'b'});

if(x>0 && !mWalls[x-1][y].v) n.push({x:x-1, y, d:'l'});

if(n.length > 0) {

let next = n[Math.floor(Math.random()*n.length)];

if(next.d==='t'){mWalls[x][y].t=0; mWalls[next.x][next.y].b=0;}

else if(next.d==='r'){mWalls[x][y].r=0; mWalls[next.x][next.y].l=0;}

else if(next.d==='b'){mWalls[x][y].b=0; mWalls[next.x][next.y].t=0;}

else if(next.d==='l'){mWalls[x][y].l=0; mWalls[next.x][next.y].r=0;}

mWalls[next.x][next.y].v=1; stack.push(curr); curr=next; vCount++;

} else if(stack.length > 0) curr = stack.pop();

}

}



function drawMaze() {

mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);

mCtx.strokeStyle="#ffd700"; mCtx.lineWidth=2;

for(let x=0;x<mSize;x++) for(let y=0;y<mSize;y++) {

let w=mWalls[x][y], px=x*mCell, py=y*mCell;

mCtx.beginPath();

if(w.t){mCtx.moveTo(px,py); mCtx.lineTo(px+mCell,py);}

if(w.r){mCtx.moveTo(px+mCell,py); mCtx.lineTo(px+mCell,py+mCell);}

if(w.b){mCtx.moveTo(px,py+mCell); mCtx.lineTo(px+mCell,py+mCell);}

if(w.l){mCtx.moveTo(px,py); mCtx.lineTo(px,py+mCell);}

mCtx.stroke();

}

mCtx.font=`${mCell*0.8}px Arial`;

mCtx.fillText("👕", mPlayer.x*mCell+2, mPlayer.y*mCell+mCell-2);

mCtx.fillText("🧼", mGoal.x*mCell+2, mGoal.y*mCell+mCell-2);

}



window.moveMaze = async (dir) => {

let {x,y} = mPlayer, mv = false;

if(dir==='up' && !mWalls[x][y].t){mPlayer.y--; mv=true;}

if(dir==='down' && !mWalls[x][y].b){mPlayer.y++; mv=true;}

if(dir==='left' && !mWalls[x][y].l){mPlayer.x--; mv=true;}

if(dir==='right' && !mWalls[x][y].r){mPlayer.x++; mv=true;}

if(mv) {

drawMaze(); burst();

if(mPlayer.x===mGoal.x && mPlayer.y===mGoal.y) {

await updateDoc(doc(db, "users", userUID), { points: increment(mazeLvl * 5) });

alert("Bravo! Nivo an ogmante."); mazeLvl++; initMaze();

}

}

};



window.addEventListener('keydown', (e) => {

if (document.getElementById('view-maze').classList.contains('active')) {

if (e.key === "ArrowUp") moveMaze('up');

if (e.key === "ArrowDown") moveMaze('down');

if (e.key === "ArrowLeft") moveMaze('left');

if (e.key === "ArrowRight") moveMaze('right');

}

});



// --- THREE.JS EPIC BACKGROUND ---

const sc = new THREE.Scene();

const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const rend = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true, antialias: true });

rend.setSize(window.innerWidth, window.innerHeight);



const starGeo = new THREE.BufferGeometry();

const starCoords = [];

for(let i=0; i<5000; i++) {

starCoords.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);

}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));

const starMat = new THREE.PointsMaterial({ color: 0xffd700, size: 0.03, transparent: true, opacity: 0.8 });

const stars = new THREE.Points(starGeo, starMat);

sc.add(stars);



// Sistèm Burst (Sipriz la)

let burstParticles = [];

function burst() {

const geometry = new THREE.SphereGeometry(0.05, 8, 8);

const material = new THREE.MeshBasicMaterial({ color: 0xffd700 });

for(let i=0; i<10; i++){

const p = new THREE.Mesh(geometry, material);

p.position.set((Math.random()-0.5)*2, (Math.random()-0.5)*2, 0);

p.userData.velocity = new THREE.Vector3((Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1);

sc.add(p);

burstParticles.push(p);

}

}



cam.position.z = 10;

function animate() {

requestAnimationFrame(animate);

stars.rotation.y += 0.001;

stars.rotation.x += 0.0005;


burstParticles.forEach((p, i) => {

p.position.add(p.userData.velocity);

p.scale.multiplyScalar(0.95);

if(p.scale.x < 0.01) { sc.remove(p); burstParticles.splice(i, 1); }

});



rend.render(sc, cam);

}

animate();



window.addEventListener('resize', () => {

cam.aspect = window.innerWidth / window.innerHeight;

cam.updateProjectionMatrix();

rend.setSize(window.innerWidth, window.innerHeight);

});


initFlappy();

</script>

</body>

</html>
