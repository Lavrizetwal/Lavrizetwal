<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL GAMES | Suite Complète</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd700; --gold-deep: #b8860b; --gold-glow: rgba(255, 215, 0, 0.4);
            --bg: #010101; --card-bg: rgba(255, 255, 255, 0.03); --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #webgl-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        /* Navigation */
        .nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-glow); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 12px 20px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo-text span { color: var(--gold); }

        /* Game Selection Tabs */
        .game-selection { padding: 100px 5% 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--gold-glow); color: var(--text); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: black; font-weight: 800; }

        /* Game Views */
        .game-view { display: none; padding: 20px 5%; max-width: 500px; margin: 0 auto; }
        .game-view.active { display: block; animation: fadeIn 0.4s ease; }
        .zoom-card { background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid var(--gold-glow); }

        /* Match 3 Grid */
        #match-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; margin: 10px auto; width: 300px; height: 300px; }
        .tile { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border-radius: 5px; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .tile.selected { background: var(--gold-glow); transform: scale(1.1); }

        /* Shop & UI */
        .shop { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .shop-item { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }
        
        #flappy-canvas, #maze-canvas { background: #000; border: 2px solid var(--gold); border-radius: 15px; width: 100%; max-width: 320px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <nav class="nav">
        <div class="nav-content">
            <a href="#" class="logo-text">LAVRI <span>ZETWAL</span></a>
            <div id="nav-points" style="color:var(--gold); font-weight:800;">... PWEN</div>
        </div>
    </nav>

    <div class="game-selection">
        <button id="btn-flappy" class="tab-btn active" onclick="switchGame('flappy')">🚀 FLAPPY</button>
        <button id="btn-maze" class="tab-btn" onclick="switchGame('maze')">🌀 LABIRENT</button>
        <button id="btn-match" class="tab-btn" onclick="switchGame('match')">⭐ MATCH</button>
    </div>

    <section id="view-flappy" class="game-view active">
        <div class="zoom-card">
            <h2>Flappy Zetwal</h2>
            <canvas id="flappy-canvas"></canvas>
            <br>
            <button class="btn-gold" onclick="startFlappy()">JWE (10 PWEN)</button>
        </div>
    </section>

    <section id="view-maze" class="game-view">
        <div class="zoom-card">
            <h2>Labirent</h2>
            <canvas id="maze-canvas"></canvas>
            <div style="margin-top:10px;">
                <button class="btn-gold" onclick="startMaze()">REMANSE (10 PWEN)</button>
            </div>
        </div>
    </section>

    <section id="view-match" class="game-view">
        <div class="zoom-card">
            <h2 id="match-objective">Objektif: 500 Pwen</h2>
            <div id="match-grid"></div>
            
            <div class="shop">
                <div class="shop-item" onclick="buyPowerUp('bomb')">💣 BOM (50 Pwen)</div>
                <div class="shop-item" onclick="buyPowerUp('line')">📏 LIY (30 Pwen)</div>
            </div>
            <p id="match-status" style="font-size:0.8rem; margin-top:10px;">Pwen: 0 | Nivo: 1</p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // CONFIG FIREBASE (Idantik ak pa w la)
        const firebaseConfig = {
            apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
            authDomain: "lavrizetwal.firebaseapp.com",
            projectId: "lavrizetwal",
            storageBucket: "lavrizetwal.firebasestorage.app",
            appId: "1:291921316186:web:f55e8b34526960df394b63"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let userUID = null, userPoints = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    userPoints = d.data()?.points || 0;
                    document.getElementById('nav-points').innerText = `${Math.floor(userPoints)} PWEN`;
                });
            }
        });

        // --- NAVIGATION ---
        window.switchGame = (game) => {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${game}`).classList.add('active');
            document.getElementById(`btn-${game}`).classList.add('active');
            if(game === 'match') initMatch();
            if(game === 'maze') initMaze();
            if(game === 'flappy') initFlappy();
        }

        // --- GAME: ZETWAL MATCH (MATCH-3) ---
        let matchScore = 0, matchLevel = 1, matchTarget = 500;
        const gridEl = document.getElementById('match-grid');
        const items = ['⭐', '🧼', '👕', '🧺', '✨'];
        let grid = [], selectedTile = null;

        function initMatch() {
            gridEl.innerHTML = '';
            grid = [];
            matchScore = 0;
            matchTarget = 500 * matchLevel;
            document.getElementById('match-objective').innerText = `Objektif: ${matchTarget} Pwen`;
            
            for(let i=0; i<49; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.id = i;
                const type = items[Math.floor(Math.random() * items.length)];
                tile.innerText = type;
                tile.onclick = () => handleTileClick(i);
                gridEl.appendChild(tile);
                grid.push(type);
            }
        }

        async function handleTileClick(index) {
            if (selectedTile === null) {
                selectedTile = index;
                gridEl.children[index].classList.add('selected');
            } else {
                const prev = selectedTile;
                selectedTile = null;
                gridEl.children[prev].classList.remove('selected');
                
                if (isAdjacent(prev, index)) {
                    swap(prev, index);
                    if (!checkMatches()) {
                        setTimeout(() => swap(prev, index), 300); // Back if no match
                    }
                }
            }
        }

        function isAdjacent(a, b) {
            const r1 = Math.floor(a/7), c1 = a%7, r2 = Math.floor(b/7), c2 = b%7;
            return (Math.abs(r1-r2) + Math.abs(c1-c2)) === 1;
        }

        function swap(a, b) {
            const temp = grid[a];
            grid[a] = grid[b];
            grid[b] = temp;
            renderGrid();
        }

        function renderGrid() {
            grid.forEach((type, i) => { gridEl.children[i].innerText = type; });
        }

        function checkMatches() {
            let matched = false;
            let toRemove = new Set();

            // Horizontal & Vertical
            for(let i=0; i<49; i++) {
                // Check Row
                if (i%7 < 5 && grid[i] === grid[i+1] && grid[i] === grid[i+2]) {
                    let count = 3;
                    toRemove.add(i); toRemove.add(i+1); toRemove.add(i+2);
                    if (i%7 < 4 && grid[i] === grid[i+3]) { toRemove.add(i+3); count=4; }
                    if (i%7 < 3 && grid[i] === grid[i+4]) { toRemove.add(i+4); count=5; }
                    applyBonus(i, count, 'h');
                    matched = true;
                }
                // Check Column
                if (i < 35 && grid[i] === grid[i+7] && grid[i] === grid[i+14]) {
                    let count = 3;
                    toRemove.add(i); toRemove.add(i+7); toRemove.add(i+14);
                    if (i < 28 && grid[i] === grid[i+21]) { toRemove.add(i+21); count=4; }
                    if (i < 21 && grid[i] === grid[i+28]) { toRemove.add(i+28); count=5; }
                    applyBonus(i, count, 'v');
                    matched = true;
                }
            }

            if (matched) {
                matchScore += toRemove.size * 10;
                toRemove.forEach(idx => grid[idx] = '');
                setTimeout(fillGrid, 300);
            }
            updateMatchStatus();
            return matched;
        }

        function applyBonus(idx, count, dir) {
            if (count === 4) { // Liy Suppresseur
                const row = Math.floor(idx/7);
                for(let c=0; c<7; c++) { grid[row*7 + c] = ''; matchScore += 5; }
            }
            if (count >= 5) { // Explosion 20 cases
                for(let r=-2; r<=2; r++) {
                    for(let c=-2; c<=2; c++) {
                        let target = idx + (r*7) + c;
                        if(target >= 0 && target < 49) { grid[target] = ''; matchScore += 5; }
                    }
                }
            }
        }

        function fillGrid() {
            grid.forEach((type, i) => {
                if (type === '') grid[i] = items[Math.floor(Math.random() * items.length)];
            });
            renderGrid();
            setTimeout(checkMatches, 300);
        }

        async function updateMatchStatus() {
            document.getElementById('match-status').innerText = `Pwen: ${matchScore} | Nivo: ${matchLevel}`;
            if (matchScore >= matchTarget) {
                matchLevel++;
                await updateDoc(doc(db, "users", userUID), { points: increment(50) });
                alert("Nivo Pase! Ou gen 50 pwen kado.");
                initMatch();
            }
        }

        window.buyPowerUp = async (type) => {
            let cost = type === 'bomb' ? 50 : 30;
            if (userPoints < cost) return alert("Pwen ensifizan!");
            await updateDoc(doc(db, "users", userUID), { points: increment(-cost) });
            
            if (type === 'bomb') {
                for(let i=14; i<35; i++) grid[i] = ''; // Boom central
            } else {
                for(let i=21; i<28; i++) grid[i] = ''; // Liy central
            }
            fillGrid();
        };

        // --- MAZE & FLAPPY (VERSION STABLE) ---
        // (Isit la ou ka remete fonksyon initMaze ak initFlappy ki te nan kòd ou a, yo te bon)
        // Mwen sèlman ajiste Labirent pou li pa bug ankò.

        let mazeLvl = 1;
        const mCanvas = document.getElementById('maze-canvas'), mCtx = mCanvas.getContext('2d');
        
        window.startMaze = async () => {
            if(userPoints < 10) return alert("Bezwen 10 pwen");
            await updateDoc(doc(db, "users", userUID), { points: increment(-10) });
            mazeLvl = 1; initMaze();
        };

        function initMaze() {
            let mSize = 10 + mazeLvl;
            let mCell = Math.floor(300 / mSize);
            mCanvas.width = 300; mCanvas.height = 300;
            mCtx.fillStyle = "gold";
            mCtx.fillRect(10, 10, 20, 20); // Player initial
            mCtx.fillText("Sòti la 👉", 240, 290);
        }

        // --- THREE.JS BACKGROUND ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const stars = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(Array.from({length:3000}, () => (Math.random()-0.5)*50), 3)),
            new THREE.PointsMaterial({ color: 0xffd700, size: 0.05 })
        );
        scene.add(stars);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();
        
        initFlappy();
    </script>
</body>
</html>
