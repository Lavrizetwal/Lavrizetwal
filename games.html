<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL GAMES | Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd700; --gold-deep: #b8860b; --gold-glow: rgba(255, 215, 0, 0.4);
            --bg: #010101; --card-bg: rgba(255, 255, 255, 0.03); --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body.light-mode { --bg: #f0f0f0; --card-bg: rgba(0, 0, 0, 0.05); --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background 0.5s ease; }
        #webgl-canvas { position: fixed; inset: 0; z-index: -10; pointer-events: none; }

        .nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0, 0, 0, 0.1); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-glow); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 12px 20px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; cursor: pointer; }
        .logo-text span { color: var(--gold); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .theme-toggle { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }

        .game-selection { padding: 100px 5% 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--gold-glow); color: var(--text); padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: var(--transition); font-size: 0.85rem; }
        .tab-btn.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold-glow); }

        .game-view { display: none; padding: 10px 5%; max-width: 850px; margin: 0 auto; }
        .game-view.active { display: block; animation: fadeIn 0.4s ease; }

        .zoom-card { background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; text-align: center; border: 1px solid var(--gold-glow); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        canvas { background: rgba(0,0,0,0.6); border-radius: 15px; border: 2px solid var(--gold); margin: 10px auto; display: block; touch-action: none; max-width: 100%; }

        .leaderboard { margin-top: 20px; background: rgba(255, 215, 0, 0.05); border-radius: 15px; padding: 15px; text-align: left; }
        .leaderboard h3 { color: var(--gold); margin-top: 0; font-size: 0.9rem; text-transform: uppercase; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,215,0,0.1); font-size: 0.85rem; }

        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold-glow); }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body">

    <canvas id="webgl-canvas"></canvas>

    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo-text">LAVRI <span>ZETWAL</span></a>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()">🌓 MODE</button>
                <div id="nav-points" style="color:var(--gold); font-weight:800;">... PWEN</div>
            </div>
        </div>
    </nav>

    <div class="game-selection">
        <button id="tab-flappy" class="tab-btn active" onclick="showGame('flappy')">🚀 Flappy</button>
        <button id="tab-maze" class="tab-btn" onclick="showGame('maze')">🌀 Labirent</button>
        <button id="tab-rider" class="tab-btn" onclick="showGame('rider')">🏍️ Zetwal Rider</button>
    </div>

    <section id="view-flappy" class="game-view active">
        <div class="zoom-card">
            <h1 style="color:var(--gold); margin:5px;">Flappy Zetwal</h1>
            <canvas id="flappy-canvas"></canvas>
            <button id="start-flappy-btn" class="btn-gold" onclick="startFlappy()">JWE (10 PWEN)</button>
            <div class="leaderboard"><div id="list-flappy">Chajman...</div></div>
        </div>
    </section>

    <section id="view-maze" class="game-view">
        <div class="zoom-card">
            <h1 style="color:var(--gold); margin:5px;">Labirent</h1>
            <canvas id="maze-canvas"></canvas>
            <button class="btn-gold" onclick="deductPointsMaze()">REKÒMANSE (10 PWEN)</button>
        </div>
    </section>

    <section id="view-rider" class="game-view">
        <div class="zoom-card">
            <h1 style="color:var(--gold); margin:5px;">Zetwal Rider</h1>
            <p style="font-size: 0.7rem; opacity: 0.8;">Peze (oubyen kenbe dwèt ou) pou akselere!</p>
            <canvas id="rider-canvas"></canvas>
            <button id="start-rider-btn" class="btn-gold" onclick="startRider()">KÒMANSE (10 PWEN)</button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
            authDomain: "lavrizetwal.firebaseapp.com",
            projectId: "lavrizetwal",
            storageBucket: "lavrizetwal.firebasestorage.app",
            messagingSenderId: "291921316186",
            appId: "1:291921316186:web:f55e8b34526960df394b63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUID = null, userPoints = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    userPoints = d.data()?.points || 0;
                    document.getElementById('nav-points').innerText = `${userPoints.toFixed(1)} PWEN`;
                });
                loadLeaderboard();
            } else { window.location.href = 'index.html'; }
        });

        async function loadLeaderboard() {
            const q = query(collection(db, "users"), orderBy("points", "desc"), limit(5));
            const snap = await getDocs(q);
            let html = "<h3>🏆 TOP ZETWAL</h3>";
            snap.forEach((doc, i) => {
                const data = doc.data();
                html += `<div class="leader-item"><span>${i+1}. ${data.username || 'Jwè'}</span> <b>${data.points.toFixed(0)}</b></div>`;
            });
            document.getElementById('list-flappy').innerHTML = html;
        }

        window.toggleTheme = () => document.getElementById('main-body').classList.toggle('light-mode');
        
        window.showGame = (game) => {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${game}`).classList.add('active');
            document.getElementById(`tab-${game}`).classList.add('active');
            if(game === 'flappy') initFlappy();
            if(game === 'maze') initMaze();
            if(game === 'rider') initRider();
        };

        // --- RIDER LOGIC (NOUVO) ---
        const rCanvas = document.getElementById('rider-canvas');
        const rCtx = rCanvas.getContext('2d');
        let rActive = false, rScore = 0, rPoints = [], rider, rCamX = 0;

        function initRider() {
            rCanvas.width = 400; rCanvas.height = 300;
            rider = { x: 50, y: 0, v: 0, angle: 0, rotV: 0 };
            rPoints = []; rCamX = 0; rScore = 0;
            for(let i=0; i<20; i++) addRiderPoint();
            drawRiderStatic();
        }

        function addRiderPoint() {
            let prev = rPoints.length ? rPoints[rPoints.length-1] : {x:0, y:200};
            rPoints.push({
                x: prev.x + 40 + Math.random()*20,
                y: 150 + Math.sin(rPoints.length * 0.5) * 50 + (Math.random()-0.5)*30
            });
        }

        window.startRider = async () => {
            if(userPoints < 10) return alert("Bezen 10 pwen!");
            await updateDoc(doc(db, "users", userUID), { points: increment(-10) });
            rActive = true; 
            document.getElementById('start-rider-btn').classList.add('hidden');
            loopRider();
        };

        let isPressing = false;
        window.addEventListener('mousedown', () => isPressing = true);
        window.addEventListener('mouseup', () => isPressing = false);
        window.addEventListener('touchstart', () => isPressing = true);
        window.addEventListener('touchend', () => isPressing = false);

        function loopRider() {
            if(!rActive) return;
            updateRider();
            drawRider();
            requestAnimationFrame(loopRider);
        }

        function updateRider() {
            if(isPressing) rider.v += 0.2;
            rider.v *= 0.98; // Friction
            rider.x += rider.v;
            rCamX = rider.x - 50;

            // Fizik Tè a
            let p1 = rPoints.find(p => p.x > rider.x - 40);
            let p2 = rPoints[rPoints.indexOf(p1)+1];
            if(!p2) { addRiderPoint(); return; }

            let t = (rider.x - p1.x) / (p2.x - p1.x);
            let groundY = p1.y + (p2.y - p1.y) * t;

            if(rider.y < groundY - 10) { rider.y += 3; rider.angle += 0.02; }
            else { 
                rider.y = groundY - 10; 
                rider.angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            }

            rScore = Math.floor(rider.x / 100);
            if(rider.angle > 1.5 || rider.angle < -1.5) endRider(); // Si li baskile
        }

        async function endRider() {
            rActive = false;
            if(rScore > 0) await updateDoc(doc(db, "users", userUID), { points: increment(rScore) });
            alert(`Rider Crash! Score: ${rScore}`);
            document.getElementById('start-rider-btn').classList.remove('hidden');
            initRider();
        }

        function drawRider() {
            rCtx.clearRect(0,0,400,300);
            rCtx.save(); rCtx.translate(-rCamX, 0);
            
            // Draw Ground
            rCtx.beginPath(); rCtx.strokeStyle = "gold"; rCtx.lineWidth = 3;
            rCtx.moveTo(rPoints[0].x, rPoints[0].y);
            rPoints.forEach(p => rCtx.lineTo(p.x, p.y));
            rCtx.stroke();

            // Draw Rider
            rCtx.translate(rider.x, rider.y);
            rCtx.rotate(rider.angle);
            rCtx.font = "20px Arial";
            rCtx.fillText("🏍️", -10, 0);
            rCtx.restore();

            rCtx.fillStyle = "white"; rCtx.font = "15px Montserrat";
            rCtx.fillText(`Distance: ${rScore}m`, 20, 30);
        }

        function drawRiderStatic() {
            rCtx.clearRect(0,0,400,300);
            rCtx.fillStyle = "gold"; rCtx.textAlign = "center";
            rCtx.fillText("KENBE POU AKSÈLÈRE", 200, 150);
            rCtx.textAlign = "start";
        }

        // --- FLAPPY LOGIC --- (Konsève)
        const fCanvas = document.getElementById('flappy-canvas');
        const fCtx = fCanvas.getContext('2d');
        let bird, pipes, fScore, fGameOver, fAnimId;
        function initFlappy() {
            fCanvas.width = 320; fCanvas.height = 300;
            bird = { x: 50, y: 150, v: 0, gravity: 0.2, jump: -4, size: 20 };
            pipes = []; fScore = 0; fGameOver = true;
            fCtx.fillStyle = "gold"; fCtx.fillText("PRE PARE?", 130, 150);
        }
        window.startFlappy = async () => {
            if(userPoints < 10) return;
            await updateDoc(doc(db, "users", userUID), { points: increment(-10) });
            fGameOver = false; document.getElementById('start-flappy-btn').classList.add('hidden');
            loopFlappy();
        };
        function loopFlappy() { if(fGameOver) return; updateFlappy(); drawFlappy(); requestAnimationFrame(loopFlappy); }
        function updateFlappy() {
            bird.v += bird.gravity; bird.y += bird.v;
            if(pipes.length==0 || pipes[pipes.length-1].x < 150) pipes.push({x:320, y:Math.random()*150+50, passed:false});
            pipes.forEach(p => {
                p.x -= 2;
                if(bird.x+bird.size > p.x && bird.x < p.x+30 && (bird.y < p.y || bird.y+bird.size > p.y+80)) endFlappy();
                if(!p.passed && p.x < bird.x) { p.passed=true; fScore++; }
            });
            if(bird.y > 300 || bird.y < 0) endFlappy();
        }
        async function endFlappy() { 
            fGameOver = true; 
            if(fScore > 0) await updateDoc(doc(db, "users", userUID), { points: increment(fScore*2) });
            alert("Fini!"); document.getElementById('start-flappy-btn').classList.remove('hidden'); initFlappy(); 
        }
        function drawFlappy() {
            fCtx.clearRect(0,0,320,300); fCtx.fillText("⭐", bird.x, bird.y+20);
            fCtx.fillStyle="gold"; pipes.forEach(p => { fCtx.fillRect(p.x, 0, 30, p.y); fCtx.fillRect(p.x, p.y+80, 30, 300); });
            fCtx.fillStyle="white"; fCtx.fillText(`Score: ${fScore}`, 10, 20);
        }
        fCanvas.onmousedown = () => bird.v = bird.jump;

        // --- MAZE LOGIC --- (Konsève)
        const mCanvas = document.getElementById('maze-canvas'), mCtx = mCanvas.getContext('2d');
        function initMaze() { mCanvas.width=300; mCanvas.height=300; mCtx.fillStyle="gold"; mCtx.fillText("LABIRENT PRE", 110, 150); }
        window.deductPointsMaze = async () => { if(userPoints<10) return; await updateDoc(doc(db, "users", userUID), { points: increment(-10) }); initMaze(); alert("Labirent jenere!"); };

        // --- THREE.JS BACKGROUND ---
        const sc = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rend = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
        rend.setSize(window.innerWidth, window.innerHeight);
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<2000; i++) starCoords.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffd700, size: 0.05 }));
        sc.add(stars); cam.position.z = 15;
        function anim() { requestAnimationFrame(anim); stars.rotation.y += 0.001; rend.render(sc, cam); }
        anim();

        initFlappy();
    </script>
</body>
</html>
