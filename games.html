<!DOCTYPE html>
<html lang="ht">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZETWAL GAMES | Chwazi Jwèt ou</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd700;
            --gold-deep: #b8860b;
            --gold-light: #fff8dc;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg: #010101;
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #webgl-canvas { position: fixed; inset: 0; z-index: -10; }

        /* NAV */
        .nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 12px 20px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: white; text-decoration: none; }
        .logo-text span { color: var(--gold); }
        .points-badge { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-weight: 800; font-size: 0.8rem; }

        /* TAB SYSTEM */
        .game-selection { padding: 120px 5% 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.3);
            color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; transition: var(--transition);
        }
        .tab-btn.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold-glow); }

        /* CONTAINERS */
        .game-view { display: none; padding: 20px 5% 100px; max-width: 850px; margin: 0 auto; }
        .game-view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .zoom-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 30px; text-align: center; border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .liquid-border { position: relative; }
        .liquid-border::before {
            content: ""; position: absolute; inset: -1px; z-index: -1; border-radius: inherit; padding: 1px;
            background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-light), var(--gold), var(--gold-deep));
            background-size: 300% 300%; animation: liquidGold 8s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }
        @keyframes liquidGold { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* BUTTONS */
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .option-btn { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); color: white; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .option-btn:hover { background: var(--gold); color: black; }
        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }

        /* MAZE */
        #maze-canvas { background: #000; border-radius: 15px; border: 2px solid var(--gold); margin: 20px auto; display: block; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .maze-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 160px; margin: 20px auto; }
        .ctrl-btn { background: rgba(255,215,0,0.2); border: 1px solid var(--gold); color: white; padding: 15px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo-text">LAVRI <span>ZETWAL</span></a>
            <div id="nav-points" class="points-badge">... PWEN</div>
        </div>
    </nav>

    <div class="game-selection">
        <button id="tab-duel" class="tab-btn active" onclick="showGame('duel')">🧠 Duel Mental</button>
        <button id="tab-maze" class="tab-btn" onclick="showGame('maze')">🌀 Labirent</button>
    </div>

    <section id="view-duel" class="game-view active">
        <div class="zoom-card liquid-border">
            <div id="duel-intro">
                <h1 style="color:var(--gold);">Duel Mental</h1>
                <p>Reponn 10 kalkil rapid pou genyen pwen.</p>
                <p style="font-size:0.9rem; color:var(--gold);">Pri: 10 pwen | Max: 27.5 pwen</p>
                <button class="btn-gold" onclick="startDuel()">Jwe Kounye a</button>
            </div>
            <div id="duel-play" class="hidden">
                <div id="duel-timer" style="color:var(--gold); font-size:2rem; font-weight:800;">5s</div>
                <h2 id="duel-question" style="font-size:1.8rem; margin:25px 0;">...</h2>
                <div id="duel-options" class="answer-grid"></div>
            </div>
            <div id="duel-results" class="hidden">
                <h2 style="color:var(--gold);">Rezilta Duel</h2>
                <p id="duel-score-text" style="font-size:1.2rem;"></p>
                <button class="btn-gold" onclick="showGame('duel')">Rejwe</button>
            </div>
        </div>
    </section>

    <section id="view-maze" class="game-view">
        <div class="zoom-card liquid-border">
            <h1 style="color:var(--gold);">Labirent Zetwal</h1>
            <p>Mennen chemiz la nan machin nan san w pa touche miray yo.</p>
            <div id="maze-stats" style="color:var(--gold); font-weight:800; margin-bottom:10px;">Nivo 1</div>
            <canvas id="maze-canvas"></canvas>
            <div class="maze-controls">
                <div></div><button class="ctrl-btn" onclick="moveMaze('up')">▲</button><div></div>
                <button class="ctrl-btn" onclick="moveMaze('left')">◀</button>
                <button class="ctrl-btn" onclick="moveMaze('down')">▼</button>
                <button class="ctrl-btn" onclick="moveMaze('right')">▶</button>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjCnmtvu0tqlsNDEtKraKBG79y12qYeCQ",
            authDomain: "lavrizetwal.firebaseapp.com",
            projectId: "lavrizetwal",
            storageBucket: "lavrizetwal.firebasestorage.app",
            messagingSenderId: "291921316186",
            appId: "1:291921316186:web:f55e8b34526960df394b63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUID = null;
        let userPoints = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    userPoints = d.data()?.points || 0;
                    document.getElementById('nav-points').innerText = `${userPoints.toFixed(1)} PWEN`;
                });
            } else { window.location.href = 'index.html'; }
        });

        // --- GENERAL UI ---
        window.showGame = (game) => {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(game === 'duel') {
                document.getElementById('view-duel').classList.add('active');
                document.getElementById('tab-duel').classList.add('active');
                resetDuelUI();
            } else {
                document.getElementById('view-maze').classList.add('active');
                document.getElementById('tab-maze').classList.add('active');
                initMaze();
            }
        };

        // --- DUEL MENTAL LOGIC ---
        let dIdx = 0, dScore = 0, dTimer;
        const dPoints = [1.5, 2, 2, 2.5, 2.5, 2.5, 3, 3, 3, 4];

        window.startDuel = async () => {
            if(userPoints < 10) return alert("Ou bezwen 10 pwen!");
            await updateDoc(doc(db, "users", userUID), { points: increment(-10) });
            document.getElementById('duel-intro').classList.add('hidden');
            document.getElementById('duel-play').classList.remove('hidden');
            dIdx = 0; dScore = 0; nextDuelQ();
        };

        function nextDuelQ() {
            if(dIdx >= 10) return endDuel();
            clearInterval(dTimer);
            const a = Math.floor(Math.random() * 20), b = Math.floor(Math.random() * 15);
            const ans = a + b;
            document.getElementById('duel-question').innerText = `${a} + ${b} = ?`;
            const opts = [ans, ans+2, ans-1, ans+5].sort(() => Math.random() - 0.5);
            const container = document.getElementById('duel-options');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = o;
                btn.onclick = () => { if(o === ans) dScore += dPoints[dIdx]; dIdx++; nextDuelQ(); };
                container.appendChild(btn);
            });
            let time = 5;
            document.getElementById('duel-timer').innerText = `${time}s`;
            dTimer = setInterval(() => {
                time--; document.getElementById('duel-timer').innerText = `${time}s`;
                if(time <= 0) { dIdx++; nextDuelQ(); }
            }, 1000);
        }

        async function endDuel() {
            clearInterval(dTimer);
            document.getElementById('duel-play').classList.add('hidden');
            document.getElementById('duel-results').classList.remove('hidden');
            document.getElementById('duel-score-text').innerText = `Bravo! Ou genyen ${dScore} pwen nan pati sa.`;
            await updateDoc(doc(db, "users", userUID), { points: increment(dScore) });
        }

        function resetDuelUI() {
            document.getElementById('duel-intro').classList.remove('hidden');
            document.getElementById('duel-play').classList.add('hidden');
            document.getElementById('duel-results').classList.add('hidden');
        }

        // --- MAZE LOGIC (RECURSIVE BACKTRACKING) ---
        let mazeLvl = 1;
        let mSize, mCell, mWalls, mPlayer, mGoal;
        const mCanvas = document.getElementById('maze-canvas');
        const mCtx = mCanvas.getContext('2d');

        function initMaze() {
            mSize = 5 + (mazeLvl * 2); if(mSize > 25) mSize = 25;
            mCell = Math.floor(320 / mSize);
            mCanvas.width = mSize * mCell; mCanvas.height = mSize * mCell;
            mPlayer = {x:0, y:0}; mGoal = {x:mSize-1, y:mSize-1};
            generateMaze(); drawMaze();
            document.getElementById('maze-stats').innerText = `Nivo ${mazeLvl}`;
        }

        function generateMaze() {
            mWalls = Array(mSize).fill().map(() => Array(mSize).fill().map(() => ({t:1, r:1, b:1, l:1, v:0})));
            let stack = [], curr = {x:0, y:0}; mWalls[0][0].v = 1;
            let vCount = 1, total = mSize * mSize;
            while(vCount < total) {
                let neighs = [], {x,y} = curr;
                if(y>0 && !mWalls[x][y-1].v) neighs.push({x, y:y-1, d:'t'});
                if(x<mSize-1 && !mWalls[x+1][y].v) neighs.push({x:x+1, y, d:'r'});
                if(y<mSize-1 && !mWalls[x][y+1].v) neighs.push({x, y:y+1, d:'b'});
                if(x>0 && !mWalls[x-1][y].v) neighs.push({x:x-1, y, d:'l'});
                if(neighs.length > 0) {
                    let next = neighs[Math.floor(Math.random()*neighs.length)];
                    if(next.d==='t'){mWalls[x][y].t=0; mWalls[next.x][next.y].b=0;}
                    else if(next.d==='r'){mWalls[x][y].r=0; mWalls[next.x][next.y].l=0;}
                    else if(next.d==='b'){mWalls[x][y].b=0; mWalls[next.x][next.y].t=0;}
                    else if(next.d==='l'){mWalls[x][y].l=0; mWalls[next.x][next.y].r=0;}
                    mWalls[next.x][next.y].v=1; stack.push(curr); curr=next; vCount++;
                } else if(stack.length > 0) curr = stack.pop();
            }
        }

        function drawMaze() {
            mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
            mCtx.beginPath(); mCtx.strokeStyle="#ffd700"; mCtx.lineWidth=3;
            for(let x=0;x<mSize;x++) for(let y=0;y<mSize;y++) {
                let w=mWalls[x][y], px=x*mCell, py=y*mCell;
                if(w.t){mCtx.moveTo(px,py); mCtx.lineTo(px+mCell,py);}
                if(w.r){mCtx.moveTo(px+mCell,py); mCtx.lineTo(px+mCell,py+mCell);}
                if(w.b){mCtx.moveTo(px,py+mCell); mCtx.lineTo(px+mCell,py+mCell);}
                if(w.l){mCtx.moveTo(px,py); mCtx.lineTo(px,py+mCell);}
            }
            mCtx.stroke();
            mCtx.font=`${mCell*0.7}px serif`; mCtx.textAlign="center"; mCtx.textBaseline="middle";
            mCtx.fillText("👕", mPlayer.x*mCell+mCell/2, mPlayer.y*mCell+mCell/2);
            mCtx.fillText("🧼", mGoal.x*mCell+mCell/2, mGoal.y*mCell+mCell/2);
        }

        window.moveMaze = async (dir) => {
            let {x,y} = mPlayer, moved = false;
            if(dir==='up' && !mWalls[x][y].t){mPlayer.y--; moved=true;}
            if(dir==='down' && !mWalls[x][y].bottom && !mWalls[x][y].b){mPlayer.y++; moved=true;}
            if(dir==='left' && !mWalls[x][y].l){mPlayer.x--; moved=true;}
            if(dir==='right' && !mWalls[x][y].r){mPlayer.x++; moved=true;}
            if(moved) {
                drawMaze();
                if(mPlayer.x===mGoal.x && mPlayer.y===mGoal.y) {
                    await updateDoc(doc(db, "users", userUID), { points: increment(mazeLvl) });
                    setTimeout(() => { alert(`Bravo! Nivo ${mazeLvl} konplè.`); mazeLvl++; initMaze(); }, 100);
                }
            }
        };

        // --- BACKGROUND ---
        const sc = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rend = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
        rend.setSize(window.innerWidth, window.innerHeight);
        const sGeo = new THREE.BufferGeometry(); const sCoords = [];
        for(let i=0; i<2000; i++) sCoords.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
        sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sCoords, 3));
        const st = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffd700, size: 0.02 }));
        sc.add(st); cam.position.z = 5;
        function animate() { requestAnimationFrame(animate); st.rotation.y += 0.0005; rend.render(sc, cam); }
        animate();
    </script>
</body>
</html>
